<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Embedding Space | Ninad Pathak</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090909;
      --accent: #ff5f1f;
      --border: #1e1e1e;
      --mono: 'JetBrains Mono', monospace;
    }
    body { margin: 0; background: var(--bg); color: #fff; font-family: var(--mono); overflow: hidden; }
    canvas { display: block; }
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      pointer-events: none;
    }
    .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 5px;
    }
    .title {
      font-size: 14px;
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      margin-bottom: 15px;
    }
    #tooltip {
      position: absolute;
      background: rgba(0,0,0,0.8);
      border: 1px solid var(--accent);
      padding: 5px 10px;
      font-size: 12px;
      pointer-events: none;
      display: none;
      z-index: 20;
    }
    .legend {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-size: 10px;
      text-align: right;
      color: #666;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div class="label">// Visualization</div>
    <div class="title">High-Dimensional Semantic Clusters</div>
    <div style="font-size: 11px; color: #888;">Drag to rotate • Scroll to zoom</div>
  </div>
  <div id="tooltip"></div>
  <div class="legend">Simulated 1536-dim space projected to 3D</div>

  <script>
    let scene, camera, renderer, controls, points, raycaster, mouse;
    const pointData = [];

    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 50;

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;

      const gridHelper = new THREE.GridHelper(100, 20, 0x1e1e1e, 0x111111);
      gridHelper.rotation.x = Math.PI / 2;
      scene.add(gridHelper);

      createClusters();
      
      raycaster = new THREE.Raycaster();
      mouse = new THREE.Vector2();

      window.addEventListener('mousemove', onMouseMove);
      window.addEventListener('resize', onWindowResize);
      
      animate();
    }

    function createClusters() {
      const geometry = new THREE.BufferGeometry();
      const positions = [];
      const colors = [];
      
      const clusters = [
        { center: [20, 20, 20], color: [1, 0.37, 0.12], label: "Technology" },
        { center: [-20, -20, 10], color: [0.12, 0.6, 1], label: "Nature" },
        { center: [15, -15, -10], color: [0.6, 1, 0.12], label: "Finance" },
        { center: [-15, 15, -20], color: [1, 0.12, 0.6], label: "Art" }
      ];

      clusters.forEach(c => {
        for (let i = 0; i < 200; i++) {
          const x = c.center[0] + (Math.random() - 0.5) * 15;
          const y = c.center[1] + (Math.random() - 0.5) * 15;
          const z = c.center[2] + (Math.random() - 0.5) * 15;
          positions.push(x, y, z);
          colors.push(...c.color);
          pointData.push({ x, y, z, label: c.label + " Node " + i });
        }
      });

      geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

      const material = new THREE.PointsMaterial({
        size: 0.8,
        vertexColors: true,
        transparent: true,
        opacity: 0.8
      });

      points = new THREE.Points(geometry, material);
      scene.add(points);
    }

    function onMouseMove(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      
      const tooltip = document.getElementById('tooltip');
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(points);

      if (intersects.length > 0) {
        const index = intersects[0].index;
        tooltip.style.display = 'block';
        tooltip.style.left = event.clientX + 10 + 'px';
        tooltip.style.top = event.clientY + 10 + 'px';
        tooltip.innerText = pointData[index].label;
      } else {
        tooltip.style.display = 'none';
      }
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      points.rotation.y += 0.001;
      renderer.render(scene, camera);
    }

    init();
  </script>
</body>
</html>
