<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What a Coding Agent Reads Before It Acts</title>
<style>
:root{--bg-1:#fff;--bg-2:#efefed;--border:#e0e0dc;--text-1:#0e0e0e;--text-2:#3a3a3a;--text-3:#888;--accent:#d44000;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;}
@media (prefers-color-scheme:dark){:root{--bg-1:#111;--bg-2:#1a1a1a;--border:#1e1e1e;--text-1:#f0f0f0;--text-2:#c2c2c2;--text-3:#6a6a6a;--accent:#ff5f1f;}}
body{margin:0;background:var(--bg-1);font-family:var(--sans);color:var(--text-1);overflow:hidden;}
.scene{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;box-sizing:border-box;padding:24px;gap:26px;}
.stack{display:flex;flex-direction:column;gap:8px;width:300px;flex:0 0 auto;}
.layer{display:flex;align-items:center;gap:12px;border:1.5px solid var(--border);border-radius:6px;padding:11px 13px;background:var(--bg-1);transition:all .3s linear;}
.layer.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,var(--bg-1));}
.ix{font-family:var(--mono);font-size:9px;color:var(--text-3);width:14px;flex:0 0 auto;transition:color .3s linear;}
.layer.on .ix{color:var(--accent);}
.nm{font-size:12.5px;font-weight:700;}
.agent{margin-top:6px;border:1.5px dashed var(--text-3);border-radius:6px;padding:11px 13px;text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-3);}
.legend{font-family:var(--mono);max-width:220px;flex:0 0 auto;}
.legend .hd{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-3);margin-bottom:12px;}
.legend .ds{font-size:9px;color:var(--text-3);line-height:1.6;}
@media (max-width:600px){.scene{flex-direction:column;gap:18px;}.legend{display:none;}}
</style>
</head>
<body>
<div class="scene">
  <div class="stack">
    <div class="layer" data-i="0"><div class="ix">01</div><div class="nm">Rules file</div></div>
    <div class="layer" data-i="1"><div class="ix">02</div><div class="nm">Repository map</div></div>
    <div class="layer" data-i="2"><div class="ix">03</div><div class="nm">Task brief</div></div>
    <div class="layer" data-i="3"><div class="ix">04</div><div class="nm">Tools and permissions</div></div>
    <div class="layer" data-i="4"><div class="ix">05</div><div class="nm">Guardrails</div></div>
    <div class="agent">&darr; the agent acts</div>
  </div>
  <div class="legend">
    <div class="hd">Context, read in order</div>
    <div class="ds">Standing rules, then where to look, then what to do, then what it may touch, then how failure is caught. Setup is the part that does not change between tasks.</div>
  </div>
</div>
<script>
const layers = Array.from(document.querySelectorAll('.layer'));
let k = 0;
function step(){
  layers.forEach(l=>l.classList.remove('on'));
  layers[k].classList.add('on');
  k = (k + 1) % layers.length;
}
step();
setInterval(step, 1300);
</script>
</body>
</html>
