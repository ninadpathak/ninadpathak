<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP inside Harness | Ninad Pathak</title>
  <link rel="stylesheet" href="/static/css/visuals-base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .harness-box { border: 1px solid var(--border); padding: 40px; width: 100%; position: relative; background: var(--bg); margin-top: 10px; }
    
    .inner-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .comp { border: 1px solid var(--border); padding: 20px; font-family: var(--mono); font-size: 11px; background: rgba(0,0,0,0.02); text-align: center; color: var(--text-dim); }
    
    .mcp-layer { grid-column: 1 / span 2; border: 2px solid var(--accent); padding: 24px; margin-top: 20px; position: relative; background: rgba(212, 64, 0, 0.02); }
    .mcp-label { position: absolute; top: -10px; left: 24px; background: var(--bg); padding: 0 10px; font-family: var(--mono); font-size: 10px; color: var(--accent); font-weight: 700; border: 1px solid var(--accent); }
    
    .external { margin-top: 40px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .ext-box { border: 1px solid var(--border); padding: 8px 16px; font-family: var(--mono); font-size: 9px; color: var(--text-dim); background: var(--bg); }

    @media (max-width: 600px) {
      .inner-grid { grid-template-columns: 1fr; }
      .mcp-layer { grid-column: 1; }
      .harness-box { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="viz-container">
    <div class="header-meta">
      <div>
        <div class="label">// Modular_Stack</div>
        <h1 class="title">Agent Infrastructure Layer</h1>
      </div>
      <div class="label" style="color: var(--text-dim);">Abstraction_Map</div>
    </div>

    <div class="harness-box">
      <div class="inner-grid">
        <div class="comp">EXECUTION_LOOP</div>
        <div class="comp">STATE_MANAGER</div>
        <div class="mcp-layer">
          <div class="mcp-label">MCP_SERVER_INTERFACE</div>
          <div style="font-size: 13px; font-weight: 600; text-align: center; color: var(--text);">Dynamic Tool Discovery & Universal Retrieval</div>
        </div>
      </div>

      <div class="external">
        <div class="ext-box">POSTGRES</div>
        <div class="ext-box">SLACK</div>
        <div class="ext-box">GITHUB</div>
        <div class="ext-box">S3_BUCKET</div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot"></div> CONNECTORS: MCP_READY</div>
      <div class="status-item">LATENCY: PASSIVE</div>
    </div>
  </div>
  <script>function sendHeight(){const h=document.body.scrollHeight;window.parent.postMessage({type:"resize-iframe",height:h},"*")}window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);new ResizeObserver(sendHeight).observe(document.body);</script>
</body>
</html>
