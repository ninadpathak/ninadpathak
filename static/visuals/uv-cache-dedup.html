<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uv Cache Deduplication</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #0e0e0e;
            --text-dim: #888888;
            --accent: #d44000;
            --border: #e0e0dc;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111111;
                --text: #f0f0f0;
                --text-dim: #6a6a6a;
                --accent: #ff5f1f;
                --border: #1e1e1e;
            }
        }
        body { text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { width: 95%; max-width: 1000px; padding: 40px; background: var(--bg); }
        svg { width: 100%; height: auto; overflow: visible; }
        .label { font-family: var(--mono); font-size: 18px; fill: var(--text); font-weight: 600; text-transform: uppercase; }
        .box { fill: var(--bg); stroke: var(--border); stroke-width: 2; }
        .link { stroke: var(--accent); stroke-width: 3; stroke-dasharray: 6; }
    </style>
</head>
<body>
    <div class="container">
        <svg viewBox="-300 -80 1200 650">
            <!-- Global Cache -->
            <rect x="300" y="200" width="200" height="150" rx="8" class="box" style="stroke: var(--accent); stroke-width: 4;" />
            <text x="400" y="285" text-anchor="middle" class="label">Global Cache</text>
            <text x="400" y="310" text-anchor="middle" class="label" style="font-size: 12px; fill: var(--text-dim);">Single Copy: PyTorch 2.5</text>
            
            <!-- Project A -->
            <rect x="0" y="50" width="150" height="100" rx="4" class="box" />
            <text x="75" y="105" text-anchor="middle" class="label" style="font-size: 14px;">Project Alpha</text>
            <path d="M 150 100 L 300 220" class="link" />
            
            <!-- Project B -->
            <rect x="0" y="400" width="150" height="100" rx="4" class="box" />
            <text x="75" y="455" text-anchor="middle" class="label" style="font-size: 14px;">Project Beta</text>
            <path d="M 150 450 L 300 330" class="link" />
            
            <!-- Project C -->
            <rect x="650" y="225" width="150" height="100" rx="4" class="box" />
            <text x="725" y="280" text-anchor="middle" class="label" style="font-size: 14px;">Project Gamma</text>
            <path d="M 650 275 L 500 275" class="link" />
            
            <text x="400" y="520" text-anchor="middle" class="label" style="font-size: 24px;">Global Content-Addressable Deduplication</text>
            <text x="400" y="560" text-anchor="middle" class="label" style="font-size: 16px; fill: var(--text-dim);">Dashed lines represent Zero-copy links. Disk space consumed only once.</text>
        </svg>
    </div>
</body>
</html>
