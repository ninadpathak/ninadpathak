<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Context Window Sliding: What Gets Lost</title>
<style>
:root{--bg-1:#fff;--bg-2:#efefed;--border:#e0e0dc;--text-1:#0e0e0e;--text-2:#3a3a3a;--text-3:#888;--accent:#d44000;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;}
@media (prefers-color-scheme:dark){:root{--bg-1:#111;--bg-2:#1a1a1a;--border:#1e1e1e;--text-1:#f0f0f0;--text-2:#c2c2c2;--text-3:#6a6a6a;--accent:#ff5f1f;}}
body{margin:0;background:var(--bg-1);font-family:var(--sans);color:var(--text-1);overflow:hidden;}

.scene{width:100%;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;box-sizing:border-box;padding:18px 22px;gap:16px;}

.header{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--text-3);text-align:center;}

.timeline-wrap{width:100%;max-width:640px;position:relative;}

.turn-row{display:flex;gap:5px;align-items:flex-end;overflow:hidden;position:relative;}

.turn{
  flex:0 0 auto;
  width:62px;
  border:1px solid var(--border);
  font-family:var(--mono);
  font-size:8px;
  text-align:center;
  padding:7px 3px 6px;
  color:var(--text-2);
  text-transform:uppercase;
  letter-spacing:0.04em;
  transition:opacity 0.5s,border-color 0.3s,background 0.3s,color 0.3s;
  box-sizing:border-box;
  line-height:1.35;
}
.turn small{display:block;font-size:7px;color:var(--text-3);margin-top:3px;}
.turn.active{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,transparent);}
.turn.active small{color:var(--accent);}
.turn.falling{opacity:0.2;border-style:dashed;}
.turn.gone{opacity:0;pointer-events:none;}
.turn.new-in{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent);}

.window-frame{
  position:absolute;
  top:-6px;bottom:-6px;
  border:2px solid var(--accent);
  pointer-events:none;
  transition:left 0.6s ease,width 0.6s ease;
  box-sizing:border-box;
}
.window-label{
  position:absolute;
  top:-22px;left:0;right:0;
  text-align:center;
  font-family:var(--mono);font-size:8.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);
}

.legend{display:flex;gap:16px;align-items:center;justify-content:center;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:8.5px;color:var(--text-3);}
.leg-box{width:14px;height:10px;border:1px solid;}
.leg-active{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,transparent);}
.leg-falling{border-color:var(--border);border-style:dashed;opacity:0.4;}
.leg-normal{border-color:var(--border);}

.status{font-family:var(--mono);font-size:9.5px;color:var(--text-2);text-align:center;min-height:13px;}
.status b{color:var(--accent);}

@media (max-width:600px){
  .turn{width:50px;font-size:7.5px;}
}
</style>
</head>
<body>
<div class="scene">
  <div class="header">Context Window as Sliding Window / Old Turns Fall Off the Left</div>

  <div class="timeline-wrap">
    <div class="window-frame" id="wframe">
      <div class="window-label">context window (6 turns)</div>
    </div>
    <div class="turn-row" id="turn-row"></div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="leg-box leg-active"></div>newest / active</div>
    <div class="legend-item"><div class="leg-box leg-normal"></div>in context</div>
    <div class="legend-item"><div class="leg-box leg-falling"></div>falling off (evicted)</div>
  </div>

  <div class="status" id="status">&nbsp;</div>
</div>

<script>
var WINDOW=6;
var GAP=5;
var TURN_W=62;
var row=document.getElementById('turn-row');
var wframe=document.getElementById('wframe');
var status=document.getElementById('status');

var allTurns=[
  {label:'Turn 1',sub:'migration plan',lost:false},
  {label:'Turn 2',sub:'model map',lost:false},
  {label:'Turn 3',sub:'endpoint list',lost:false},
  {label:'Turn 4',sub:'auth rewrite',lost:false},
  {label:'Turn 5',sub:'db schema',lost:false},
  {label:'Turn 6',sub:'test plan',lost:false},
  {label:'Turn 7',sub:'router fix',lost:false},
  {label:'Turn 8',sub:'middleware',lost:false},
  {label:'Turn 9',sub:'pagination',lost:false},
  {label:'Turn 10',sub:'error codes',lost:false}
];

// Render initial 6 turns
var rendered=[];
function renderTurn(t,cls){
  var d=document.createElement('div');
  d.className='turn '+(cls||'');
  d.innerHTML=t.label+'<small>'+t.sub+'</small>';
  row.appendChild(d);
  return d;
}

// Initial state: turns 1-6 in window
for(var i=0;i<6;i++){
  var el=renderTurn(allTurns[i],'');
  rendered.push({el:el,idx:i});
}
// highlight last
rendered[5].el.classList.add('active');
updateFrame();

function updateFrame(){
  var inWindow=rendered.filter(function(r){return !r.el.classList.contains('gone');});
  if(inWindow.length===0)return;
  var first=inWindow[0].el;
  var last=inWindow[inWindow.length-1].el;
  var rLeft=first.offsetLeft;
  var rRight=last.offsetLeft+last.offsetWidth;
  wframe.style.left=(rLeft-4)+'px';
  wframe.style.width=(rRight-rLeft+8)+'px';
}

var nextTurnIdx=6;
var step=0;

function tick(){
  // Remove 'active' from all
  rendered.forEach(function(r){r.el.classList.remove('active','new-in');});

  if(nextTurnIdx>=allTurns.length){
    // Reset
    while(row.firstChild)row.removeChild(row.firstChild);
    rendered=[];
    for(var i=0;i<6;i++){
      var el=renderTurn(allTurns[i],'');
      rendered.push({el:el,idx:i});
    }
    rendered[5].el.classList.add('active');
    nextTurnIdx=6;
    status.innerHTML='context window reset -- <b>turn 1-6 visible</b>';
    updateFrame();
    return;
  }

  // Mark oldest visible as falling
  var visible=rendered.filter(function(r){return !r.el.classList.contains('gone');});
  if(visible.length>=WINDOW){
    var oldest=visible[0];
    oldest.el.classList.add('falling');
    status.innerHTML='<b>'+allTurns[oldest.idx].label+'</b> ('+allTurns[oldest.idx].sub+') evicted -- new turn appended';
    setTimeout(function(){
      oldest.el.classList.remove('falling');
      oldest.el.classList.add('gone');
      // Add new turn
      var nt=allTurns[nextTurnIdx];
      var nel=renderTurn(nt,'new-in');
      rendered.push({el:nel,idx:nextTurnIdx});
      nextTurnIdx++;
      updateFrame();
    },600);
  }
  // Highlight newest visible
  setTimeout(function(){
    var vis=rendered.filter(function(r){return !r.el.classList.contains('gone');});
    if(vis.length>0)vis[vis.length-1].el.classList.add('active');
    updateFrame();
  },700);
}

setInterval(tick,2200);
</script>
</body>
</html>
