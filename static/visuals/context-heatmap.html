<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lost in the Middle | Ninad Pathak</title>
  <link rel="stylesheet" href="/static/css/visuals-base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .heatmap { display: flex; flex-direction: column; width: 100%; border: 1px solid var(--border); margin-top: 10px; }
    .slot { height: 32px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 10px; transition: background 0.5s; border-bottom: 1px solid var(--border); font-weight: 600; }
    .slot:last-child { border-bottom: none; }
    
    .slot-label { position: absolute; left: -60px; font-size: 9px; color: var(--text-dim); text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="viz-container">
    <div class="header-meta">
      <div>
        <div class="label">// Retrieval_Accuracy</div>
        <h1 class="title">Lost in the Middle</h1>
      </div>
      <div class="label" style="color: var(--text-dim);">U-Curve_Heatmap</div>
    </div>

    <div style="padding-left: 0; width: 100%;">
      <div class="heatmap" id="heatmap"></div>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot"></div> WINDOW: 128K</div>
      <div class="status-item">SENSITIVITY: HIGH</div>
    </div>
  </div>

  <script>
    const heatmap = document.getElementById('heatmap');
    const slots = 10;
    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    
    for(let i=0; i<slots; i++) {
      const slot = document.createElement('div');
      slot.className = 'slot';
      
      const x = i / (slots - 1);
      const accuracy = 0.5 + (2 * (x - 0.5)**2) * 0.9; 
      
      const opacity = accuracy;
      slot.style.backgroundColor = isDark ? `rgba(255, 95, 31, ${opacity})` : `rgba(212, 64, 0, ${opacity})`;
      
      slot.innerText = `${Math.round(accuracy * 100)}% RECALL`;
      slot.style.color = accuracy > 0.65 ? '#fff' : 'var(--text-dim)';
      
      heatmap.appendChild(slot);
    }

    function sendHeight(){const h=document.documentElement.scrollHeight;window.parent.postMessage({type:"resize-iframe",height:h},"*")}window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);new ResizeObserver(sendHeight).observe(document.body);
  </script>
</body>
</html>
