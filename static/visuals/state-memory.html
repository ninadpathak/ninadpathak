<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Memory Constellation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
  }
  #canvas { display: block; }
  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 28px 36px;
  }
  #title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: #ff5f1f;
    text-transform: uppercase;
    opacity: 0.9;
  }
  #subtitle {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    margin-top: 5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  #legend {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px 28px;
    max-width: 640px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,95,31,0.18);
    border-radius: 10px;
    padding: 18px 22px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 11.5px;
    color: rgba(255,255,255,0.72);
    letter-spacing: 0.03em;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  #hint {
    font-size: 10px;
    color: rgba(255,255,255,0.22);
    text-align: center;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 12px;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="overlay">
  <div>
    <div id="title">AI Agent Memory 2026</div>
    <div id="subtitle">Constellation of memory systems &amp; architecture layers</div>
  </div>
  <div>
    <div id="legend">
      <div class="legend-item"><div class="dot" style="background:#ff5f1f"></div>Letta</div>
      <div class="legend-item"><div class="dot" style="background:#00bfff"></div>MemGPT</div>
      <div class="legend-item"><div class="dot" style="background:#39ff14"></div>Mem0</div>
      <div class="legend-item"><div class="dot" style="background:#ff2d78"></div>Pinecone</div>
      <div class="legend-item"><div class="dot" style="background:#bf5fff"></div>Qdrant</div>
      <div class="legend-item"><div class="dot" style="background:#ffd700"></div>Postgres/pgvector</div>
      <div class="legend-item"><div class="dot" style="background:#00ffcc"></div>Working Memory</div>
      <div class="legend-item"><div class="dot" style="background:#ff8c00"></div>Episodic Memory</div>
      <div class="legend-item"><div class="dot" style="background:#ff4500"></div>Semantic Memory</div>
      <div class="legend-item"><div class="dot" style="background:#1e90ff"></div>MCP Protocol</div>
      <div class="legend-item"><div class="dot" style="background:#e6e6fa"></div>RAG Retrieval</div>
      <div class="legend-item"><div class="dot" style="background:#98fb98"></div>Hybrid Search</div>
    </div>
    <div id="hint">Drag to orbit &nbsp;·&nbsp; Scroll to zoom</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  const DARK = 0xff5f1f;
  const LIGHT = 0xd44000;

  const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x0a0a0f, 1);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 8, 38);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.minDistance = 10;
  controls.maxDistance = 80;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.35;

  // Ambient light
  scene.add(new THREE.AmbientLight(0xffffff, 0.15));

  // Glow helper
  function makeGlowTexture(color) {
    const c = document.createElement('canvas');
    c.width = c.height = 128;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
    const r = (color >> 16) & 0xff;
    const g2 = (color >> 8) & 0xff;
    const b = color & 0xff;
    g.addColorStop(0, `rgba(${r},${g2},${b},1)`);
    g.addColorStop(0.4, `rgba(${r},${g2},${b},0.4)`);
    g.addColorStop(1, `rgba(${r},${g2},${b},0)`);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 128, 128);
    return new THREE.CanvasTexture(c);
  }

  function createNode(geometry, color, size, label, position, scene) {
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.92 });
    const mesh = new THREE.Mesh(geometry, mat);
    mesh.position.copy(position);
    mesh.userData.label = label;
    scene.add(mesh);

    // Glow halo
    const glowTex = makeGlowTexture(color);
    const glowMat = new THREE.SpriteMaterial({ map: glowTex, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending, depthWrite: false });
    const glow = new THREE.Sprite(glowMat);
    glow.scale.setScalar(size * 4.5);
    glow.position.copy(position);
    scene.add(glow);

    // Ring
    const ringGeo = new THREE.RingGeometry(size * 0.85, size * 1.15, 48);
    const ringMat = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide, transparent: true, opacity: 0.25, depthWrite: false });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.copy(position);
    ring.rotation.x = Math.PI / 2 + (Math.random() - 0.5) * 0.6;
    scene.add(ring);

    return mesh;
  }

  function createEdge(start, end, color, opacity, scene) {
    const points = [start.clone(), end.clone()];
    const geo = new THREE.BufferGeometry().setFromPoints(points);
    const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: opacity || 0.25, depthWrite: false });
    scene.add(new THREE.Line(geo, mat));
  }

  // Nodes with labels and positions
  const nodes = [
    // Center - LLM
    { label: 'LLM\nCore', color: 0xffffff, size: 2.2, pos: new THREE.Vector3(0, 0, 0) },

    // Platform layer (top)
    { label: 'Letta', color: 0xff5f1f, size: 1.5, pos: new THREE.Vector3(-8, 7, -4) },
    { label: 'MemGPT', color: 0x00bfff, size: 1.3, pos: new THREE.Vector3(7, 7, -5) },
    { label: 'Mem0', color: 0x39ff14, size: 1.5, pos: new THREE.Vector3(0, 8, 4) },

    // Memory architecture layer
    { label: 'Working\nMemory', color: 0x00ffcc, size: 1.1, pos: new THREE.Vector3(-10, 3, 4) },
    { label: 'Episodic\nMemory', color: 0xff8c00, size: 1.1, pos: new THREE.Vector3(-7, 3, -8) },
    { label: 'Semantic\nMemory', color: 0xff4500, size: 1.1, pos: new THREE.Vector3(8, 3, 5) },

    // Vector stores
    { label: 'Pinecone', color: 0xff2d78, size: 0.95, pos: new THREE.Vector3(-12, -4, -2) },
    { label: 'Qdrant', color: 0xbf5fff, size: 0.85, pos: new THREE.Vector3(-5, -5, -10) },
    { label: 'pgvector', color: 0xffd700, size: 0.95, pos: new THREE.Vector3(10, -4, -3) },

    // Retrieval layer
    { label: 'RAG\nRetrieval', color: 0xe6e6fa, size: 0.9, pos: new THREE.Vector3(12, 3, 6) },
    { label: 'Hybrid\nSearch', color: 0x98fb98, size: 0.85, pos: new THREE.Vector3(5, -5, 10) },
    { label: 'Re-rank', color: 0xff69b4, size: 0.75, pos: new THREE.Vector3(-3, -6, 9) },

    // Protocol layer
    { label: 'MCP', color: 0x1e90ff, size: 1.3, pos: new THREE.Vector3(0, -6, -7) },

    // Outer - Context & Token
    { label: 'Context\nWindow', color: 0xaaaaaa, size: 0.8, pos: new THREE.Vector3(14, 7, -8) },
    { label: 'Token\nBudget', color: 0x888888, size: 0.7, pos: new THREE.Vector3(-14, 7, 8) },
  ];

  const meshes = [];
  nodes.forEach(n => {
    const geo = n.label.includes('LLM') ? new THREE.SphereGeometry(n.size, 32, 32) : new THREE.SphereGeometry(n.size, 24, 24);
    const mesh = createNode(geo, n.color, n.size, n.label, n.pos, scene);
    meshes.push(mesh);
  });

  // Edges - Platform to LLM
  createEdge(nodes[0].pos, nodes[1].pos, DARK, 0.3);
  createEdge(nodes[0].pos, nodes[2].pos, 0x00bfff, 0.3);
  createEdge(nodes[0].pos, nodes[3].pos, 0x39ff14, 0.3);

  // Memory arch to LLM
  createEdge(nodes[0].pos, nodes[4].pos, 0x00ffcc, 0.2);
  createEdge(nodes[0].pos, nodes[5].pos, 0xff8c00, 0.2);
  createEdge(nodes[0].pos, nodes[6].pos, 0xff4500, 0.2);

  // Memory arch interconnections
  createEdge(nodes[4].pos, nodes[5].pos, 0x00ffcc, 0.15);
  createEdge(nodes[5].pos, nodes[6].pos, 0xff8c00, 0.15);
  createEdge(nodes[6].pos, nodes[4].pos, 0xff4500, 0.15);

  // Platforms to memory arch
  createEdge(nodes[1].pos, nodes[4].pos, DARK, 0.2);
  createEdge(nodes[1].pos, nodes[5].pos, DARK, 0.18);
  createEdge(nodes[2].pos, nodes[5].pos, 0x00bfff, 0.18);
  createEdge(nodes[2].pos, nodes[6].pos, 0x00bfff, 0.15);
  createEdge(nodes[3].pos, nodes[4].pos, 0x39ff14, 0.2);
  createEdge(nodes[3].pos, nodes[6].pos, 0x39ff14, 0.2);

  // Vector stores to memory arch
  createEdge(nodes[4].pos, nodes[7].pos, 0x00ffcc, 0.15);
  createEdge(nodes[5].pos, nodes[8].pos, 0xff8c00, 0.15);
  createEdge(nodes[6].pos, nodes[9].pos, 0xff4500, 0.15);

  // MCP to vector stores and platforms
  createEdge(nodes[13].pos, nodes[7].pos, 0x1e90ff, 0.25);
  createEdge(nodes[13].pos, nodes[8].pos, 0x1e90ff, 0.2);
  createEdge(nodes[13].pos, nodes[9].pos, 0x1e90ff, 0.25);
  createEdge(nodes[13].pos, nodes[1].pos, 0x1e90ff, 0.2);
  createEdge(nodes[13].pos, nodes[3].pos, 0x1e90ff, 0.2);

  // Retrieval layer
  createEdge(nodes[10].pos, nodes[6].pos, 0xe6e6fa, 0.2);
  createEdge(nodes[11].pos, nodes[10].pos, 0x98fb98, 0.2);
  createEdge(nodes[12].pos, nodes[10].pos, 0xff69b4, 0.18);
  createEdge(nodes[11].pos, nodes[6].pos, 0x98fb98, 0.15);

  // Retrieval to stores
  createEdge(nodes[10].pos, nodes[9].pos, 0xe6e6fa, 0.18);
  createEdge(nodes[11].pos, nodes[7].pos, 0x98fb98, 0.15);

  // Context and token to LLM
  createEdge(nodes[0].pos, nodes[14].pos, 0xaaaaaa, 0.2);
  createEdge(nodes[0].pos, nodes[15].pos, 0x888888, 0.18);

  // Stars / background particles
  const starGeo = new THREE.BufferGeometry();
  const starCount = 1800;
  const starPos = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount * 3; i++) {
    starPos[i] = (Math.random() - 0.5) * 400;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, transparent: true, opacity: 0.6, sizeAttenuation: true });
  scene.add(new THREE.Points(starGeo, starMat));

  // Floating orbit rings for LLM core
  for (let i = 0; i < 3; i++) {
    const ringGeo = new THREE.TorusGeometry(3.5 + i * 1.5, 0.04, 8, 64);
    const ringMat = new THREE.MeshBasicMaterial({ color: DARK, transparent: true, opacity: 0.18 - i * 0.04, depthWrite: false });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.copy(nodes[0].pos);
    ring.rotation.x = Math.PI / 2 + i * 0.5;
    ring.rotation.y = i * 0.8;
    scene.add(ring);
  }

  // Raycaster for hover labels
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  const labelDiv = document.createElement('div');
  labelDiv.style.cssText = 'position:fixed;background:rgba(0,0,0,0.8);color:#ff5f1f;padding:5px 10px;border-radius:4px;font-size:11px;pointer-events:none;display:none;letter-spacing:0.06em;text-transform:uppercase;backdrop-filter:blur(8px);border:1px solid rgba(255,95,31,0.3)';
  document.body.appendChild(labelDiv);

  window.addEventListener('mousemove', e => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(meshes);
    if (intersects.length > 0) {
      const m = intersects[0].object;
      labelDiv.style.display = 'block';
      labelDiv.style.left = e.clientX + 14 + 'px';
      labelDiv.style.top = e.clientY - 8 + 'px';
      labelDiv.textContent = m.userData.label.replace(/\n/g, ' ');
    } else {
      labelDiv.style.display = 'none';
    }
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  let t = 0;
  function animate() {
    requestAnimationFrame(animate);
    t += 0.008;

    // Gentle float on nodes
    meshes.forEach((m, i) => {
      if (i === 0) return; // skip LLM core
      m.position.y += Math.sin(t + i * 0.7) * 0.003;
    });

    controls.update();
    renderer.render(scene, camera);
  }
  animate();
})();
</script>
</body>
</html>
