<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curse of Dimensionality | Ninad Pathak</title>
  <link rel="stylesheet" href="/static/css/visuals-base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .viz-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; margin-top: 20px; }
    
    .sphere-container { width: 200px; height: 200px; border: 1px solid var(--border); border-radius: 50%; position: relative; background: radial-gradient(circle, var(--bg) 0%, rgba(0,0,0,0.05) 100%); display: flex; align-items: center; justify-content: center; }
    .dot { width: 6px; height: 6px; background: var(--accent); position: absolute; border-radius: 50%; transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 0 8px var(--accent); }
    
    .controls { display: flex; align-items: center; gap: 20px; width: 100%; max-width: 400px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
    input[type=range] { flex: 1; accent-color: var(--accent); height: 4px; background: var(--border); appearance: none; border-radius: 2px; }
    input[type=range]::-webkit-slider-thumb { appearance: none; width: 16px; height: 16px; background: var(--accent); border-radius: 50%; cursor: pointer; }
    
    .info-panel { font-size: 12px; color: var(--text-dim); text-align: center; line-height: 1.6; max-width: 500px; min-height: 40px; }
    .highlight { color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>
  <div class="viz-container">
    <div class="header-meta">
      <div>
        <div class="label">// Spatial_Geometry</div>
        <h1 class="title">The Curse of Dimensionality</h1>
      </div>
      <div class="label" style="color: var(--text-dim);">Volume_Concentration</div>
    </div>

    <div class="viz-body">
      <div class="sphere-container" id="sphere"></div>

      <div class="controls">
        <span>D=2</span>
        <input type="range" id="dimRange" min="2" max="100" value="2">
        <span>D=100</span>
      </div>

      <div class="info-panel" id="info">
        In 2D space, data points are distributed evenly throughout the volume.
      </div>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot"></div> VECTORS: 50</div>
      <div class="status-item">DIST_METRIC: COSINE</div>
    </div>
  </div>

  <script>
    const sphere = document.getElementById('sphere');
    const range = document.getElementById('dimRange');
    const info = document.getElementById('info');
    
    const count = 50;
    const dots = [];
    const radius = 100; // Half of container width

    for(let i=0; i<count; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      sphere.appendChild(dot);
      dots.push(dot);
    }

    function update() {
      const d = parseInt(range.value);
      
      // Seed random specifically so animation looks cohesive
      // Math.random() is fine for this simulation, but we calculate distance based on dimension
      dots.forEach((dot, i) => {
        // In high dimensions, points are pushed to the surface (r -> 1)
        // Simulate this by adjusting the distance from center
        const pull = Math.pow(Math.random(), 1/d); 
        
        // Random angle for 2D projection
        const angle = (i / count) * Math.PI * 2 + Math.random() * 0.5;
        
        // Calculate position relative to center (100,100)
        const x = radius + Math.cos(angle) * (radius - 5) * pull;
        const y = radius + Math.sin(angle) * (radius - 5) * pull;
        
        dot.style.left = x + 'px';
        dot.style.top = y + 'px';
      });

      if (d > 50) {
        info.innerHTML = `High Dimensionality: Almost all volume is concentrated in a thin shell near the surface. Vectors become <span class="highlight">nearly orthogonal and equidistant</span>.`;
      } else if (d > 10) {
        info.innerHTML = `As dimensions increase, points begin to push rapidly toward the boundary of the space.`;
      } else {
        info.innerHTML = `In low-dimensional space, data points are distributed evenly throughout the interior volume.`;
      }
    }

    range.addEventListener('input', update);
    update();
  </script>
</body>
</html>
