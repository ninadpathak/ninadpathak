<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latency Benchmarks | Ninad Pathak</title>
  <link rel="stylesheet" href="/static/css/visuals-base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .tabs { display: flex; gap: 20px; border-bottom: 1px solid var(--border); margin: 20px 0; overflow-x: auto; }
    .tab { padding: 10px 0; font-family: var(--mono); font-size: 11px; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; text-transform: uppercase; white-space: nowrap; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    
    .chart-container { flex: 1; display: flex; flex-direction: column; gap: 20px; margin-top: 20px; }
    .bar-row { display: grid; grid-template-columns: 140px 1fr 60px; align-items: center; gap: 20px; }
    .bar-label { font-size: 12px; color: var(--text-dim); text-align: right; font-weight: 500; }
    
    .bar-track { height: 16px; background: var(--bg); border: 1px solid var(--border); position: relative; }
    .bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
    .bar-val { font-family: var(--mono); font-size: 11px; color: var(--accent); font-weight: 600; }

    @media (max-width: 600px) {
      .bar-row { grid-template-columns: 100px 1fr 50px; gap: 10px; }
      .bar-label { font-size: 10px; }
      .bar-val { font-size: 10px; }
    }
  </style>
</head>
<body>
  <div class="viz-container">
    <div class="header-meta">
      <div>
        <div class="label">// Infrastructure_Speed</div>
        <h1 class="title">Inference Latency (p95)</h1>
      </div>
      <div class="label" style="color: var(--text-dim);">API_vs_Local</div>
    </div>

    <div class="tabs">
      <div class="tab active" data-set="small">Short_Text (25t)</div>
      <div class="tab" data-set="medium">Medium_Text (256t)</div>
      <div class="tab" data-set="large">Large_Text (2048t)</div>
    </div>

    <div class="chart-container" id="chart"></div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot pulse"></div> NETWORK: OVER_WAN</div>
      <div class="status-item">SIMULATION: ACTIVE</div>
    </div>
  </div>

  <script>
    const data = {
      small: [
        { name: 'OpenAI (3-small)', val: 180 },
        { name: 'Cohere (v3)', val: 120 },
        { name: 'Voyage AI', val: 150 },
        { name: 'Jina Embeddings', val: 210 },
        { name: 'Self-hosted (BGE)', val: 45, local: true }
      ],
      medium: [
        { name: 'OpenAI (3-small)', val: 320 },
        { name: 'Cohere (v3)', val: 240 },
        { name: 'Voyage AI', val: 290 },
        { name: 'Jina Embeddings', val: 380 },
        { name: 'Self-hosted (BGE)', val: 110, local: true }
      ],
      large: [
        { name: 'OpenAI (3-small)', val: 850 },
        { name: 'Cohere (v3)', val: 620 },
        { name: 'Voyage AI', val: 740 },
        { name: 'Jina Embeddings', val: 980 },
        { name: 'Self-hosted (BGE)', val: 340, local: true }
      ]
    };

    function render(set) {
      const container = document.getElementById('chart');
      container.innerHTML = '';
      const items = data[set];
      const max = Math.max(...items.map(i => i.val));

      items.forEach(item => {
        const row = document.createElement('div');
        row.className = 'bar-row';
        const width = (item.val / max) * 100;
        
        row.innerHTML = `
          <div class="bar-label" style="${item.local ? 'color: var(--text); font-weight: 600;' : ''}">${item.name}</div>
          <div class="bar-track"><div class="bar-fill" style="width: 0%; ${item.local ? 'background: var(--text);' : ''}"></div></div>
          <div class="bar-val" style="${item.local ? 'color: var(--text);' : ''}">${item.val}ms</div>
        `;
        container.appendChild(row);
        
        setTimeout(() => {
          row.querySelector('.bar-fill').style.width = width + '%';
        }, 50);
      });
    }

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        render(tab.dataset.set);
      });
    });

    render('small');
  </script>
<script>function sendHeight(){const h=document.documentElement.scrollHeight;window.parent.postMessage({type:"resize-iframe",height:h},"*")}window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);new ResizeObserver(sendHeight).observe(document.body);</script></body>
</html>
