<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Memory Landscape 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #info {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 95, 31, 0.7);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    pointer-events: none;
  }
  #title {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: #ff5f1f;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    pointer-events: none;
    text-align: center;
  }
  #legend {
    position: absolute;
    top: 80px;
    right: 20px;
    color: rgba(255, 95, 31, 0.6);
    font-size: 11px;
    line-height: 1.8;
    pointer-events: none;
  }
  #legend span { display: block; }
  #legend .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
  }
</style>
</head>
<body>
<div id="title">AI Agent Memory Landscape — 2026</div>
<div id="legend">
  <span><span class="dot" style="background:#ff5f1f"></span>Core Systems</span>
  <span><span class="dot" style="background:#ff8f50"></span>Frameworks</span>
  <span><span class="dot" style="background:#d44000"></span>Infrastructure</span>
  <span><span class="dot" style="background:#ffb899"></span>Standards</span>
</div>
<div id="info">drag to orbit · scroll to zoom</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  const DARK = 0xff5f1f;
  const LIGHT = 0xd44000;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a0a);
  scene.fog = new THREE.FogExp2(0x0a0a0a, 0.015);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 80);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  // OrbitControls via CDN
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js';
  script.onload = init;
  document.head.appendChild(script);

  function init() {
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 30;
    controls.maxDistance = 200;

    // Node data: [label, x, y, z, size, color]
    const nodeData = [
      // Core Systems (center cluster)
      ['Letta', 0, 0, 0, 3.5, DARK],
      ['Claude Code', -8, 8, -5, 2.8, DARK],
      ['Mem0', 8, 6, -3, 2.8, DARK],
      ['MCP', 0, -10, 2, 3.0, 0xffb899],

      // Frameworks
      ['MemGPT', -15, 3, -8, 2.2, 0xff8f50],
      ['Zep', 15, -5, -10, 2.0, 0xff8f50],
      ['Cognee', -12, -8, 5, 1.8, 0xff8f50],
      ['LlamaIndex', 10, 12, -12, 2.0, 0xff8f50],
      ['LangMem', -5, 15, -8, 1.8, 0xff8f50],
      ['SuperMemory', 18, 8, 3, 1.8, 0xff8f50],
      ['Hindsight', -18, -5, 8, 1.5, 0xff8f50],
      ['Memobase', 12, -12, 10, 1.5, 0xff8f50],
      ['A-Mem', -8, 18, 5, 1.5, 0xff8f50],

      // Infrastructure
      ['Vector DB', 20, 0, 15, 2.5, 0xd44000],
      ['Knowledge Graph', -20, 10, 12, 2.0, 0xd44000],
      ['Embedding Store', 15, 15, -18, 1.8, 0xd44000],
      ['PostgreSQL/pgvector', -15, -15, 15, 1.8, 0xd44000],
      ['Redis Cache', 25, -8, 5, 1.5, 0xd44000],

      // Standards / Concepts (outer ring)
      ['Short-term', 0, 25, -20, 2.0, 0xffb899],
      ['Episodic', 30, 15, 10, 1.8, 0xffb899],
      ['Semantic', -28, 20, -15, 1.8, 0xffb899],
      ['Procedural', 0, -25, 25, 1.8, 0xffb899],
    ];

    const nodes = [];
    const labels = [];
    const nodeGroup = new THREE.Group();
    scene.add(nodeGroup);

    nodeData.forEach(([label, x, y, z, size, color]) => {
      // Glow sphere
      const geo = new THREE.SphereGeometry(size, 16, 16);
      const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.9 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, y, z);
      nodeGroup.add(mesh);
      nodes.push(mesh);

      // Outer glow ring
      const ringGeo = new THREE.RingGeometry(size * 1.4, size * 1.7, 32);
      const ringMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.position.set(x, y, z);
      nodeGroup.add(ring);

      // Label sprite
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = 'rgba(255,95,31,0.9)';
      ctx.font = 'bold 24px Segoe UI, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(label, 128, 40);
      const tex = new THREE.CanvasTexture(canvas);
      const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true });
      const sprite = new THREE.Sprite(spriteMat);
      sprite.position.set(x, y - size - 3, z);
      sprite.scale.set(12, 3, 1);
      nodeGroup.add(sprite);
      labels.push(sprite);
    });

    // Connection lines between nodes
    const connections = [
      [0,1],[0,2],[0,3],   // Letta connects to Claude Code, Mem0, MCP
      [1,4],[1,5],[1,6],   // Claude Code connects to frameworks
      [2,5],[2,6],[2,7],   // Mem0 connects
      [3,8],[3,9],[3,10],  // MCP connects to outer
      [4,5],[4,6],[4,11],
      [5,12],[5,13],[5,14],
      [6,15],[6,16],
      [7,17],[7,18],
      [0,16],[0,17],
      [1,19],[2,20],[3,21],[0,22],
      [19,20],[20,21],[21,22],[22,19],
      [8,19],[9,20],[10,21],[11,22],
    ];

    const lineMat = new THREE.LineBasicMaterial({ color: 0xff5f1f, transparent: true, opacity: 0.15 });
    connections.forEach(([a, b]) => {
      if (nodeData[a] && nodeData[b]) {
        const geo = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(...nodeData[a].slice(1, 4)),
          new THREE.Vector3(...nodeData[b].slice(1, 4)),
        ]);
        nodeGroup.add(new THREE.Line(geo, lineMat));
      }
    });

    // Particle field background
    const particleCount = 800;
    const pGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount * 3; i++) {
      pPos[i] = (Math.random() - 0.5) * 300;
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const pMat = new THREE.PointsMaterial({ color: 0xff5f1f, size: 0.5, transparent: true, opacity: 0.4 });
    scene.add(new THREE.Points(pGeo, pMat));

    let t = 0;
    function animate() {
      requestAnimationFrame(animate);
      t += 0.002;

      nodes.forEach((n, i) => {
        n.position.y += Math.sin(t + i * 0.5) * 0.005;
      });

      nodeGroup.rotation.y = t * 0.05;
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  }
})();
</script>
</body>
</html>
