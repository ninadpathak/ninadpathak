<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dimensionality Reduction | Ninad Pathak</title>
  <link rel="stylesheet" href="/static/css/visuals-base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .reduction-stage { flex: 1; display: flex; align-items: center; justify-content: center; gap: 80px; position: relative; }
    
    .box-3d { width: 120px; height: 120px; position: relative; transform-style: preserve-3d; animation: rotate 12s linear infinite; }
    .face { position: absolute; width: 100%; height: 100%; border: 1px solid var(--accent); opacity: 0.2; background: var(--bg); }
    .box-3d::after { content: '1536D_REPRESENTATION'; position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%); font-family: var(--mono); font-size: 9px; color: var(--accent); white-space: nowrap; }
    
    .arrow { font-size: 32px; color: var(--border); font-weight: 300; }
    
    .plane-2d { width: 120px; height: 120px; border: 1px solid var(--border); position: relative; background: rgba(0,0,0,0.02); }
    .plane-2d::after { content: '2D_PROJECTION'; position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%); font-family: var(--mono); font-size: 9px; color: var(--text-dim); white-space: nowrap; }
    .dot { width: 4px; height: 4px; background: var(--accent); position: absolute; border-radius: 50%; box-shadow: 0 0 8px var(--accent); }

    @keyframes rotate { from { transform: rotateX(0) rotateY(0); } to { transform: rotateX(360deg) rotateY(360deg); } }
    
    @media (max-width: 600px) {
      .reduction-stage { gap: 40px; }
      .box-3d, .plane-2d { width: 80px; height: 80px; }
    }
  </style>
</head>
<body>
  <div class="viz-container">
    <div class="header-meta">
      <div>
        <div class="label">// Latent_Space_Compression</div>
        <h1 class="title">Dimensionality Reduction</h1>
      </div>
      <div class="label" style="color: var(--text-dim);">Logic: PCA_TSNE</div>
    </div>
    
    <div class="reduction-stage">
      <div class="box-3d">
        <div class="face" style="transform: translateZ(60px)"></div>
        <div class="face" style="transform: rotateY(90deg) translateZ(60px)"></div>
        <div class="face" style="transform: rotateY(180deg) translateZ(60px)"></div>
        <div class="face" style="transform: rotateY(-90deg) translateZ(60px)"></div>
        <div class="face" style="transform: rotateX(90deg) translateZ(60px)"></div>
        <div class="face" style="transform: rotateX(-90deg) translateZ(60px)"></div>
      </div>
      
      <div class="arrow">→</div>
      
      <div class="plane-2d" id="plane"></div>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot"></div> COMPRESSION: 512:1</div>
      <div class="status-item">VAR_RETAINED: 94.2%</div>
    </div>
  </div>

  <script>
    const plane = document.getElementById('plane');
    for(let i=0; i<40; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.style.left = Math.random() * 116 + 'px';
      dot.style.top = Math.random() * 116 + 'px';
      plane.appendChild(dot);
    }
  </script>
<script>function sendHeight(){const h=document.documentElement.scrollHeight;window.parent.postMessage({type:"resize-iframe",height:h},"*")}window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);new ResizeObserver(sendHeight).observe(document.body);</script></body>
</html>
