<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASM VDB Binary Quantization</title>
    <style>
        :root {
            --bg-1: #ffffff;
            --bg-2: #efefed;
            --border: #e0e0dc;
            --text-1: #0e0e0e;
            --text-2: #3a3a3a;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --bg-2: #1a1a1a;
                --border: #1e1e1e;
                --text-1: #f0f0f0;
                --text-2: #c2c2c2;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }

        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            background: var(--bg-1); 
            font-family: var(--sans); 
            color: var(--text-1);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container { 
            width: 100%; 
            height: 100%;
            padding: 1.5rem;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            height: auto;
            max-height: 100%;
            overflow: visible;
        }

        .label { font-family: var(--mono); font-size: 20px; fill: var(--text-2); font-weight: 600; text-transform: uppercase; }
        .desc { font-family: var(--sans); font-size: 18px; fill: var(--text-3); }
        .box { fill: var(--bg-1); stroke: var(--border); stroke-width: 2; }
        .arrow { stroke: var(--text-3); stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
</head>
<body>
    <div class="container">
        <svg viewBox="0 0 1000 450" preserveAspectRatio="xMidYMid meet">
            <defs>
                <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                    <polygon points="0 0, 8 3, 0 6" fill="var(--text-3)" />
                </marker>
            </defs>
            
            <g transform="translate(100, 100)">
                <text x="0" y="-20" class="label">Float32 Vector (32 bits / dim)</text>
                <rect x="0" y="0" width="800" height="70" rx="4" class="box" />
                <text x="400" y="42" text-anchor="middle" class="label" style="font-size: 22px;">[ 0.12, -0.45, 0.89, -0.01, ... ]</text>
            </g>
            
            <path d="M 500 170 L 500 250" class="arrow" />
            <text x="520" y="220" class="label" style="fill: var(--accent);">Sign Threshold ( > 0 )</text>
            
            <g transform="translate(100, 270)">
                <text x="0" y="-20" class="label">Binary Vector (1 bit / dim)</text>
                <rect x="0" y="0" width="800" height="70" rx="4" class="box" style="stroke: var(--accent); stroke-width: 3;" />
                <text x="400" y="42" text-anchor="middle" class="label" style="font-size: 24px; fill: var(--accent);">[ 1, 0, 1, 0, ... ]</text>
            </g>
            
            <text x="500" y="400" text-anchor="middle" class="label" style="font-size: 26px; fill: var(--text-1);">Binary Quantization: 32x Reduction</text>
        </svg>
    </div>
</body>
</html>
