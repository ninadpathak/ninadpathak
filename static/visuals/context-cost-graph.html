<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cost of Context | Ninad Pathak</title>
  <link rel="stylesheet" href="/static/css/visuals-base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .chart-area { flex: 1; border-left: 1px solid var(--border); border-bottom: 1px solid var(--border); position: relative; margin: 20px 40px 40px 60px; min-height: 250px; }
    .line { fill: none; stroke: var(--accent); stroke-width: 3; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 2s forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    
    .axis-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); position: absolute; }
  </style>
</head>
<body>
  <div class="viz-container">
    <div class="header-meta">
      <div>
        <div class="label">// Resource_Economics</div>
        <h1 class="title">Quadratic Attention Cost</h1>
      </div>
      <div class="label" style="color: var(--text-dim);">Complexity: O(n²)</div>
    </div>

    <div class="chart-area">
      <svg width="100%" height="100%" viewBox="0 0 500 250" preserveAspectRatio="none">
        <path class="line" d="M 0 240 Q 250 230 500 10" />
      </svg>
      <div class="axis-label" style="bottom: -25px; left: 0;">1K TOKENS</div>
      <div class="axis-label" style="bottom: -25px; right: 0;">128K TOKENS</div>
      <div class="axis-label" style="top: 50%; left: -75px; transform: rotate(-90deg) translateY(-50%);">COMPUTE_MEMORY</div>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot"></div> OPTIMIZATION: FLASH_ATTN_2</div>
      <div class="status-item">SCALING: NON_LINEAR</div>
    </div>
  </div>
  <script>function sendHeight(){const h=document.body.scrollHeight;window.parent.postMessage({type:"resize-iframe",height:h},"*")}window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);new ResizeObserver(sendHeight).observe(document.body);</script>
</body>
</html>
