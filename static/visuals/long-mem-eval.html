<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LongMemEval Results | Ninad Pathak</title>
  <link rel="stylesheet" href="/static/css/visuals-base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { padding-bottom: 0; }
    .viz-container { margin-bottom: 0; }
    .chart { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; padding-bottom: 10px; }
    .row { display: grid; grid-template-columns: 140px 1fr 40px; align-items: center; gap: 20px; }
    .bar-name { font-family: var(--mono); font-size: 11px; text-align: right; color: var(--text-dim); }
    .track { height: 16px; background: var(--bg); border: 1px solid var(--border); position: relative; overflow: hidden; }
    .fill { height: 100%; background: var(--accent); width: 0%; transition: width 1.5s cubic-bezier(0.16, 1, 0.3, 1); }
    .bar-val { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--accent); }
    
    .baseline-row { margin-top: 8px; border-top: 1px dashed var(--border); padding-top: 12px; }
    .baseline-row .fill { background: var(--text-dim); opacity: 0.3; }
    .baseline-row .bar-val { color: var(--text-dim); }
    
    .status-bar { margin-top: 20px; }
  </style>
</head>
<body>
  <div class="viz-container">
    <div class="header-meta">
      <div>
        <div class="label">// Benchmark_Results</div>
        <h1 class="title">LongMemEval-S (2026)</h1>
      </div>
      <div class="label" style="color: var(--text-dim);">Metric: Reasoning_Accuracy_%</div>
    </div>
    
    <div class="chart">
      <div class="row">
        <div class="bar-name">Hindsight</div>
        <div class="track"><div class="fill" style="width: 91.4%"></div></div>
        <div class="bar-val">91.4</div>
      </div>
      <div class="row">
        <div class="bar-name">EmergenceMem</div>
        <div class="track"><div class="fill" style="width: 86.0%"></div></div>
        <div class="bar-val">86.0</div>
      </div>
      <div class="row">
        <div class="bar-name">TiMem</div>
        <div class="track"><div class="fill" style="width: 76.8%"></div></div>
        <div class="bar-val">76.8</div>
      </div>
      <div class="row">
        <div class="bar-name">Zep+GPT-4o</div>
        <div class="track"><div class="fill" style="width: 71.2%"></div></div>
        <div class="bar-val">71.2</div>
      </div>
      <div class="row baseline-row">
        <div class="bar-name">Vanilla GPT-4o</div>
        <div class="track"><div class="fill" style="width: 60.6%"></div></div>
        <div class="bar-val">60.6</div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot"></div> TEST_ID: LME_2026_01</div>
      <div class="status-item">WINDOW: 128K</div>
    </div>
  </div>
  <script>function sendHeight(){const h=document.documentElement.scrollHeight;window.parent.postMessage({type:"resize-iframe",height:h},"*")}window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);new ResizeObserver(sendHeight).observe(document.body);</script>
</body>
</html>
