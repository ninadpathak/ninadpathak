<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON vs YAML Tokens</title>
    <style>
        :root {
            --bg-1: #ffffff;
            --text-1: #0e0e0e;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --text-1: #f0f0f0;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }
        
        body { margin: 0; height: 100vh; background: var(--bg-1); font-family: var(--mono); color: var(--text-1); overflow: hidden; display: flex; align-items: center; justify-content: center;}
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;}
        
        .overlay {
            position: absolute;
            top: 2rem;
            left: 2rem;
            font-size: 12px;
            pointer-events: none;
            background: var(--bg-1);
            padding: 10px;
            border: 1px solid var(--text-3);
            z-index: 10;
        }
        .stat { color: var(--accent); }
    
        .label3d {
            position: absolute;
            color: var(--text-1);
            font-family: var(--mono);
            font-size: 14px;
            font-weight: bold;
            pointer-events: none;
            transform: translate(-50%, -50%);
            text-shadow: 0 0 3px var(--bg-1), 0 0 5px var(--bg-1);
            text-align: center;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="overlay">
        Format Weight Comparison <br>
        JSON Weight: <span class="stat">28 Tokens (Heavy)</span><br>
        YAML Weight: <span class="stat">16 Tokens (Light)</span>
        <div style="font-size: 10px; color: var(--text-3); margin-top: 8px;">Drag to rotate</div>
    </div>

    <script>
        const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const colorBg = isDark ? 0x111111 : 0xffffff;
        const colorPoint = isDark ? 0xff5f1f : 0xd44000;
        const colorText = isDark ? 0xffffff : 0x000000;
        const colorWire = isDark ? 0x444444 : 0xcccccc;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(colorBg);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 16);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Group to hold the blocks
        const group = new THREE.Group();
        scene.add(group);

        const createStack = (xPos, numTokens, label, isHeavy) => {
            const stackGroup = new THREE.Group();
            
            for(let i=0; i<numTokens; i++) {
                const height = 0.2;
                const geo = new THREE.BoxGeometry(2, height, 2);
                const edges = new THREE.EdgesGeometry(geo);
                
                // Emphasize the "heavy" syntax tokens in JSON
                const col = (isHeavy && i > 15) ? colorPoint : colorWire;
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: col, linewidth: 1 }));
                
                const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: colorBg, transparent: true, opacity: 0.8 }));
                
                const block = new THREE.Group();
                block.add(mesh);
                block.add(line);
                block.position.y = i * (height + 0.05);
                stackGroup.add(block);
            }
            
            stackGroup.position.x = xPos;
            stackGroup.position.y = - (numTokens * 0.25) / 2;
            return stackGroup;
        };

        const jsonStack = createStack(-3, 28, "JSON", true);
        const yamlStack = createStack(3, 16, "YAML", false);

        group.add(jsonStack);
        group.add(yamlStack);

        
        // Add HTML labels that track the 3D objects
        const createLabel = (text) => {
            const div = document.createElement('div');
            div.className = 'label3d';
            div.innerHTML = text;
            document.body.appendChild(div);
            return div;
        };

        const lblJson = createLabel('JSON<br><span style="font-size: 10px; color: var(--accent);">28 Tokens</span>');
        const lblYaml = createLabel('YAML<br><span style="font-size: 10px; color: var(--accent);">16 Tokens</span>');

        const updateLabelPosition = (mesh, labelDiv, yOffset) => {
            const vector = new THREE.Vector3();
            mesh.getWorldPosition(vector);
            vector.y += yOffset; // float above the stack
            vector.project(camera);
            
            const x = (vector.x * .5 + .5) * window.innerWidth;
            const y = (vector.y * -.5 + .5) * window.innerHeight;
            
            labelDiv.style.left = `${x}px`;
            labelDiv.style.top = `${y}px`;
        };

        let time = 0;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Gentle floating
            jsonStack.position.y = (-28 * 0.25) / 2 + Math.sin(time) * 0.1;
            yamlStack.position.y = (-16 * 0.25) / 2 + Math.sin(time + Math.PI) * 0.1;

            
            updateLabelPosition(jsonStack, lblJson, 3);
            updateLabelPosition(yamlStack, lblYaml, 2);

            time += 0.02;
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
