<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Implementation Flow</title>
    <style>
        :root {
            --bg-1: #ffffff;
            --bg-2: #efefed;
            --border: #e0e0dc;
            --text-1: #0e0e0e;
            --text-2: #3a3a3a;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --bg-2: #1a1a1a;
                --border: #1e1e1e;
                --text-1: #f0f0f0;
                --text-2: #c2c2c2;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }
        body { margin: 0; height: 100vh; height: 100vh; background: var(--bg-1); font-family: var(--sans); color: var(--text-1);  display: flex; align-items: center; justify-content: center; min-  overflow: hidden; }
        .container { width: 100%; max-width: 600px; padding: 2rem; box-sizing: border-box; display: flex; flex-direction: column; gap: 2rem; }
        .box { border: 1px solid var(--border); padding: 1rem; background: var(--bg-1); text-align: center; }
        .mono { font-family: var(--mono); font-size: 0.85rem; }
        .accent { color: var(--accent); }
        .text-3 { color: var(--text-3); }
        .flex-row { display: flex; gap: 1rem; justify-content: space-between; align-items: center; width: 100%; }
        .flex-col { display: flex; flex-direction: column; gap: 1rem; }
        .arrow { color: var(--text-3); font-family: var(--mono); text-align: center; }
        @media (max-width: 600px) { .flex-row { flex-direction: column; } .arrow { transform: rotate(90deg); } .no-rotate { transform: none !important; } }
</style>
</head>
<body>
    <div class="container" id="root">
        
<div class="flex-col" style="width: 100%; gap: 0.5rem;">
    <div class="box mono" style="text-align:left; background: var(--bg-2); border: none; border-left: 2px solid var(--text-3);">
        <span style="color:var(--text-3)">1.</span> docs = vector_db.search(query, k=100)
    </div>
    <div class="arrow no-rotate" style="margin: 0">↓</div>
    <div class="box mono" style="text-align:left; background: var(--bg-2); border: none; border-left: 2px solid var(--accent);">
        <span style="color:var(--text-3)">2.</span> pairs = [[query, doc.text] for doc in docs]
    </div>
    <div class="arrow no-rotate" style="margin: 0">↓</div>
    <div class="box mono" style="text-align:left; background: var(--bg-2); border: none; border-left: 2px solid var(--accent);">
        <span style="color:var(--text-3)">3.</span> scores = reranker.predict(pairs)
    </div>
    <div class="arrow no-rotate" style="margin: 0">↓</div>
    <div class="box mono" style="text-align:left; background: var(--bg-2); border: none; border-left: 2px solid var(--text-1);">
        <span style="color:var(--text-3)">4.</span> final_docs = sort(docs, scores)[:5]
    </div>
</div>

    </div>
</body>
</html>
