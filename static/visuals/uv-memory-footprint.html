<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uv Memory Footprint</title>
    <style>
        :root {
            --bg-1: #ffffff;
            --bg-2: #efefed;
            --border: #e0e0dc;
            --text-1: #0e0e0e;
            --text-2: #3a3a3a;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --bg-2: #1a1a1a;
                --border: #1e1e1e;
                --text-1: #f0f0f0;
                --text-2: #c2c2c2;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }

        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            background: var(--bg-1); 
            font-family: var(--sans); 
            color: var(--text-1);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container { 
            width: 100%; 
            height: 100%;
            padding: 1rem;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            height: auto;
            max-height: 100%;
            overflow: visible;
        }

        /* Large Standardized Fonts */
        .bar-label { font-family: var(--mono); font-size: 22px; fill: var(--text-2); font-weight: 600; text-transform: uppercase; }
        .bar-val { font-family: var(--mono); font-size: 24px; fill: var(--accent); font-weight: 700; }
        .tick-label { font-family: var(--mono); font-size: 18px; fill: var(--text-3); }
        .chart-title { font-family: var(--mono); font-size: 26px; fill: var(--text-1); font-weight: 700; text-transform: uppercase; }
        
        .axis { stroke: var(--text-1); stroke-width: 2; vector-effect: non-scaling-stroke; }
        .grid { stroke: var(--border); stroke-width: 1.5; stroke-dasharray: 4; vector-effect: non-scaling-stroke; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Optimized ViewBox for clarity and scale -->
        <svg viewBox="0 0 1000 400" preserveAspectRatio="xMidYMid meet">
            <!-- Grid Lines -->
            <line x1="250" y1="80" x2="250" y2="300" class="axis" />
            <line x1="250" y1="300" x2="950" y2="300" class="axis" />
            
            <!-- Scale: 1MB = 0.6 units approx. Let's adjust for 1000MB = 600 units -->
            <!-- Intervals: 250MB, 500MB, 750MB, 1000MB -->
            <g transform="translate(250, 0)">
                <line x1="150" y1="80" x2="150" y2="300" class="grid" />
                <text x="150" y="330" text-anchor="middle" class="tick-label">250MB</text>
                
                <line x1="300" y1="80" x2="300" y2="300" class="grid" />
                <text x="300" y="330" text-anchor="middle" class="tick-label">500MB</text>
                
                <line x1="450" y1="80" x2="450" y2="300" class="grid" />
                <text x="450" y="330" text-anchor="middle" class="tick-label">750MB</text>
                
                <line x1="600" y1="80" x2="600" y2="300" class="grid" />
                <text x="600" y="330" text-anchor="middle" class="tick-label">1000MB</text>
            </g>

            <!-- Bars -->
            <!-- Poetry: 1100MB -> 660 units -->
            <g>
                <text x="240" y="145" text-anchor="end" class="bar-label">Poetry Resolver</text>
                <rect x="250" y="110" width="660" height="50" fill="var(--bg-2)" />
                <text x="920" y="145" class="bar-val">1.1 GB</text>
            </g>

            <!-- uv: 42MB -> 25.2 units -->
            <g>
                <text x="240" y="245" text-anchor="end" class="bar-label">uv Resolver</text>
                <rect x="250" y="210" width="25.2" height="50" fill="var(--accent)" />
                <text x="285" y="245" class="bar-val">42 MB</text>
            </g>

            <text x="500" y="40" text-anchor="middle" class="chart-title">Peak Memory during Resolution</text>
        </svg>
    </div>
</body>
</html>
