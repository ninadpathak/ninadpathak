<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graph Memory | Ninad Pathak</title>
  <link rel="stylesheet" href="/static/css/visuals-base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .graph-stage { 
      height: 350px; 
      border: 1px solid var(--border); 
      position: relative; 
      overflow: hidden; 
      background: var(--bg); 
      margin: 10px 0;
    }
    .node { width: 14px; height: 14px; border-radius: 50%; background: var(--accent); position: absolute; transition: all 0.5s; z-index: 10; border: 2px solid var(--bg); }
    .line { position: absolute; background: var(--accent); height: 1.5px; transform-origin: 0 0; z-index: 5; opacity: 0.15; }
    
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(212, 64, 0, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(212, 64, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(212, 64, 0, 0); } }
    
    .node-label { position: absolute; font-family: var(--mono); font-size: 10px; color: var(--text-dim); transform: translate(18px, -4px); white-space: nowrap; }
    
    .query-terminal {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.03);
      border: 1px solid var(--border);
      padding: 10px 15px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      z-index: 20;
      width: calc(100% - 40px);
    }

    .reasoning-path {
      position: absolute;
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      z-index: 15;
      box-shadow: 0 0 10px var(--accent);
      display: none;
    }
  </style>
</head>
<body>
  <div class="viz-container">
    <div class="header-meta">
      <div>
        <div class="label">// Knowledge_Graph_Inference</div>
        <h1 class="title">Cognee: Multi-Hop Reasoning</h1>
      </div>
      <div class="label" style="color: var(--text-dim);">Semantic_Connectivity</div>
    </div>
    
    <div class="graph-stage" id="stage">
      <div class="query-terminal" id="terminal">&gt; INITIALIZING_REASONING_ENGINE...</div>
      <div id="links"></div>
      <div id="nodes"></div>
      <div id="path-dot" class="reasoning-path"></div>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot pulse"></div> ENGINE: COGNEE_CORE</div>
      <div class="status-item" id="hop-status">HOP: 0</div>
    </div>
  </div>

  <script>
    const nodesContainer = document.getElementById('nodes');
    const linksContainer = document.getElementById('links');
    const terminal = document.getElementById('terminal');
    const pathDot = document.getElementById('path-dot');
    const hopStatus = document.getElementById('hop-status');
    
    const nodes = [
      { x: 100, y: 150, label: 'Bug_Report #402' },
      { x: 250, y: 100, label: 'Commit_hash: f92k' },
      { x: 220, y: 250, label: 'Module: Auth_Layer' },
      { x: 450, y: 150, label: 'Developer: Alice' },
      { x: 400, y: 280, label: 'Team: Security' }
    ];

    const links = [
      { from: 0, to: 1 }, { from: 1, to: 3 }, { from: 0, to: 2 }, { from: 3, to: 4 }
    ];

    nodes.forEach((n, i) => {
      const el = document.createElement('div');
      el.className = 'node';
      el.id = 'node-' + i;
      el.style.left = n.x + 'px';
      el.style.top = n.y + 'px';
      nodesContainer.appendChild(el);
      
      const lbl = document.createElement('div');
      lbl.className = 'node-label';
      lbl.style.left = n.x + 'px';
      lbl.style.top = n.y + 'px';
      lbl.innerText = n.label;
      nodesContainer.appendChild(lbl);
    });

    links.forEach(l => {
      const n1 = nodes[l.from];
      const n2 = nodes[l.to];
      const line = document.createElement('div');
      line.className = 'line';
      const dist = Math.sqrt((n2.x - n1.x)**2 + (n2.y - n1.y)**2);
      const angle = Math.atan2(n2.y - n1.y, n2.x - n1.x);
      line.style.width = dist + 'px';
      line.style.left = (n1.x + 7) + 'px';
      line.style.top = (n1.y + 7) + 'px';
      line.style.transform = `rotate(${angle}rad)`;
      linksContainer.appendChild(line);
    });

    const chain = [0, 1, 3, 4];
    let step = 0;

    async function runReasoning() {
      if(step >= chain.length) {
        step = 0;
        pathDot.style.display = 'none';
        terminal.innerText = "> REASONING_COMPLETE. AUTHORITATIVE_NODE_FOUND.";
        await new Promise(r => setTimeout(r, 2000));
      }

      const nodeIdx = chain[step];
      const node = nodes[nodeIdx];
      
      pathDot.style.display = 'block';
      pathDot.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
      pathDot.style.left = (node.x + 3) + 'px';
      pathDot.style.top = (node.y + 3) + 'px';
      
      document.querySelectorAll('.node').forEach(n => n.classList.remove('pulse'));
      document.getElementById('node-' + nodeIdx).classList.add('pulse');
      
      terminal.innerText = `> HOP_${step}: ANALYZING_${node.label.toUpperCase()}`;
      hopStatus.innerText = `HOP: ${step}`;
      
      step++;
      setTimeout(runReasoning, 1200);
    }

    setTimeout(runReasoning, 1000);

    function sendHeight(){const h=document.documentElement.scrollHeight;window.parent.postMessage({type:"resize-iframe",height:h},"*")}window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);new ResizeObserver(sendHeight).observe(document.body);
  </script>
</body>
</html>
