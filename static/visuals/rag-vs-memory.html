<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG vs Memory - 3D Architecture</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        .label {
            position: absolute;
            color: #ff5f1f;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255,95,31,0.5);
        }
        .legend {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            color: #fff;
            font-size: 12px;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .legend-dot.rag { background: #ff5f1f; box-shadow: 0 0 8px #ff5f1f; }
        .legend-dot.mem { background: #d44000; box-shadow: 0 0 8px #d44000; }
        .legend-dot.llm { background: #fff; box-shadow: 0 0 8px #fff; }
    </style>
</head>
<body>
    <div id="rag-label" class="label">RAG Pipeline</div>
    <div id="mem-label" class="label">Memory Pipeline</div>
    <div id="llm-label" class="label">LLM</div>
    <div id="vec-label" class="label" style="color:#d44000;">Vector DB</div>
    <div id="store-label" class="label" style="color:#d44000;">Memory Store</div>
    <div class="legend">
        <div class="legend-item"><div class="legend-dot rag"></div>RAG Path</div>
        <div class="legend-item"><div class="legend-dot mem"></div>Memory Path</div>
        <div class="legend-item"><div class="legend-dot llm"></div>LLM Core</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        scene.fog = new THREE.Fog(0x0a0a0a, 15, 35);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 14);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 8;
        controls.maxDistance = 25;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        // Materials
        const orangeMat = new THREE.MeshStandardMaterial({
            color: 0xff5f1f,
            emissive: 0xff5f1f,
            emissiveIntensity: 0.4,
            metalness: 0.3,
            roughness: 0.6
        });
        const darkMat = new THREE.MeshStandardMaterial({
            color: 0xd44000,
            emissive: 0xd44000,
            emissiveIntensity: 0.3,
            metalness: 0.3,
            roughness: 0.6
        });
        const whiteMat = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            emissive: 0xffffff,
            emissiveIntensity: 0.5,
            metalness: 0.5,
            roughness: 0.4
        });

        // User input sphere
        const inputGeo = new THREE.SphereGeometry(0.6, 32, 32);
        const inputMesh = new THREE.Mesh(inputGeo, new THREE.MeshStandardMaterial({
            color: 0x888888, emissive: 0xaaaaaa, emissiveIntensity: 0.2, metalness: 0.8, roughness: 0.3
        }));
        inputMesh.position.set(0, 5, -6);
        scene.add(inputMesh);

        // RAG path - Vector DB
        const vecDbGeo = new THREE.BoxGeometry(1.5, 2, 1.5);
        const vecDb = new THREE.Mesh(vecDbGeo, orangeMat.clone());
        vecDb.position.set(-5, 1, 0);
        scene.add(vecDb);

        // RAG path - Retrieval flow (floating cubes)
        const ragCubes = [];
        for (let i = 0; i < 6; i++) {
            const geo = new THREE.BoxGeometry(0.35, 0.35, 0.35);
            const mat = orangeMat.clone();
            const cube = new THREE.Mesh(geo, mat);
            cube.position.set(-3 + Math.random() * 1.5, 1.5 + i * 0.5, -2 + Math.random() * 2);
            cube.userData = { baseY: cube.position.y, phase: Math.random() * Math.PI * 2 };
            ragCubes.push(cube);
            scene.add(cube);
        }

        // Memory path - Memory Store
        const memStoreGeo = new THREE.BoxGeometry(1.5, 2, 1.5);
        const memStore = new THREE.Mesh(memStoreGeo, darkMat.clone());
        memStore.position.set(5, 1, 0);
        scene.add(memStore);

        // Memory path - floating elements
        const memCubes = [];
        for (let i = 0; i < 6; i++) {
            const geo = new THREE.BoxGeometry(0.35, 0.35, 0.35);
            const mat = darkMat.clone();
            const cube = new THREE.Mesh(geo, mat);
            cube.position.set(3 + Math.random() * 1.5, 1.5 + i * 0.5, -2 + Math.random() * 2);
            cube.userData = { baseY: cube.position.y, phase: Math.random() * Math.PI * 2 };
            memCubes.push(cube);
            scene.add(cube);
        }

        // LLM Core - large sphere
        const llmGeo = new THREE.SphereGeometry(1.4, 64, 64);
        const llmCore = new THREE.Mesh(llmGeo, whiteMat);
        llmCore.position.set(0, 1.5, 2);
        scene.add(llmCore);

        // Connecting tubes
        function createTube(points, color, radius = 0.06) {
            const curve = new THREE.CatmullRomCurve3(points);
            const geo = new THREE.TubeGeometry(curve, 32, radius, 8, false);
            const mat = new THREE.MeshStandardMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.3,
                transparent: true,
                opacity: 0.7
            });
            return new THREE.Mesh(geo, mat);
        }

        // RAG tubes to LLM
        const ragTube = createTube([
            new THREE.Vector3(-4.2, 1.5, 0),
            new THREE.Vector3(-2, 1.5, 1),
            new THREE.Vector3(-0.8, 1.5, 1.8)
        ], 0xff5f1f, 0.08);
        scene.add(ragTube);

        // Memory tubes to LLM
        const memTube = createTube([
            new THREE.Vector3(4.2, 1.5, 0),
            new THREE.Vector3(2, 1.5, 1),
            new THREE.Vector3(0.8, 1.5, 1.8)
        ], 0xd44000, 0.08);
        scene.add(memTube);

        // Input to RAG
        const inRagTube = createTube([
            new THREE.Vector3(0, 5, -6),
            new THREE.Vector3(-2, 3, -3),
            new THREE.Vector3(-4, 2, -1)
        ], 0xff5f1f, 0.05);
        scene.add(inRagTube);

        // Input to Memory
        const inMemTube = createTube([
            new THREE.Vector3(0, 5, -6),
            new THREE.Vector3(2, 3, -3),
            new THREE.Vector3(4, 2, -1)
        ], 0xd44000, 0.05);
        scene.add(inMemTube);

        // RAG pipeline label
        const ragArrowGeo = new THREE.ConeGeometry(0.15, 0.4, 8);
        const ragArrow = new THREE.Mesh(ragArrowGeo, orangeMat);
        ragArrow.position.set(-3.5, 2, -1);
        ragArrow.rotation.z = Math.PI / 2;
        scene.add(ragArrow);

        // Memory pipeline label
        const memArrow = new THREE.Mesh(ragArrowGeo.clone(), darkMat);
        memArrow.position.set(3.5, 2, -1);
        memArrow.rotation.z = -Math.PI / 2;
        scene.add(memArrow);

        // Particle system on tubes
        const particleCount = 100;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        const particleColors = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount; i++) {
            particlePositions[i * 3] = (Math.random() - 0.5) * 12;
            particlePositions[i * 3 + 1] = Math.random() * 8;
            particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 8;

            if (Math.random() > 0.5) {
                particleColors[i * 3] = 1;
                particleColors[i * 3 + 1] = 95/255;
                particleColors[i * 3 + 2] = 31/255;
            } else {
                particleColors[i * 3] = 212/255;
                particleColors[i * 3 + 1] = 64/255;
                particleColors[i * 3 + 2] = 0;
            }
        }

        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

        const particleMat = new THREE.PointsMaterial({
            size: 0.08,
            vertexColors: true,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });

        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);

        const ragLight = new THREE.PointLight(0xff5f1f, 1, 15);
        ragLight.position.set(-5, 3, 1);
        scene.add(ragLight);

        const memLight = new THREE.PointLight(0xd44000, 1, 15);
        memLight.position.set(5, 3, 1);
        scene.add(memLight);

        const llmLight = new THREE.PointLight(0xffffff, 1.5, 12);
        llmLight.position.set(0, 4, 3);
        scene.add(llmLight);

        // Ground grid
        const gridHelper = new THREE.GridHelper(20, 20, 0x333333, 0x222222);
        gridHelper.position.y = -1;
        scene.add(gridHelper);

        // Animation
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            controls.update();

            // Animate floating cubes
            ragCubes.forEach(cube => {
                cube.position.y = cube.userData.baseY + Math.sin(time * 2 + cube.userData.phase) * 0.2;
                cube.rotation.x += 0.01;
                cube.rotation.y += 0.015;
            });

            memCubes.forEach(cube => {
                cube.position.y = cube.userData.baseY + Math.sin(time * 2 + cube.userData.phase) * 0.2;
                cube.rotation.x += 0.01;
                cube.rotation.y += 0.015;
            });

            // Pulse LLM core
            const pulse = 1 + Math.sin(time * 3) * 0.05;
            llmCore.scale.set(pulse, pulse, pulse);

            // Animate particles upward
            const positions = particles.geometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3 + 1] += 0.005;
                if (positions[i * 3 + 1] > 8) positions[i * 3 + 1] = 0;
            }
            particles.geometry.attributes.position.needsUpdate = true;

            // Rotate input sphere
            inputMesh.rotation.y += 0.005;

            // Light pulsing
            ragLight.intensity = 1 + Math.sin(time * 2) * 0.3;
            memLight.intensity = 1 + Math.sin(time * 2 + 1) * 0.3;
            llmLight.intensity = 1.5 + Math.sin(time * 4) * 0.5;

            renderer.render(scene, camera);
        }

        // Label positioning
        function updateLabels() {
            const updateLabel = (id, pos) => {
                const vector = pos.clone().project(camera);
                const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                const y = (-(vector.y * 0.5) + 0.5) * window.innerHeight;
                const el = document.getElementById(id);
                el.style.left = x + 'px';
                el.style.top = y + 'px';
            };

            updateLabel('rag-label', new THREE.Vector3(-5, 3.5, 0));
            updateLabel('mem-label', new THREE.Vector3(5, 3.5, 0));
            updateLabel('llm-label', new THREE.Vector3(0, 4.2, 2));
            updateLabel('vec-label', new THREE.Vector3(-5, -0.8, 0));
            updateLabel('store-label', new THREE.Vector3(5, -0.8, 0));
        }

        function renderLoop() {
            animate();
            updateLabels();
            requestAnimationFrame(renderLoop);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        renderLoop();
    </script>
</body>
</html>
