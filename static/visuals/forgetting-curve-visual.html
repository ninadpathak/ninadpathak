<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Visual | Active Forgetting Minimal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f8f6;
      --accent: #d44000;
      --border: #e0e0dc;
      --text: #0e0e0e;
      --text-dim: #888;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #e0e0dc;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: var(--sans);
      color: var(--text);
    }

    /* 1080x1080 Square Visual */
    .visual-canvas {
      width: 1080px;
      height: 1080px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 80px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.1);
    }

    /* Subtle Grid */
    .visual-canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    /* Content Wrapper */
    .content-layer {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* --- HEADER --- */
    .header {
      margin-bottom: 60px;
    }
    .label {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .label::before { content: '//'; opacity: 0.5; }
    .title {
      font-size: 72px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    /* --- LARGE GRAPH --- */
    .graph-container {
      flex: 1;
      width: 100%;
      background: #ffffff;
      border: 1px solid var(--border);
      padding: 60px;
      position: relative;
      box-shadow: 0 20px 40px rgba(0,0,0,0.03);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    
    .axis-line { stroke: var(--border); stroke-width: 3; }
    .axis-label { font-family: var(--mono); font-size: 16px; fill: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    
    .pruning-line { stroke: var(--text-dim); stroke-width: 2; stroke-dasharray: 8 8; }
    
    .curve-noise { fill: none; stroke: var(--text-dim); stroke-width: 4; }
    .curve-signal { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; }
    .curve-jump { stroke: var(--accent); stroke-width: 3; stroke-dasharray: 6 6; }

    .svg-text { font-family: var(--sans); font-size: 18px; fill: var(--text-dim); font-weight: 500; paint-order: stroke fill; stroke: #ffffff; stroke-width: 6px; stroke-linecap: round; stroke-linejoin: round; }
    .svg-text-accent { font-family: var(--sans); font-size: 20px; fill: var(--accent); font-weight: 700; paint-order: stroke fill; stroke: #ffffff; stroke-width: 6px; stroke-linecap: round; stroke-linejoin: round; }
    .svg-text-mono { font-family: var(--mono); font-size: 16px; fill: var(--text-dim); font-weight: 600; letter-spacing: 0.05em; paint-order: stroke fill; stroke: #ffffff; stroke-width: 6px; stroke-linecap: round; stroke-linejoin: round;}

    /* --- CHART WATERMARK --- */
    .chart-watermark {
      position: absolute;
      bottom: 25px;
      right: 35px;
      font-family: var(--mono);
      font-size: 18px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      opacity: 0.7;
    }

  </style>
</head>
<body>

  <div class="visual-canvas">
    <div class="content-layer">
      
      <div class="header">
        <div class="label">Cognitive_Architecture</div>
        <h1 class="title">Active Forgetting in AI Memory</h1>
      </div>

      <div class="graph-container">
        <!-- Expanded SVG for larger visual impact -->
        <svg viewBox="0 0 800 520">
          
          <!-- Axes -->
          <line x1="60" y1="460" x2="760" y2="460" class="axis-line" />
          <line x1="60" y1="40" x2="60" y2="460" class="axis-line" />
          
          <!-- Pruning Threshold -->
          <line x1="60" y1="360" x2="760" y2="360" class="pruning-line" />
          <text x="80" y="345" class="svg-text-mono">PRUNING_THRESHOLD (EVICTION)</text>

          <!-- Noise Curve (Unaccessed) -->
          <path d="M 60 80 C 140 360, 200 440, 320 440" class="curve-noise" />
          <circle cx="320" cy="440" r="6" fill="#888" />
          <text x="340" y="446" class="svg-text">Unaccessed Noise (Purged)</text>

          <!-- Signal Curve (Spaced Repetition / Consolidation) -->
          <!-- 1st Segment -->
          <path d="M 60 80 Q 140 280, 220 300" class="curve-signal" />
          <line x1="220" y1="300" x2="220" y2="80" class="curve-jump" />
          <text x="220" y="60" class="svg-text-accent" text-anchor="middle">Access Event</text>
          
          <!-- 2nd Segment -->
          <path d="M 220 80 Q 340 220, 460 240" class="curve-signal" />
          <line x1="460" y1="240" x2="460" y2="80" class="curve-jump" />
          <text x="460" y="60" class="svg-text-accent" text-anchor="middle">Access Event</text>

          <!-- 3rd Segment (Consolidated) -->
          <path d="M 460 80 Q 640 120, 740 140" class="curve-signal" />
          <circle cx="740" cy="140" r="8" fill="var(--accent)" />
          <text x="480" y="110" class="svg-text-accent">Consolidated Memory (Retained)</text>

          <!-- Axis Labels -->
          <text x="60" y="500" class="axis-label">Time</text>
          <text x="-280" y="35" class="axis-label" transform="rotate(-90)">Memory Activation Weight</text>

        </svg>

        <!-- Watermark strictly inside the white chart container -->
        <div class="chart-watermark">ninadpathak.com</div>
      </div>

    </div>
  </div>

<script>function sendHeight(){const h=document.body.scrollHeight;window.parent.postMessage({type:"resize-iframe",height:h},"*")}window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);new ResizeObserver(sendHeight).observe(document.body);</script></body>
</html>
