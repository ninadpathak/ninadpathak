<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letta Paging | Ninad Pathak</title>
  <link rel="stylesheet" href="/static/css/visuals-base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .paging-stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 60px;
      position: relative;
    }

    .node {
      width: 160px;
      height: 160px;
      border: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      transition: all var(--t);
    }

    .node::before {
      content: '';
      position: absolute;
      inset: -1px;
      border: 1px solid transparent;
      transition: all var(--t);
    }

    .node.active { border-color: var(--accent); }
    .node.active::before { border-color: var(--accent); inset: -6px; opacity: 0.2; }

    .node-title { font-family: var(--mono); font-size: 11px; font-weight: 600; margin-bottom: 8px; }
    .node-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }

    .connector {
      flex: 1;
      height: 1px;
      background: var(--border);
      position: relative;
      max-width: 100px;
    }

    .data-packet {
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--accent);
      top: -3px;
      left: 0;
      opacity: 0;
    }

    @keyframes moveRight {
      0% { left: 0; opacity: 0; transform: scale(0.5); }
      20% { opacity: 1; transform: scale(1); }
      80% { opacity: 1; transform: scale(1); }
      100% { left: 100%; opacity: 0; transform: scale(0.5); }
    }

    @keyframes moveLeft {
      0% { left: 100%; opacity: 0; transform: scale(0.5); }
      20% { opacity: 1; transform: scale(1); }
      80% { opacity: 1; transform: scale(1); }
      100% { left: 0; opacity: 0; transform: scale(0.5); }
    }

    .call-log {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      background: var(--bg);
      padding: 4px 12px;
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="viz-container">
    <div class="header-meta">
      <div>
        <div class="label">// Virtual_Context</div>
        <h1 class="title">Letta Paging Loop</h1>
      </div>
      <div class="label" style="color: var(--text-dim);">Autonomous_OS</div>
    </div>

    <div class="paging-stage">
      <div class="node active" id="llm">
        <div class="node-title">CONTEXT_WINDOW</div>
        <div class="node-label">Volatile RAM</div>
      </div>
      
      <div class="connector">
        <div class="data-packet" id="packet"></div>
      </div>

      <div class="node" id="storage">
        <div class="node-title">ARCHIVAL_DB</div>
        <div class="node-label">Persistent Disk</div>
      </div>

      <div class="call-log" id="log">SYSTEM_IDLE</div>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot pulse"></div> RUNNING</div>
      <div class="status-item" id="paging-status">PAGING_INACTIVE</div>
      <div class="status-item">MEM_USAGE: 42%</div>
    </div>
  </div>

  <script>
    const packet = document.getElementById('packet');
    const log = document.getElementById('log');
    const status = document.getElementById('paging-status');
    const nodes = { llm: document.getElementById('llm'), storage: document.getElementById('storage') };

    const sequences = [
      { dir: 'right', msg: 'core_memory_append(...)', status: 'WRITING_TO_DISK' },
      { dir: 'left', msg: 'archival_memory_search(...)', status: 'READING_FROM_DISK' }
    ];

    let seqIdx = 0;

    function runSequence() {
      const s = sequences[seqIdx];
      packet.style.animation = 'none';
      packet.offsetHeight; // trigger reflow
      packet.style.animation = (s.dir === 'right' ? 'moveRight' : 'moveLeft') + ' 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards';
      
      log.innerText = s.msg;
      status.innerText = s.status;
      
      const activeNode = s.dir === 'right' ? nodes.llm : nodes.storage;
      activeNode.style.transform = 'scale(1.05)';
      setTimeout(() => activeNode.style.transform = 'scale(1)', 200);

      seqIdx = (seqIdx + 1) % sequences.length;
      setTimeout(runSequence, 2500);
    }

    setTimeout(runSequence, 1000);
  </script>
<script>function sendHeight(){const h=document.documentElement.scrollHeight;window.parent.postMessage({type:"resize-iframe",height:h},"*")}window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);new ResizeObserver(sendHeight).observe(document.body);</script></body>
</html>
