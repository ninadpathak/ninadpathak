<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Hierarchy in AI Systems</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
    #canvas-container { width: 100vw; height: 100vh; }
    #info {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: #ff5f1f;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-align: center;
      pointer-events: none;
      text-shadow: 0 0 20px rgba(255,95,31,0.5);
    }
    #legend {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ccc;
      font-size: 13px;
    }
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    #hint {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      color: #666;
      font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="info">AI Memory Hierarchy</div>
  <div id="hint">Drag to rotate</div>
  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#ff5f1f"></div>Sensory Memory</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff7a3d"></div>Working Memory</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffa070"></div>Episodic Memory</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffc4a3"></div>Semantic Memory</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ffe8d6"></div>Procedural Memory</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(8, 6, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 8;
    controls.maxDistance = 25;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;
    controls.maxPolarAngle = Math.PI * 0.7;
    controls.minPolarAngle = Math.PI * 0.2;

    // Palette
    const colors = {
      sensory:   0xff5f1f,
      working:   0xff7a3d,
      episodic:  0xffa070,
      semantic:  0xffc4a3,
      procedural:0xffe8d6,
      line:      0x553322,
      label:     0xff5f1f
    };

    // Layer definitions: [y position, top radius, bottom radius]
    const layers = [
      { name: 'SENSORY\nMEMORY',    y: -2.2, rTop: 2.6, rBot: 3.2, color: colors.sensory },
      { name: 'WORKING\nMEMORY',    y: -0.7, rTop: 2.0, rBot: 2.6, color: colors.working },
      { name: 'EPISODIC\nMEMORY',   y:  0.7, rTop: 1.4, rBot: 2.0, color: colors.episodic },
      { name: 'SEMANTIC\nMEMORY',   y:  1.8, rTop: 0.8, rBot: 1.4, color: colors.semantic },
      { name: 'PROCEDURAL\nMEMORY', y:  2.7, rTop: 0.25, rBot: 0.8, color: colors.procedural },
    ];

    const group = new THREE.Group();
    scene.add(group);

    // Build frustum (tapered cylinder) layers
    layers.forEach((layer) => {
      const geo = new THREE.CylinderGeometry(layer.rTop, layer.rBot, 0.85, 32, 1, true);
      const mat = new THREE.MeshPhongMaterial({
        color: layer.color,
        transparent: true,
        opacity: 0.35,
        side: THREE.DoubleSide,
        depthWrite: false,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.y = layer.y;
      group.add(mesh);

      // Wireframe outline
      const wireGeo = new THREE.CylinderGeometry(layer.rTop, layer.rBot, 0.85, 8, 1, true);
      const wireMat = new THREE.MeshBasicMaterial({ color: layer.color, wireframe: true, transparent: true, opacity: 0.7 });
      const wire = new THREE.Mesh(wireGeo, wireMat);
      wire.position.y = layer.y;
      group.add(wire);
    });

    // Connecting lines between layers
    const lineMat = new THREE.LineBasicMaterial({ color: colors.line, transparent: true, opacity: 0.5 });
    const nodeGeo = new THREE.SphereGeometry(0.06, 8, 8);

    layers.forEach((layer, i) => {
      const nodeMat = new THREE.MeshBasicMaterial({ color: layer.color });
      const node = new THREE.Mesh(nodeGeo, nodeMat);
      node.position.set(0, layer.y, 0);
      group.add(node);

      if (i < layers.length - 1) {
        const next = layers[i + 1];
        // Lines from current top edge to next top edge (4 points around)
        for (let angle = 0; angle < Math.PI * 2; angle += Math.PI * 0.5) {
          const x1 = Math.cos(angle) * layer.rTop;
          const z1 = Math.sin(angle) * layer.rTop;
          const x2 = Math.cos(angle) * next.rTop;
          const z2 = Math.sin(angle) * next.rTop;

          const points = [
            new THREE.Vector3(x1, layer.y + 0.425, z1),
            new THREE.Vector3(x2, next.y - 0.425, z2)
          ];
          const geo = new THREE.BufferGeometry().setFromPoints(points);
          const line = new THREE.Line(geo, lineMat);
          group.add(line);
        }
      }
    });

    // Labels using canvas textures
    function makeLabel(text, color) {
      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, 512, 128);
      ctx.fillStyle = color;
      ctx.font = 'bold 36px Segoe UI, system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, 256, 64);

      const tex = new THREE.CanvasTexture(canvas);
      const spriteMat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
      const sprite = new THREE.Sprite(spriteMat);
      sprite.scale.set(3.5, 0.9, 1);
      return sprite;
    }

    const labelColors = ['#ff5f1f','#ff7a3d','#ffa070','#ffc4a3','#ffe8d6'];
    layers.forEach((layer, i) => {
      const label = makeLabel(layer.name.replace('\n', ' / '), labelColors[i]);
      const angle = -Math.PI * 0.25 + i * 0.08;
      const radius = layer.rBot + 1.2;
      label.position.set(
        Math.cos(angle) * radius,
        layer.y,
        Math.sin(angle) * radius
      );
      group.add(label);
    });

    // Axis indicator for hierarchy direction
    const arrowDir = new THREE.Vector3(0, 1, 0);
    const arrowOrigin = new THREE.Vector3(4.2, -2.2, 0);
    const arrowLength = 5;
    const arrowHelper = new THREE.ArrowHelper(arrowDir, arrowOrigin, arrowLength, 0xff5f1f, 0.4, 0.25);
    group.add(arrowHelper);

    const arrowLabel = makeLabel('HIERARCHY ↑', '#ff5f1f');
    arrowLabel.position.set(4.2, 3.5, 0);
    arrowLabel.scale.set(2.2, 0.6, 1);
    group.add(arrowLabel);

    // Base platform
    const baseGeo = new THREE.CylinderGeometry(3.6, 3.6, 0.08, 32);
    const baseMat = new THREE.MeshPhongMaterial({ color: 0x1a0a05, transparent: true, opacity: 0.8 });
    const base = new THREE.Mesh(baseGeo, baseMat);
    base.position.y = -2.7;
    group.add(base);

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.3));
    const dirLight = new THREE.DirectionalLight(0xffaa77, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);
    const pointLight = new THREE.PointLight(0xff5f1f, 0.6, 20);
    pointLight.position.set(-3, 3, 5);
    scene.add(pointLight);
    const pointLight2 = new THREE.PointLight(0xff7a3d, 0.4, 20);
    pointLight2.position.set(3, -1, -5);
    scene.add(pointLight2);

    scene.background = new THREE.Color(0x0a0a0f);

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
