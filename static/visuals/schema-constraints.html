<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Schema Constraints</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-1: #ffffff;
            --bg-2: #efefed;
            --border: #e0e0dc;
            --text-1: #0e0e0e;
            --text-2: #3a3a3a;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --bg-2: #1a1a1a;
                --border: #1e1e1e;
                --text-1: #f0f0f0;
                --text-2: #c2c2c2;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }

        body { 
            margin: 0; 
            background: var(--bg-1); 
            font-family: var(--sans); 
            color: var(--text-1);
            overflow: hidden; 
        }

        #label {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-3);
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="label">structured outputs // schema constraint geometry</div>
    <script>
        const scene = new THREE.Scene();
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        scene.background = new THREE.Color(isDark ? 0x111111 : 0xffffff);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // The "Schema" - a rigid bounding box
        const boxGeo = new THREE.BoxGeometry(5, 5, 5);
        const boxWire = new THREE.EdgesGeometry(boxGeo);
        const boxMat = new THREE.LineBasicMaterial({ color: isDark ? 0x444444 : 0xaaaaaa });
        const schemaBox = new THREE.LineSegments(boxWire, boxMat);
        scene.add(schemaBox);

        // The "Model Output" - chaotic points/lines being pulled into the box
        const particles = new THREE.Group();
        scene.add(particles);

        const pGeo = new THREE.SphereGeometry(0.05, 8, 8);
        const pMat = new THREE.MeshBasicMaterial({ color: isDark ? 0xff5f1f : 0xd44000 });

        const particleData = [];
        for (let i = 0; i < 100; i++) {
            const p = new THREE.Mesh(pGeo, pMat);
            particles.add(p);
            particleData.push({
                mesh: p,
                target: new THREE.Vector3(
                    (Math.random() - 0.5) * 4.5,
                    (Math.random() - 0.5) * 4.5,
                    (Math.random() - 0.5) * 4.5
                ),
                pos: new THREE.Vector3(
                    (Math.random() - 0.5) * 15,
                    (Math.random() - 0.5) * 15,
                    (Math.random() - 0.5) * 15
                ),
                speed: 0.01 + Math.random() * 0.05
            });
        }

        camera.position.z = 12;
        camera.position.y = 2;
        camera.lookAt(0, 0, 0);

        function animate() {
            requestAnimationFrame(animate);
            
            particleData.forEach(p => {
                p.pos.lerp(p.target, p.speed);
                p.mesh.position.copy(p.pos);
                
                // If they reach target, occasionally reset to "chaotic" state
                if (p.pos.distanceTo(p.target) < 0.1) {
                    if (Math.random() < 0.01) {
                        p.pos.set(
                            (Math.random() - 0.5) * 15,
                            (Math.random() - 0.5) * 15,
                            (Math.random() - 0.5) * 15
                        );
                    }
                }
            });

            scene.rotation.y += 0.005;
            scene.rotation.x += 0.002;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
