<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where the Agent Loop Breaks</title>
<style>
:root{--bg-1:#fff;--bg-2:#efefed;--border:#e0e0dc;--text-1:#0e0e0e;--text-2:#3a3a3a;--text-3:#888;--accent:#d44000;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;}
@media (prefers-color-scheme:dark){:root{--bg-1:#111;--bg-2:#1a1a1a;--border:#1e1e1e;--text-1:#f0f0f0;--text-2:#c2c2c2;--text-3:#6a6a6a;--accent:#ff5f1f;}}
body{margin:0;background:var(--bg-1);font-family:var(--sans);color:var(--text-1);overflow:hidden;}

.scene{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;box-sizing:border-box;padding:14px;}
.loop{position:relative;width:340px;height:340px;}
svg{position:absolute;inset:0;width:100%;height:100%;}

.track{fill:none;stroke:var(--border);stroke-width:1.5;}
.flow{fill:none;stroke:var(--text-3);stroke-width:2;stroke-dasharray:70 684;stroke-linecap:round;animation:travel 8s linear infinite;}
@keyframes travel{from{stroke-dashoffset:754;}to{stroke-dashoffset:0;}}
.arrow-head{fill:var(--text-3);}

.node{
  position:absolute;width:96px;transform:translate(-50%,-50%);text-align:center;
  background:var(--bg-1);border:1px solid var(--border);border-radius:4px;
  padding:8px 5px;box-sizing:border-box;
}
.node .name{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:0.03em;color:var(--text-1);}
.node .sub{font-family:var(--mono);font-size:7.5px;line-height:1.35;color:var(--text-3);margin-top:2px;}

.n-perceive{left:50%;top:11%;}
.n-think{left:89%;top:50%;}
.n-act{left:50%;top:89%;}
.n-remember{left:11%;top:50%;}

/* failure flags pinned near the relevant edge */
.flag{
  position:absolute;transform:translate(-50%,-50%);
  border:1px solid var(--accent);border-radius:3px;
  background:color-mix(in srgb,var(--accent) 10%,var(--bg-1));
  padding:5px 7px;box-sizing:border-box;width:118px;text-align:left;
  opacity:0.35;transition:opacity 0.3s linear,box-shadow 0.3s linear;
}
.flag .lbl{font-family:var(--mono);font-size:7px;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);font-weight:700;}
.flag .txt{font-size:9px;color:var(--text-2);line-height:1.3;margin-top:2px;}
.flag.active{opacity:1;box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 18%,transparent);}

/* break dot on the track */
.brk{position:absolute;width:11px;height:11px;border-radius:50%;background:var(--accent);transform:translate(-50%,-50%);opacity:0.4;transition:opacity 0.3s linear;}
.brk.active{opacity:1;box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 22%,transparent);}

/* THINK -> ACT edge (right side, between top-right and bottom-right) */
.f-tool{left:96%;top:75%;} .b-tool{left:85%;top:78%;}
/* ACT self / retry (bottom) */
.f-double{left:50%;top:101%;} .b-double{left:62%;top:88%;}
/* PERCEIVE accumulation (top-left, the remember->perceive edge) */
.f-context{left:8%;top:20%;} .b-context{left:20%;top:22%;}

.legend{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  text-align:center;font-family:var(--mono);
}
.legend .ttl{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-3);}
.legend .cur{font-size:11px;font-weight:700;color:var(--accent);margin-top:5px;max-width:120px;line-height:1.3;}

@media (max-width:600px){
  .loop{width:300px;height:300px;}
  .node{width:86px;}
  .flag{width:104px;}
}
</style>
</head>
<body>
<div class="scene">
  <div class="loop">
    <svg viewBox="0 0 340 340">
      <circle class="track" cx="170" cy="170" r="120"></circle>
      <circle class="flow" cx="170" cy="170" r="120" transform="rotate(-90 170 170)"></circle>
      <polygon class="arrow-head" points="290,170 283,164 283,176"></polygon>
      <polygon class="arrow-head" points="170,290 164,283 176,283"></polygon>
      <polygon class="arrow-head" points="50,170 57,164 57,176"></polygon>
      <polygon class="arrow-head" points="170,50 176,57 164,57"></polygon>
    </svg>

    <div class="node n-perceive"><div class="name">PERCEIVE</div><div class="sub">read context</div></div>
    <div class="node n-think"><div class="name">THINK</div><div class="sub">pick tool + args</div></div>
    <div class="node n-act"><div class="name">ACT</div><div class="sub">call tool</div></div>
    <div class="node n-remember"><div class="name">REMEMBER</div><div class="sub">append to context</div></div>

    <div class="brk b-tool" data-i="0"></div>
    <div class="brk b-double" data-i="1"></div>
    <div class="brk b-context" data-i="2"></div>

    <div class="flag f-tool" data-i="0">
      <div class="lbl">Tool timeout</div>
      <div class="txt">Tool hangs; agent retries blindly.</div>
    </div>
    <div class="flag f-double" data-i="1">
      <div class="lbl">Double-execution</div>
      <div class="txt">Retry fires the action twice. Email sent twice.</div>
    </div>
    <div class="flag f-context" data-i="2">
      <div class="lbl">Context pollution</div>
      <div class="txt">History bloats; model loses early turns.</div>
    </div>

    <div class="legend">
      <div class="ttl">Break point</div>
      <div class="cur" id="cur">TOOL TIMEOUT</div>
    </div>
  </div>
</div>
<script>
const flags=Array.from(document.querySelectorAll('.flag'));
const brks=Array.from(document.querySelectorAll('.brk'));
const cur=document.getElementById('cur');
const names=['TOOL TIMEOUT','DOUBLE-EXECUTION','CONTEXT POLLUTION'];
let i=0;
function step(){
  flags.forEach(f=>f.classList.remove('active'));
  brks.forEach(b=>b.classList.remove('active'));
  flags[i].classList.add('active');
  brks[i].classList.add('active');
  cur.textContent=names[i];
  i=(i+1)%flags.length;
}
step();
setInterval(step,2400);
</script>
</body>
</html>
