<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Agent Memory Architecture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #info {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    text-align: center;
    pointer-events: none;
    letter-spacing: 0.05em;
  }
  #title {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: #ff5f1f;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="title">Voice Agent Memory Flow</div>
<div id="info">Drag to orbit &middot; Scroll to zoom &middot; Voice turns flow through VAD &rarr; ASR &rarr; Memory &rarr; LLM &rarr; TTS</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  const DARK = 0xff5f1f;
  const LIGHT = 0xd44000;
  const BG = 0x0a0a0a;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(BG);
  scene.fog = new THREE.FogExp2(BG, 0.018);

  const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 18, 38);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 10;
  controls.maxDistance = 80;
  controls.maxPolarAngle = Math.PI * 0.7;
  controls.target.set(0, 2, 0);

  // --- Grid floor ---
  const gridHelper = new THREE.GridHelper(80, 40, 0x222222, 0x181818);
  scene.add(gridHelper);

  // --- Layer positions (Z) ---
  const LAYERS = {
    mic:    { z: -18, label: 'MIC INPUT',    color: 0x888888 },
    vad:    { z: -10, label: 'VAD',          color: 0xaaaaaa },
    asr:    { z:  -2, label: 'ASR',           color: 0xcccccc },
    memory: { z:   6, label: 'MEMORY',       color: DARK    },
    llm:    { z:  14, label: 'LLM',           color: 0xffffff },
    tts:    { z:  22, label: 'TTS',           color: 0xaaaaaa }
  };

  const font = '12px Segoe UI, sans-serif';

  function makeLabel(text, color) {
    const canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'transparent';
    ctx.clearRect(0, 0, 512, 64);
    ctx.font = 'bold 26px Segoe UI, sans-serif';
    ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 256, 32);
    const tex = new THREE.CanvasTexture(canvas);
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(8, 1, 1);
    return sprite;
  }

  // Draw layer columns
  Object.entries(LAYERS).forEach(([key, layer]) => {
    const label = makeLabel(layer.label, layer.color);
    label.position.set(0, 12, layer.z);
    scene.add(label);

    // Thin vertical guide line
    const lineGeo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-6, -6, layer.z),
      new THREE.Vector3(-6, 0, layer.z)
    ]);
    const lineMat = new THREE.LineBasicMaterial({ color: layer.color, transparent: true, opacity: 0.2 });
    scene.add(new THREE.Line(lineGeo, lineMat));
  });

  // --- Audio wave segment class ---
  class VoiceTurn {
    constructor(id, startZ, endZ, yBase, isUser) {
      this.id = id;
      this.isUser = isUser;
      this.startZ = startZ;
      this.endZ = endZ;
      this.yBase = yBase;
      this.progress = 0;
      this.active = true;
      this.interrupted = false;
      this.interruptAt = null;
      this.buildMesh();
    }

    buildMesh() {
      const color = this.isUser ? 0x44aaff : DARK;
      const segCount = 24;
      const points = [];
      for (let i = 0; i <= segCount; i++) {
        const t = i / segCount;
        const x = (t - 0.5) * 6;
        const amp = 0.4 + Math.sin(t * Math.PI) * 0.6 + Math.random() * 0.3;
        const y = this.yBase + amp * (this.isUser ? 1 : 1.2);
        points.push(new THREE.Vector3(x, y, 0));
      }

      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.9 });
      this.waveLine = new THREE.Line(geo, mat);
      this.waveLine.visible = false;

      // Bounding box / "turn" slab
      const boxGeo = new THREE.BoxGeometry(6, 0.3, 0.1);
      const boxMat = new THREE.MeshBasicMaterial({
        color, transparent: true, opacity: 0.15, wireframe: false
      });
      this.box = new THREE.Mesh(boxGeo, boxMat);
      this.box.visible = false;

      this.group = new THREE.Group();
      this.group.add(this.waveLine);
      this.group.add(this.box);
      scene.add(this.group);
    }

    update(dt) {
      if (!this.active) return;

      this.progress += dt * 0.35;

      if (this.interrupted && this.interruptAt !== null) {
        // Animate interruption point
        const intZ = THREE.MathUtils.lerp(this.startZ, this.endZ, this.interruptAt);
        this.group.position.z = intZ;
        const fadeT = this.progress - this.interruptAt;
        this.waveLine.material.opacity = Math.max(0, 0.9 - fadeT * 3);
        if (fadeT > 0.5) {
          this.active = false;
          this.group.visible = false;
        }
        return;
      }

      if (this.progress < 1) {
        this.group.visible = true;
        const z = THREE.MathUtils.lerp(this.startZ, this.endZ, this.progress);
        this.group.position.z = z;

        // Highlight the current layer
        const color = this.isUser ? 0x44aaff : DARK;
        this.waveLine.material.color.setHex(color);
        this.box.material.color.setHex(color);

        // Scale the wave based on progress
        const t = this.progress;
        this.waveLine.scale.x = Math.min(1, t * 3);
      } else {
        this.group.visible = false;
        this.active = false;
      }
    }

    interrupt(atProgress) {
      this.interrupted = true;
      this.interruptAt = atProgress;
    }
  }

  // --- Interruption marker ---
  function addInterruptionMarker(z, y) {
    const geo = new THREE.SphereGeometry(0.25, 16, 16);
    const mat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.8 });
    const sphere = new THREE.Mesh(geo, mat);
    sphere.position.set(0, y + 0.5, z);

    // Ring
    const ringGeo = new THREE.RingGeometry(0.3, 0.5, 32);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.5, side: THREE.DoubleSide });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.set(0, y + 0.05, z);

    scene.add(sphere);
    scene.add(ring);

    // Label
    const lCanvas = document.createElement('canvas');
    lCanvas.width = 256; lCanvas.height = 32;
    const lCtx = lCanvas.getContext('2d');
    lCtx.font = 'bold 20px Segoe UI';
    lCtx.fillStyle = '#ff3333';
    lCtx.textAlign = 'center';
    lCtx.fillText('INTERRUPT', 128, 22);
    const lTex = new THREE.CanvasTexture(lCanvas);
    const lSpr = new THREE.Sprite(new THREE.SpriteMaterial({ map: lTex, transparent: true, depthWrite: false }));
    lSpr.scale.set(4, 0.5, 1);
    lSpr.position.set(0, y + 1.5, z);
    scene.add(lSpr);
  }

  // --- Memory node in center column ---
  function addMemoryNode(y, z, isSession) {
    const color = isSession ? DARK : LIGHT;
    const geo = new THREE.BoxGeometry(1.5, 0.4, 0.5);
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.7 });
    const box = new THREE.Mesh(geo, mat);
    box.position.set(0, y, z);
    scene.add(box);

    // Glow
    const glowGeo = new THREE.BoxGeometry(1.7, 0.6, 0.7);
    const glowMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.15 });
    scene.add(new THREE.Mesh(glowGeo, glowMat)).position.copy(box.position);
  }

  // Pre-populate memory nodes
  const memoryNodes = [];
  for (let i = 0; i < 6; i++) {
    const z = -4 + i * 3.2;
    const y = 1.5 + Math.sin(i * 1.3) * 0.5;
    memoryNodes.push({ z, y, isSession: i < 3 });
    addMemoryNode(y, z, i < 3);
  }

  // --- Particle stream along the path ---
  const PARTICLE_COUNT = 200;
  const pGeo = new THREE.BufferGeometry();
  const pPositions = new Float32Array(PARTICLE_COUNT * 3);
  const pProgress = new Float32Array(PARTICLE_COUNT);
  const pSpeed = new Float32Array(PARTICLE_COUNT);
  const pY = new Float32Array(PARTICLE_COUNT);

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    pProgress[i] = Math.random();
    pSpeed[i] = 0.3 + Math.random() * 0.4;
    pY[i] = (Math.random() - 0.5) * 2;
    pPositions[i * 3] = (Math.random() - 0.5) * 4;
    pPositions[i * 3 + 1] = pY[i];
    pPositions[i * 3 + 2] = -18 + pProgress[i] * 40;
  }
  pGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));

  const pMat = new THREE.PointsMaterial({
    color: 0xff8855, size: 0.15, transparent: true, opacity: 0.5, sizeAttenuation: true
  });
  const particles = new THREE.Points(pGeo, pMat);
  scene.add(particles);

  // --- Voice turns queue ---
  const turns = [];
  let turnTimer = 0;
  let turnId = 0;

  // Scheduled interruptions
  const interrupts = [{ turnId: 2, at: 0.55 }, { turnId: 5, at: 0.4 }];

  function spawnTurn(isUser) {
    const y = isUser ? 2.5 : 4.5;
    const turn = new VoiceTurn(turnId, LAYERS.mic.z, LAYERS.tts.z, y, isUser);
    turns.push(turn);
    turnId++;

    // Schedule interruption
    const intr = interrupts.find(i => i.turnId === turn.id - 1);
    if (intr) {
      setTimeout(() => turn.interrupt(intr.at), 3000);
    }
  }

  // Ambient audio "wave" on the left
  function addAmbientWave() {
    const pts = [];
    for (let i = 0; i < 100; i++) {
      const t = i / 99;
      const x = -22;
      const y = t * 8 - 2;
      const z = -18 + t * 40;
      pts.push(new THREE.Vector3(x, y, z));
    }
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({ color: 0x333333, transparent: true, opacity: 0.3 });
    scene.add(new THREE.Line(geo, mat));
  }
  addAmbientWave();

  // Right side labels for layers
  Object.entries(LAYERS).forEach(([key, layer]) => {
    const lCanvas = document.createElement('canvas');
    lCanvas.width = 256; lCanvas.height = 32;
    const lCtx = lCanvas.getContext('2d');
    lCtx.font = '14px Segoe UI';
    lCtx.fillStyle = 'rgba(255,255,255,0.3)';
    lCtx.textAlign = 'left';
    lCtx.fillText(key.toUpperCase(), 10, 22);
    const lTex = new THREE.CanvasTexture(lCanvas);
    const lSpr = new THREE.Sprite(new THREE.SpriteMaterial({ map: lTex, transparent: true, depthWrite: false }));
    lSpr.scale.set(4, 0.5, 1);
    lSpr.position.set(8, 0, layer.z);
    scene.add(lSpr);
  });

  // Legend sprites
  function addLegend() {
    const items = [
      { label: 'USER TURN', color: 0x44aaff },
      { label: 'AGENT TURN', color: DARK },
      { label: 'INTERRUPT', color: 0xff0000 },
      { label: 'SESSION MEMORY', color: DARK },
      { label: 'LONG-TERM MEMORY', color: LIGHT }
    ];
    items.forEach((item, i) => {
      const lCanvas = document.createElement('canvas');
      lCanvas.width = 400; lCanvas.height = 40;
      const lCtx = lCanvas.getContext('2d');
      lCtx.fillStyle = '#' + item.color.toString(16).padStart(6, '0');
      lCtx.fillRect(0, 14, 20, 12);
      lCtx.font = '16px Segoe UI';
      lCtx.fillStyle = 'rgba(255,255,255,0.5)';
      lCtx.fillText(item.label, 30, 26);
      const lTex = new THREE.CanvasTexture(lCanvas);
      const lSpr = new THREE.Sprite(new THREE.SpriteMaterial({ map: lTex, transparent: true, depthWrite: false }));
      lSpr.scale.set(3, 0.3, 1);
      lSpr.position.set(-12, 9 - i * 0.8, 25);
      scene.add(lSpr);
    });
  }
  addLegend();

  // Initial turns
  spawnTurn(true);
  setTimeout(() => spawnTurn(false), 800);
  setTimeout(() => spawnTurn(true), 2000);
  setTimeout(() => spawnTurn(false), 2800);
  setTimeout(() => spawnTurn(true), 3800);
  setTimeout(() => spawnTurn(false), 4600);
  setTimeout(() => spawnTurn(true), 5600);
  setTimeout(() => spawnTurn(false), 6400);
  setTimeout(() => spawnTurn(true), 7400);
  setTimeout(() => spawnTurn(false), 8200);

  // Add interruption marker at turn 2
  setTimeout(() => addInterruptionMarker(-6, 2.5), 2500);
  setTimeout(() => addInterruptionMarker(-1.5, 4.5), 5000);

  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();

    // Spawn new turns periodically
    turnTimer += dt;
    if (turnTimer > 2.2) {
      turnTimer = 0;
      spawnTurn(Math.random() > 0.4);
    }

    // Update turns
    turns.forEach(t => t.update(dt));

    // Clean up finished turns
    for (let i = turns.length - 1; i >= 0; i--) {
      if (!turns[i].active) {
        scene.remove(turns[i].group);
        turns.splice(i, 1);
      }
    }

    // Animate particles
    const pos = pGeo.attributes.position.array;
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      pProgress[i] += dt * pSpeed[i] * 0.1;
      if (pProgress[i] > 1) pProgress[i] = 0;
      pos[i * 3 + 2] = -18 + pProgress[i] * 40;
      pos[i * 3 + 1] = pY[i] + Math.sin(pProgress[i] * Math.PI * 2 + i) * 0.3;
    }
    pGeo.attributes.position.needsUpdate = true;

    // Pulse memory nodes
    memoryNodes.forEach((n, i) => {
      const t = clock.getElapsedTime();
      const pulse = 0.5 + 0.5 * Math.sin(t * 1.5 + i * 0.8);
      scene.children.forEach(c => {
        if (c.isMesh && c.material && c.material.opacity && c !== particles) {
          // Only pulse non-label meshes near memory layer
        }
      });
    });

    controls.update();
    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();
</script>
</body>
</html>
