<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Short-Term Memory Visualizer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d0d;
    color: #ff5f1f;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    height: 100vh;
  }
  canvas { display: block; }
  #overlay {
    position: absolute;
    top: 20px;
    left: 20px;
    pointer-events: none;
    z-index: 10;
  }
  #overlay h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    color: #ff5f1f;
  }
  #overlay p {
    font-size: 11px;
    color: #d44000;
    line-height: 1.6;
    max-width: 260px;
  }
  #stats {
    position: absolute;
    bottom: 20px;
    left: 20px;
    pointer-events: none;
    z-index: 10;
  }
  #stats p {
    font-size: 11px;
    color: #d44000;
    margin: 3px 0;
  }
  #stats span {
    color: #ff5f1f;
    font-weight: bold;
  }
  #legend {
    position: absolute;
    top: 20px;
    right: 20px;
    pointer-events: none;
    z-index: 10;
    text-align: right;
  }
  #legend p {
    font-size: 10px;
    color: #d44000;
    margin: 4px 0;
  }
  #legend .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
  }
</style>
</head>
<body>
<div id="overlay">
  <h1>Context Window</h1>
  <p>Each block is a token. New tokens slide in from the left. Old tokens are evicted from the right when the window is full.</p>
</div>
<div id="stats">
  <p>Token <span id="tokenCount">0</span> / <span id="maxTokens">64</span></p>
  <p>Evicted: <span id="evicted">0</span></p>
  <p>FPS: <span id="fps">--</span></p>
</div>
<div id="legend">
  <p><span class="dot" style="background:#ff5f1f"></span>Active token</p>
  <p><span class="dot" style="background:#d44000"></span>Aging token</p>
  <p><span class="dot" style="background:#333"></span>Empty slot</p>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const MAX_TOKENS = 64;
const SLOT_W = 1.2;
const SLOT_H = 0.55;
const SLOT_D = 0.2;
const GAP = 0.08;
const ROWS = 8;
const COLS = Math.ceil(MAX_TOKENS / ROWS);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0d0d0d);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0d0d0d, 0.018);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 18, 28);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 10;
controls.maxDistance = 60;
controls.maxPolarAngle = Math.PI * 0.6;
controls.target.set(0, 0, 0);

// Lighting
const ambientLight = new THREE.AmbientLight(0x222222);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xff5f1f, 1.5);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);

const pointLight = new THREE.PointLight(0xd44000, 2.0, 50);
pointLight.position.set(-10, 5, 5);
scene.add(pointLight);

// Context window container group
const windowGroup = new THREE.Group();
scene.add(windowGroup);

// Floor grid
const gridHelper = new THREE.GridHelper(60, 60, 0x1a1a1a, 0x1a1a1a);
gridHelper.position.y = -3;
scene.add(gridHelper);

// Token slots
const slots = [];
const slotMeshes = [];
const tokenMeshes = [];

function getSlotPosition(index) {
  const col = index % COLS;
  const row = Math.floor(index / COLS);
  const x = (col - (COLS - 1) / 2) * (SLOT_W + GAP);
  const y = ((ROWS - 1) / 2 - row) * (SLOT_H + GAP);
  return new THREE.Vector3(x, y, 0);
}

// Create slot boxes (wireframe for empty slots)
const slotGeom = new THREE.BoxGeometry(SLOT_W - 0.05, SLOT_H - 0.05, SLOT_D);
const slotMatEmpty = new THREE.MeshBasicMaterial({ color: 0x1a1a1a, transparent: true, opacity: 0.6 });
const slotMatEdge = new THREE.LineBasicMaterial({ color: 0x333333 });

for (let i = 0; i < MAX_TOKENS; i++) {
  const pos = getSlotPosition(i);
  const slotMesh = new THREE.Mesh(slotGeom, slotMatEmpty.clone());
  slotMesh.position.copy(pos);
  windowGroup.add(slotMesh);
  slotMeshes.push(slotMesh);

  const edges = new THREE.EdgesGeometry(slotGeom);
  const line = new THREE.LineSegments(edges, slotMatEdge);
  line.position.copy(pos);
  windowGroup.add(line);
}

// Token geometry (slightly smaller than slot)
const tokenGeom = new THREE.BoxGeometry(SLOT_W - 0.12, SLOT_H - 0.12, SLOT_D * 1.1);

function tokenColor(age, maxAge) {
  // age 0 = fresh (#ff5f1f), age 1 = old (#d44000)
  const t = Math.min(age / maxAge, 1.0);
  const r = 1.0;
  const g = 0.37 - t * 0.11;
  const b = 0.12 - t * 0.047;
  return new THREE.Color(r, g, b);
}

class TokenBlock {
  constructor(index) {
    this.index = index;
    this.age = 0;
    this.active = false;
    this.material = new THREE.MeshStandardMaterial({
      color: 0x333333,
      emissive: 0x000000,
      roughness: 0.4,
      metalness: 0.6,
    });
    this.mesh = new THREE.Mesh(tokenGeom, this.material);
    this.mesh.position.copy(getSlotPosition(index));
    this.mesh.visible = false;

    // Subtle glow mesh behind
    const glowGeom = new THREE.BoxGeometry(SLOT_W, SLOT_H, SLOT_D * 0.3);
    this.glowMat = new THREE.MeshBasicMaterial({ color: 0xff5f1f, transparent: true, opacity: 0.0 });
    this.glowMesh = new THREE.Mesh(glowGeom, this.glowMat);
    this.glowMesh.position.copy(getSlotPosition(index));
    this.glowMesh.position.z -= SLOT_D * 0.7;
    windowGroup.add(this.glowMesh);
    scene.add(this.mesh);
  }

  activate() {
    this.age = 0;
    this.active = true;
    this.mesh.visible = true;
    this.mesh.position.copy(getSlotPosition(this.index));
    this.glowMesh.position.copy(getSlotPosition(this.index));
    this.glowMesh.position.z -= SLOT_D * 0.7;
    this.material.color.setHex(0xff5f1f);
    this.material.emissive.setHex(0x331500);
  }

  deactivate() {
    this.active = false;
    this.mesh.visible = false;
    this.glowMat.opacity = 0;
  }

  update(delta) {
    if (this.active) {
      this.age += delta;
      const maxAge = 12.0; // seconds before fully aged
      const t = Math.min(this.age / maxAge, 1.0);
      this.material.color.copy(tokenColor(t, 1.0));
      const emissiveIntensity = 0.15 * (1 - t);
      this.material.emissive.setHex(0xff5f1f);
      this.material.emissiveIntensity = emissiveIntensity;
      // Glow pulse
      this.glowMat.opacity = 0.15 * Math.sin(this.age * 3.0) * (1 - t);
    }
  }

  animateEviction(progress) {
    // progress 0..1: how far evicted
    this.mesh.position.z = progress * -6;
    this.mesh.rotation.y = progress * Math.PI * 0.5;
    this.material.opacity = 1 - progress;
    this.material.transparent = true;
    this.glowMat.opacity = 0;
  }
}

const tokens = slots.map((_, i) => new TokenBlock(i));

// Token state machine
let currentIndex = 0;
let evictedCount = 0;
let lastSpawnTime = 0;
let spawnInterval = 1.2; // seconds between new tokens
let evictingIndex = -1;
let evictProgress = 0;
const EVICT_DURATION = 0.5; // seconds

function spawnToken() {
  // Find an inactive slot or evict the oldest
  if (currentIndex < MAX_TOKENS) {
    tokens[currentIndex].activate();
    currentIndex++;
  } else {
    // Find oldest active token (highest age)
    let oldestIdx = 0;
    let oldestAge = -1;
    for (let i = 0; i < tokens.length; i++) {
      if (tokens[i].active && tokens[i].age > oldestAge) {
        oldestAge = tokens[i].age;
        oldestIdx = i;
      }
    }
    evictingIndex = oldestIdx;
    evictProgress = 0;
  }
  updateStats();
}

function updateStats() {
  const activeCount = tokens.filter(t => t.active).length;
  document.getElementById('tokenCount').textContent = activeCount;
  document.getElementById('evicted').textContent = evictedCount;
}

// Eviction animation
function updateEviction(delta) {
  if (evictingIndex === -1) return;
  evictProgress += delta / EVICT_DURATION;
  if (evictProgress >= 1.0) {
    tokens[evictingIndex].deactivate();
    evictedCount++;
    // Shift all tokens left and put new one at end
    // Actually just activate at the evicted position
    tokens[evictingIndex].index = evictingIndex;
    tokens[evictingIndex].mesh.position.copy(getSlotPosition(evictingIndex));
    tokens[evictingIndex].material.opacity = 1;
    tokens[evictingIndex].material.transparent = false;
    tokens[evictingIndex].mesh.rotation.y = 0;
    tokens[evictingIndex].mesh.position.z = 0;
    evictingIndex = -1;
    updateStats();
  } else {
    tokens[evictingIndex].animateEviction(evictProgress);
  }
}

// After eviction, spawn new token at current end
function finalizeEvictionAndSpawn() {
  // Reorder: all active tokens shift to maintain left-packing
  // For simplicity: deactivate oldest, shift others, activate at end
  if (evictingIndex !== -1) return;

  // Actually, simple strategy: oldest gets evicted, rest shift
  // Find oldest
  let oldestIdx = 0;
  let oldestAge = -1;
  for (let i = 0; i < tokens.length; i++) {
    if (tokens[i].active && tokens[i].age > oldestAge) {
      oldestAge = tokens[i].age;
      oldestIdx = i;
    }
  }

  // Collect active indices except oldest
  const activeOthers = tokens
    .map((t, i) => ({ t, i }))
    .filter(({ t }) => t.active && tokens.indexOf(t) !== oldestIdx)
    .map(({ i }) => i);

  // Deactivate oldest
  tokens[oldestIdx].deactivate();
  evictedCount++;
  updateStats();
}

// Entrance animation for tokens
const enteringTokens = [];

function spawnTokenAtEntry() {
  if (evictingIndex !== -1) return;

  // Find oldest active token to evict
  let oldestIdx = 0;
  let oldestAge = -1;
  for (let i = 0; i < tokens.length; i++) {
    if (tokens[i].active && tokens[i].age > oldestAge) {
      oldestAge = tokens[i].age;
      oldestIdx = i;
    }
  }

  // Animate old token exiting right
  evictingIndex = oldestIdx;
  evictProgress = 0;
}

// Animation loop
let lastTime = performance.now() / 1000;
let frameCount = 0;
let fpsTime = 0;

function animate() {
  requestAnimationFrame(animate);

  const now = performance.now() / 1000;
  const delta = now - lastTime;
  lastTime = now;

  // FPS counter
  frameCount++;
  fpsTime += delta;
  if (fpsTime >= 0.5) {
    document.getElementById('fps').textContent = Math.round(frameCount / fpsTime);
    frameCount = 0;
    fpsTime = 0;
  }

  // Spawn new tokens periodically
  if (now - lastSpawnTime > spawnInterval) {
    lastSpawnTime = now;
    spawnTokenAtEntry();
  }

  // Update eviction animation
  if (evictingIndex !== -1) {
    evictProgress += delta / EVICT_DURATION;
    tokens[evictingIndex].animateEviction(Math.min(evictProgress, 1.0));
    if (evictProgress >= 1.0) {
      // Finalize eviction
      tokens[evictingIndex].deactivate();
      evictedCount++;
      tokens[evictingIndex].mesh.position.copy(getSlotPosition(evictingIndex));
      tokens[evictingIndex].material.opacity = 1;
      tokens[evictingIndex].material.transparent = false;
      tokens[evictingIndex].mesh.rotation.y = 0;
      tokens[evictingIndex].mesh.position.z = 0;
      evictingIndex = -1;
      updateStats();
    }
  }

  // Update all tokens
  tokens.forEach(t => {
    if (!t.active || tokens.indexOf(t) === evictingIndex) return;
    t.update(delta);
  });

  // Subtle window group animation
  windowGroup.rotation.y = Math.sin(now * 0.15) * 0.03;

  controls.update();
  renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Start with a few tokens
for (let i = 0; i < 12; i++) {
  setTimeout(() => {
    spawnTokenAtEntry();
    setTimeout(() => {
      if (evictingIndex !== -1) {
        tokens[evictingIndex].deactivate();
        evictedCount++;
        tokens[evictingIndex].mesh.position.copy(getSlotPosition(evictingIndex));
        tokens[evictingIndex].material.opacity = 1;
        tokens[evictingIndex].material.transparent = false;
        tokens[evictingIndex].mesh.rotation.y = 0;
        tokens[evictingIndex].mesh.position.z = 0;
        evictingIndex = -1;
        updateStats();
      }
      // Activate a token at position i
      if (tokens[i] && !tokens[i].active) {
        tokens[i].activate();
      }
      updateStats();
    }, 300);
  }, i * 200);
}

animate();
</script>
</body>
</html>
