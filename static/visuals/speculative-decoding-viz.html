<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Speculative Decoding Animation | Ninad Pathak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f8f6;
      --accent: #d44000;
      --border: #e0e0dc;
      --text: #0e0e0e;
      --mono: 'JetBrains Mono', monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #090909;
        --accent: #ff5f1f;
        --border: #1e1e1e;
        --text: #f0f0f0;
      }
    }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--mono); padding: 40px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; min-height: 400px; }
    
    .loop { display: flex; flex-direction: column; gap: 30px; width: 100%; max-width: 500px; }
    .model-row { display: flex; align-items: center; gap: 20px; }
    .model-label { width: 100px; font-size: 10px; color: var(--accent); text-transform: uppercase; }
    .token-track { flex: 1; height: 40px; border: 1px solid var(--border); display: flex; align-items: center; padding: 0 10px; gap: 5px; }
    
    .token { font-size: 10px; padding: 4px 8px; border: 1px solid var(--border); background: var(--bg); opacity: 0; transform: translateY(10px); transition: all 0.3s; }
    .token.show { opacity: 1; transform: translateY(0); }
    .token.verified { border-color: var(--accent); color: var(--accent); font-weight: 600; }
    .token.rejected { border-color: #ff3b30; color: #ff3b30; opacity: 0.3; }
  </style>
</head>
<body>
  <div style="margin-bottom: 40px; text-align: center;">
    <div style="font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px;">// Draft & Verify</div>
    <div style="font-size: 16px; font-weight: 600;">Speculative Decoding Loop</div>
  </div>

  <div class="loop">
    <div class="model-row">
      <div class="model-label">Draft Model</div>
      <div class="token-track" id="draft-track"></div>
    </div>
    <div class="model-row">
      <div class="model-label">Target Model</div>
      <div class="token-track" id="target-track"></div>
    </div>
  </div>

  <div style="margin-top: 40px; font-size: 11px; color: #888;" id="status">Drafting 4 tokens...</div>

  <script>
    const dTrack = document.getElementById('draft-track');
    const tTrack = document.getElementById('target-track');
    const status = document.getElementById('status');
    const words = ["The", "quick", "brown", "fox", "jumps", "over"];

    async function run() {
      dTrack.innerHTML = '';
      tTrack.innerHTML = '';
      status.innerText = "Drafting 4 tokens...";
      
      // 1. Drafting
      for(let i=0; i<4; i++) {
        const t = document.createElement('div');
        t.className = 'token';
        t.innerText = words[i];
        dTrack.appendChild(t);
        setTimeout(() => t.classList.add('show'), i * 200);
      }
      
      await new Promise(r => setTimeout(r, 1500));
      status.innerText = "Verifying draft in parallel...";
      
      // 2. Verifying
      for(let i=0; i<4; i++) {
        const t = document.createElement('div');
        t.className = 'token show verified';
        t.innerText = words[i];
        tTrack.appendChild(t);
        dTrack.children[i].classList.add('verified');
        await new Promise(r => setTimeout(r, 300));
      }
      
      status.innerText = "4 tokens accepted. 1 step overhead.";
      await new Promise(r => setTimeout(r, 2000));
      run();
    }

    run();
  </script>
</body>
</html>
