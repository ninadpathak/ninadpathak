<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latency Tradeoff</title>
    <style>
        :root {
            --bg-1: #ffffff;
            --bg-2: #efefed;
            --border: #e0e0dc;
            --text-1: #0e0e0e;
            --text-2: #3a3a3a;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --bg-2: #1a1a1a;
                --border: #1e1e1e;
                --text-1: #f0f0f0;
                --text-2: #c2c2c2;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }
        body { margin: 0; height: 100vh; height: 100vh; background: var(--bg-1); font-family: var(--sans); color: var(--text-1);  display: flex; align-items: center; justify-content: center; min-  overflow: hidden; }
        .container { width: 100%; max-width: 600px; padding: 2rem; box-sizing: border-box; display: flex; flex-direction: column; gap: 2rem; }
        .box { border: 1px solid var(--border); padding: 1rem; background: var(--bg-1); text-align: center; }
        .mono { font-family: var(--mono); font-size: 0.85rem; }
        .accent { color: var(--accent); }
        .text-3 { color: var(--text-3); }
        .flex-row { display: flex; gap: 1rem; justify-content: space-between; align-items: center; width: 100%; }
        .flex-col { display: flex; flex-direction: column; gap: 1rem; }
        .arrow { color: var(--text-3); font-family: var(--mono); text-align: center; }
        @media (max-width: 600px) { .flex-row { flex-direction: column; } .arrow { transform: rotate(90deg); } .no-rotate { transform: none !important; } }

.bar-track { width: 100%; height: 20px; background: var(--bg-2); border-radius: 2px;  position: relative; }
.bar-fill { height: 100%; background: var(--text-1); transition: width 1.5s ease-out; width: 0; }
.bar-fill.accent { background: var(--accent); }
.label { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 0.75rem; margin-bottom: 0.5rem; }
</style>
</head>
<body>
    <div class="container" id="root">
        
<div class="flex-col" style="gap: 2rem; width: 100%;">
    <div>
        <div class="label"><span>Stage 1: Bi-Encoder Vector Search</span><span>~50ms</span></div>
        <div class="bar-track"><div class="bar-fill" id="bar1" style="width: 0%;" data-target="15%"></div></div>
    </div>
    <div>
        <div class="label"><span class="accent">Stage 2: Cross-Encoder Reranking</span><span class="accent">~250ms</span></div>
        <div class="bar-track"><div class="bar-fill accent" id="bar2" style="width: 0%;" data-target="60%"></div></div>
    </div>
    <div>
        <div class="label"><span style="color:var(--text-3)">Total Request Latency</span><span style="color:var(--text-3)">~300ms</span></div>
        <div class="bar-track"><div class="bar-fill" id="bar3" style="background: var(--text-3); width: 0%;" data-target="75%"></div></div>
    </div>
</div>
<script>
    function runAnim() {
        document.querySelectorAll('.bar-fill').forEach(el => el.style.width = '0%');
        setTimeout(() => {
            document.querySelectorAll('.bar-fill').forEach(el => el.style.width = el.getAttribute('data-target'));
        }, 500);
    }
    runAnim();
    setInterval(runAnim, 4000);
</script>

    </div>
</body>
</html>
