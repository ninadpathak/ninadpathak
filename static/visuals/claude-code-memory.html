<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Layers - Claude Code</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    #info {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #ff5f1f;
      font-size: 12px;
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div id="info">drag to orbit &bull; scroll to zoom</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  const W = window.innerWidth, H = window.innerHeight;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a0a);
  scene.fog = new THREE.FogExp2(0x0a0a0a, 0.04);

  const camera = new THREE.PerspectiveCamera(55, W/H, 0.1, 1000);
  camera.position.set(0, 8, 22);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.maxPolarAngle = Math.PI * 0.85;
  controls.minDistance = 10;
  controls.maxDistance = 60;

  // Terminal window group
  const terminalGroup = new THREE.Group();
  scene.add(terminalGroup);

  const DARK = 0xff5f1f, LIGHT = 0xd44000;

  // Terminal body
  const termGeo = new THREE.BoxGeometry(16, 10, 1.2);
  const termEdges = new THREE.EdgesGeometry(termGeo);
  const termLine = new THREE.LineSegments(termEdges, new THREE.LineBasicMaterial({ color: DARK, linewidth: 2 }));
  terminalGroup.add(termLine);

  // Terminal face
  const faceMat = new THREE.MeshBasicMaterial({ color: 0x111111, transparent: true, opacity: 0.85 });
  const faceGeo = new THREE.PlaneGeometry(16, 10);
  const faceMesh = new THREE.Mesh(faceGeo, faceMat);
  faceMesh.position.z = 0.61;
  terminalGroup.add(faceMesh);

  // Terminal title bar
  const titleGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(16, 1, 0.3));
  const titleLine = new THREE.LineSegments(titleGeo, new THREE.LineBasicMaterial({ color: DARK }));
  titleLine.position.z = 0.65;
  terminalGroup.add(titleLine);

  // Screen dots (red, yellow, green)
  const dotColors = [0xff5f1f, 0xffcc00, 0x00cc66];
  dotColors.forEach((c, i) => {
    const dotGeo = new THREE.CircleGeometry(0.22, 16);
    const dotMat = new THREE.MeshBasicMaterial({ color: c });
    const dot = new THREE.Mesh(dotGeo, dotMat);
    dot.position.set(-5.5 + i * 1.5, 4.4, 0.76);
    terminalGroup.add(dot);
  });

  // Memory layers
  const layers = [];
  const layerDefs = [
    { label: 'CLAUDE.md', sub: 'Project Context', y: 7.5, color: DARK },
    { label: '.claude/memory.md', sub: 'Agent Observations', y: 10.5, color: LIGHT },
    { label: 'memory.db', sub: 'SQLite Cross-Session', y: 13.5, color: DARK },
    { label: 'Session Context', sub: '200K token window', y: 16.5, color: LIGHT },
    { label: 'Tools / Read / Write', sub: 'Ephemeral', y: 19.5, color: DARK },
  ];

  layerDefs.forEach((def, i) => {
    const group = new THREE.Group();
    group.position.y = def.y;

    // Box edges
    const geo = new THREE.BoxGeometry(7, 1.8, 0.6);
    const edges = new THREE.EdgesGeometry(geo);
    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: def.color }));
    group.add(line);

    // Label plane
    const labelMat = new THREE.MeshBasicMaterial({ color: def.color, transparent: true, opacity: 0.12 });
    const labelGeo = new THREE.PlaneGeometry(7, 1.8);
    const labelMesh = new THREE.Mesh(labelGeo, labelMat);
    labelMesh.position.z = -0.31;
    group.add(labelMesh);

    // Lines (fake text rows)
    const lineMat = new THREE.LineBasicMaterial({ color: def.color, transparent: true, opacity: 0.6 });
    for (let r = 0; r < 3; r++) {
      const pts = [
        new THREE.Vector3(-2.8, -0.4 + r * 0.35, 0),
        new THREE.Vector3(-2.8 + Math.random() * 3, -0.4 + r * 0.35, 0),
      ];
      const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
      const txtLine = new THREE.Line(lineGeo, lineMat);
      group.add(txtLine);
    }

    scene.add(group);
    layers.push({ group, baseY: def.y, phase: i * 0.8 });
  });

  // Connecting lines from terminal to layers
  const connPts = [
    new THREE.Vector3(0, 5, 0),
    new THREE.Vector3(0, 6.8, 0),
  ];
  const connGeo = new THREE.BufferGeometry().setFromPoints(connPts);
  const connLine = new THREE.Line(connGeo, new THREE.LineBasicMaterial({ color: DARK, transparent: true, opacity: 0.4 }));
  scene.add(connLine);

  // Dashed vertical connector
  const dashPts = [];
  for (let y = 6.8; y <= 20; y += 0.8) {
    dashPts.push(new THREE.Vector3(0, y, 0));
  }
  const dashGeo = new THREE.BufferGeometry().setFromPoints(dashPts);
  const dashLine = new THREE.Line(dashGeo, new THREE.LineBasicMaterial({ color: DARK, transparent: true, opacity: 0.25 }));
  scene.add(dashLine);

  // Floating particles
  const pCount = 200;
  const pGeo = new THREE.BufferGeometry();
  const pPos = new Float32Array(pCount * 3);
  for (let i = 0; i < pCount; i++) {
    pPos[i * 3] = (Math.random() - 0.5) * 40;
    pPos[i * 3 + 1] = Math.random() * 30 - 2;
    pPos[i * 3 + 2] = (Math.random() - 0.5) * 20;
  }
  pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  const pMat = new THREE.PointsMaterial({ color: DARK, size: 0.08, transparent: true, opacity: 0.5 });
  const particles = new THREE.Points(pGeo, pMat);
  scene.add(particles);

  // Grid floor
  const grid = new THREE.GridHelper(60, 30, DARK, 0x222222);
  grid.position.y = -2;
  grid.material.opacity = 0.15;
  grid.material.transparent = true;
  scene.add(grid);

  // Floating memory entry boxes (scattered)
  for (let i = 0; i < 8; i++) {
    const sz = 0.4 + Math.random() * 0.5;
    const sGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(sz, sz * 0.6, sz * 0.4));
    const sLine = new THREE.LineSegments(sGeo, new THREE.LineBasicMaterial({
      color: Math.random() > 0.5 ? DARK : LIGHT,
      transparent: true,
      opacity: 0.3 + Math.random() * 0.3
    }));
    sLine.position.set(
      (Math.random() - 0.5) * 35,
      4 + Math.random() * 18,
      -5 - Math.random() * 10
    );
    sLine.userData = {
      rotSpeed: (Math.random() - 0.5) * 0.01,
      floatSpeed: 0.3 + Math.random() * 0.5,
      baseY: sLine.position.y,
      phase: Math.random() * Math.PI * 2
    };
    scene.add(sLine);
  }

  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    // Terminal gentle hover
    terminalGroup.position.y = Math.sin(t * 0.4) * 0.15;
    terminalGroup.rotation.y = Math.sin(t * 0.2) * 0.04;

    // Layer float
    layers.forEach((l) => {
      l.group.position.y = l.baseY + Math.sin(t * 0.6 + l.phase) * 0.3;
      l.group.rotation.z = Math.sin(t * 0.3 + l.phase) * 0.03;
    });

    // Particle drift
    particles.rotation.y = t * 0.03;
    const pos = particles.geometry.attributes.position.array;
    for (let i = 0; i < pCount; i++) {
      pos[i * 3 + 1] += 0.005;
      if (pos[i * 3 + 1] > 30) pos[i * 3 + 1] = -2;
    }
    particles.geometry.attributes.position.needsUpdate = true;

    // Scatter boxes
    scene.children.forEach((obj) => {
      if (obj.userData && obj.userData.rotSpeed !== undefined) {
        obj.rotation.x += obj.userData.rotSpeed;
        obj.rotation.y += obj.userData.rotSpeed * 0.7;
        obj.position.y = obj.userData.baseY + Math.sin(t * obj.userData.floatSpeed + obj.userData.phase) * 0.5;
      }
    });

    controls.update();
    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();
</script>
</body>
</html>
