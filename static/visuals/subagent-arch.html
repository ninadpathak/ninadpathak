<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallel Subagent Architecture</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #0e0e0e;
            --text-dim: #888888;
            --accent: #d44000;
            --border: #e0e0dc;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111111;
                --text: #f0f0f0;
                --text-dim: #6a6a6a;
                --accent: #ff5f1f;
                --border: #1e1e1e;
            }
        }

        body {
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased; margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { width: 95%; max-width: 1000px; max-width: 800px; padding: 40px; background: var(--bg); }
        svg { width: 100%; height: auto; overflow: visible; }
        .node-box { fill: var(--bg); stroke: var(--border); stroke-width: 3.0; }
        .node-label { font-family: var(--mono); font-size: 22px; fill: var(--text); font-weight: 600; text-transform: uppercase; }
        .line { stroke: var(--border); stroke-width: 3.0; marker-end: url(#arrow); }
    </style>
</head>
<body>
    <div class="container">
        <svg viewBox="-300 -80 1200 650">
            <defs>
                <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="var(--border)" />
                </marker>
            </defs>

            <!-- Lead Agent -->
            <rect x="325" y="20" width="150" height="60" rx="4" class="node-box" style="stroke: var(--accent);" />
            <text x="400" y="55" text-anchor="middle" class="node-label">Lead Agent</text>
            <text x="400" y="72" text-anchor="middle" style="font-size: 19px; fill: var(--text-dim);">PLANNING & DELEGATION</text>

            <!-- Lines -->
            <path d="M 400 80 L 150 150" class="line" />
            <path d="M 400 80 L 400 150" class="line" />
            <path d="M 400 80 L 650 150" class="line" />

            <!-- Subagents -->
            <g transform="translate(50, 150)">
                <rect width="200" height="80" rx="4" class="node-box" />
                <text x="100" y="35" text-anchor="middle" class="node-label">Analyst Agent</text>
                <text x="100" y="55" text-anchor="middle" style="font-size: 19px; fill: var(--text-dim);">REPO-SCALE ANALYSIS</text>
                <text x="100" y="68" text-anchor="middle" style="font-size: 19px; fill: var(--text-dim);">DEPENDENCY GRAPHING</text>
            </g>

            <g transform="translate(300, 150)">
                <rect width="200" height="80" rx="4" class="node-box" />
                <text x="100" y="35" text-anchor="middle" class="node-label">Coder Agent</text>
                <text x="100" y="55" text-anchor="middle" style="font-size: 19px; fill: var(--text-dim);">ATOMIC FILE EDITS</text>
                <text x="100" y="68" text-anchor="middle" style="font-size: 19px; fill: var(--text-dim);">LINT & FORMAT</text>
            </g>

            <g transform="translate(550, 150)">
                <rect width="200" height="80" rx="4" class="node-box" />
                <text x="100" y="35" text-anchor="middle" class="node-label">Verifier Agent</text>
                <text x="100" y="55" text-anchor="middle" style="font-size: 19px; fill: var(--text-dim);">TEST SUITE EXECUTION</text>
                <text x="100" y="68" text-anchor="middle" style="font-size: 19px; fill: var(--text-dim);">FAILURE TRIAGE</text>
            </g>

            <!-- Output -->
            <path d="M 150 230 L 400 300" class="line" />
            <path d="M 400 230 L 400 300" class="line" />
            <path d="M 650 230 L 400 300" class="line" />

            <rect x="325" y="300" width="150" height="60" rx="4" class="node-box" style="stroke: #0088ff;" />
            <text x="400" y="335" text-anchor="middle" class="node-label">Merged PR</text>
            <text x="400" y="352" text-anchor="middle" style="font-size: 19px; fill: var(--text-dim);">VERIFIED REFECTORED CODE</text>
        </svg>
    </div>
</body>
</html>
