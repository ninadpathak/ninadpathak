<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASM VDB Summary</title>
    <style>
        :root {
            --bg-1: #ffffff;
            --bg-2: #efefed;
            --border: #e0e0dc;
            --text-1: #0e0e0e;
            --text-2: #3a3a3a;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --bg-2: #1a1a1a;
                --border: #1e1e1e;
                --text-1: #f0f0f0;
                --text-2: #c2c2c2;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }

        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            background: var(--bg-1); 
            font-family: var(--sans); 
            color: var(--text-1);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container { 
            width: 100%; 
            height: 100%;
            padding: 1.5rem;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            height: auto;
            max-height: 100%;
            overflow: visible;
        }

        .label { font-family: var(--mono); font-size: 18px; fill: var(--text-2); font-weight: 600; text-transform: uppercase; }
        .val { font-family: var(--sans); font-size: 18px; fill: var(--text-1); }
        .header { font-family: var(--mono); font-size: 20px; fill: var(--accent); font-weight: 700; text-transform: uppercase; }
        .line { stroke: var(--border); stroke-width: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <svg viewBox="0 0 1000 450" preserveAspectRatio="xMidYMid meet">
            <g transform="translate(0, 50)">
                <text x="100" y="30" class="label">Feature</text>
                <text x="450" y="30" text-anchor="middle" class="header">PGlite</text>
                <text x="800" y="30" text-anchor="middle" class="header">SQLite-vec</text>
                <line x1="80" y1="55" x2="920" y2="55" class="line" style="stroke-width: 3; stroke: var(--text-1);" />
            </g>
            
            <g transform="translate(0, 130)">
                <text x="100" y="20" class="label">Architecture</text>
                <text x="450" y="20" text-anchor="middle" class="val">Postgres WASM</text>
                <text x="800" y="20" text-anchor="middle" class="val">C Extension</text>
                <line x1="80" y1="45" x2="920" y2="45" class="line" />
            </g>
            
            <g transform="translate(0, 200)">
                <text x="100" y="20" class="label">Best Index</text>
                <text x="450" y="20" text-anchor="middle" class="val" style="font-weight: 700;">HNSW (Graph)</text>
                <text x="800" y="20" text-anchor="middle" class="val" style="font-weight: 700;">Binary Quant</text>
                <line x1="80" y1="45" x2="920" y2="45" class="line" />
            </g>
            
            <g transform="translate(0, 270)">
                <text x="100" y="20" class="label">Precision</text>
                <text x="450" y="20" text-anchor="middle" class="val">99% recall (ANN)</text>
                <text x="800" y="20" text-anchor="middle" class="val">92% recall (Quant)</text>
                <line x1="80" y1="45" x2="920" y2="45" class="line" />
            </g>
            
            <g transform="translate(0, 340)">
                <text x="100" y="20" class="label">Ideal For</text>
                <text x="450" y="20" text-anchor="middle" class="val">Complex DB Apps</text>
                <text x="800" y="20" text-anchor="middle" class="val">Fast Search Only</text>
                <line x1="80" y1="45" x2="920" y2="45" class="line" style="stroke-width: 3; stroke: var(--text-1);" />
            </g>
            
            <text x="500" y="30" text-anchor="middle" class="label" style="font-size: 24px; fill: var(--text-1);">Architectural Decision Matrix</text>
        </svg>
    </div>
</body>
</html>
