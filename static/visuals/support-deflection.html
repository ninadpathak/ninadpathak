<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Deflection ROI</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #0e0e0e;
            --text-dim: #888888;
            --accent: #d44000;
            --border: #e0e0dc;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111111;
                --text: #f0f0f0;
                --text-dim: #6a6a6a;
                --accent: #ff5f1f;
                --border: #1e1e1e;
            }
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .chart-container {
            width: 90%;
            height: 80%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .axis { stroke: var(--text); stroke-width: 3.0; }
        .grid { stroke: var(--border); stroke-width: 2.5; stroke-dasharray: 4; }
        .axis-title { font-family: var(--mono); font-size: 20px; fill: var(--text); font-weight: 500; text-transform: uppercase; }
        
        .bar-depth { fill: var(--border); }
        .bar-tickets { fill: var(--accent); opacity: 0.8; }
        .bar-label { font-family: var(--mono); font-size: 17px; fill: var(--text); font-weight: 600; text-transform: uppercase; }
        
        .legend {
            margin-top: 40px;
            font-family: var(--mono);
            font-size: 17px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-align: center;
            display: flex;
            gap: 20px;
        }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .legend-color { width: 12px; height: 12px; }
    </style>
</head>
<body>
    <div class="chart-container">
        <svg viewBox="0 0 800 400" preserveAspectRatio="xMidYMid meet">
            <!-- Grid Lines -->
            <line x1="0" y1="100" x2="800" y2="100" class="grid" />
            <line x1="0" y1="200" x2="800" y2="200" class="grid" />
            <line x1="0" y1="300" x2="800" y2="300" class="grid" />
            
            <!-- Axes -->
            <line x1="0" y1="400" x2="800" y2="400" class="axis" /> <!-- X -->
            <line x1="0" y1="0" x2="0" y2="400" class="axis" />   <!-- Y -->
            
            <!-- Axis Titles -->
            <text x="400" y="450" text-anchor="middle" class="axis-title">Documentation Maturity →</text>
            <text x="-200" y="-50" text-anchor="middle" class="axis-title" transform="rotate(-90)">Relative Volume</text>
            
            <!-- Bar Groups -->
            <!-- Marketing Only -->
            <g transform="translate(100, 400)">
                <rect x="-30" y="-40" width="30" height="40" class="bar-depth" />
                <rect x="0" y="-380" width="30" height="380" class="bar-tickets" />
                <text x="0" y="25" text-anchor="middle" class="bar-label">Marketing Only</text>
            </g>
            
            <!-- Basic Tutorials -->
            <g transform="translate(300, 400)">
                <rect x="-30" y="-120" width="30" height="120" class="bar-depth" />
                <rect x="0" y="-280" width="30" height="280" class="bar-tickets" />
                <text x="0" y="25" text-anchor="middle" class="bar-label">Basic Tutorials</text>
            </g>
            
            <!-- Full Reference -->
            <g transform="translate(500, 400)">
                <rect x="-30" y="-240" width="30" height="240" class="bar-depth" />
                <rect x="0" y="-150" width="30" height="150" class="bar-tickets" />
                <text x="0" y="25" text-anchor="middle" class="bar-label">Full Reference</text>
            </g>
            
            <!-- Practitioner Dives -->
            <g transform="translate(700, 400)">
                <rect x="-30" y="-380" width="30" height="380" class="bar-depth" />
                <rect x="0" y="-40" width="30" height="40" class="bar-tickets" />
                <text x="0" y="25" text-anchor="middle" class="bar-label">Practitioner Dives</text>
            </g>
        </svg>
    </div>
    <div class="legend">
        <div class="legend-item">
            <div class="legend-color" style="background: var(--border);"></div>
            <span>Documentation Depth</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: var(--accent);"></div>
            <span>Support Ticket Volume</span>
        </div>
    </div>
</body>
</html>
