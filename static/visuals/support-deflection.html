<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Deflection ROI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root {
            --bg-1: #ffffff;
            --bg-2: #efefed;
            --border: #e0e0dc;
            --text-1: #0e0e0e;
            --text-2: #3a3a3a;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --bg-2: #1a1a1a;
                --border: #1e1e1e;
                --text-1: #f0f0f0;
                --text-2: #c2c2c2;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }

        body { margin: 0; background: var(--bg-1); font-family: var(--sans); color: var(--text-1); overflow: hidden; }
        #label { position: absolute; bottom: 20px; left: 20px; font-family: var(--mono); font-size: 12px; color: var(--text-3); text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="label">Documentation ROI // Support Ticket Deflection</div>

    <script>
        const scene = new THREE.Scene();
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        scene.background = new THREE.Color(isDark ? 0x111111 : 0xffffff);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Bars representing different documentation levels
        const data = [
            { label: 'Marketing Only', depth: 1, tickets: 10, color: 0xeeeeee },
            { label: 'Basic Tutorials', depth: 3, tickets: 7, color: 0xcccccc },
            { label: 'Full Reference', depth: 6, tickets: 4, color: 0x888888 },
            { label: 'Practitioner Deep Dives', depth: 10, tickets: 1, color: isDark ? 0xff5f1f : 0xd44000 }
        ];

        data.forEach((d, i) => {
            // Documentation Depth Bar (White/Grey)
            const depthGeo = new THREE.BoxGeometry(1, d.depth, 1);
            const depthMat = new THREE.MeshBasicMaterial({ color: d.color, transparent: true, opacity: 0.7 });
            const depthBar = new THREE.Mesh(depthGeo, depthMat);
            depthBar.position.set(i * 2 - 3, d.depth / 2 - 5, 0);
            scene.add(depthBar);

            // Support Ticket Bar (Red/Accent) - inversely proportional
            const ticketGeo = new THREE.BoxGeometry(1, d.tickets, 1);
            const ticketMat = new THREE.MeshBasicMaterial({ color: isDark ? 0xff5f1f : 0xd44000, transparent: true, opacity: 0.4 });
            const ticketBar = new THREE.Mesh(ticketGeo, ticketMat);
            ticketBar.position.set(i * 2 - 3, d.tickets / 2 - 5, 2);
            scene.add(ticketBar);
        });

        camera.position.set(5, 5, 10);
        camera.lookAt(0, 0, 0);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
