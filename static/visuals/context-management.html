<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Context Management | Ninad Pathak</title>
  <link rel="stylesheet" href="/static/css/visuals-base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .gauge-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; margin-top: 20px; }
    
    .bar-container { width: 100%; max-width: 600px; height: 32px; background: rgba(0,0,0,0.02); border: 1px solid var(--border); position: relative; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
    
    .limit-marker { position: absolute; right: 10%; top: 0; bottom: 0; width: 1px; border-left: 1px dashed var(--bg); z-index: 5; }
    .limit-label { position: absolute; right: 10%; top: -20px; transform: translateX(50%); font-family: var(--mono); font-size: 9px; color: var(--text-dim); font-weight: 600; white-space: nowrap; }

    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 600px; }
    .btn { padding: 12px 16px; border: 1px solid var(--border); color: var(--text-dim); background: var(--bg); font-family: var(--mono); font-size: 10px; cursor: pointer; text-transform: uppercase; font-weight: 600; transition: all 0.2s; }
    .btn:hover { border-color: var(--text); color: var(--text); }
    .btn.active { border-color: var(--accent); color: var(--accent); box-shadow: -3px 0 0 var(--accent); }
    
    .explanation { font-size: 13px; color: var(--text); line-height: 1.6; text-align: center; max-width: 500px; min-height: 60px; padding: 15px; border: 1px solid var(--border); background: var(--bg); }

    @media (max-width: 600px) {
      .controls { grid-template-columns: 1fr; }
      .bar-container { margin-top: 20px; }
    }
  </style>
</head>
<body>
  <div class="viz-container">
    <div class="header-meta">
      <div>
        <div class="label">// Resource_Management</div>
        <h1 class="title">Context Window Pressure</h1>
      </div>
      <div class="label" style="color: var(--text-dim);">Long_Horizon_Tasks</div>
    </div>

    <div class="gauge-wrap">
      <div style="width: 100%; position: relative;">
        <div class="limit-label">CRITICAL_CAPACITY</div>
        <div class="bar-container">
          <div class="limit-marker"></div>
          <div class="bar-fill" id="fill"></div>
        </div>
      </div>

      <div class="controls" id="btns">
        <button class="btn" data-val="95" data-text="Context full. Logic likely to fail as oldest turns are pushed out of the buffer.">Truncation</button>
        <button class="btn" data-val="40" data-text="Compression step reduces volume while preserving the core semantic signal.">Summarization</button>
        <button class="btn" data-val="25" data-text="Storing history externally keeps working window empty for new reasoning.">External Memory</button>
        <button class="btn" data-val="15" data-text="Splitting tasks keeps total token count low per independent execution call.">Task Decomposition</button>
      </div>

      <div class="explanation" id="exp">Select a strategy above to see its impact on the active context window.</div>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot"></div> POLICY: DYNAMIC</div>
      <div class="status-item">MAX_TOKENS: 128K</div>
    </div>
  </div>

  <script>
    const fill = document.getElementById('fill');
    const exp = document.getElementById('exp');
    
    document.querySelectorAll('.btn').forEach(b => {
      b.onclick = () => {
        document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        fill.style.width = b.dataset.val + '%';
        
        if(b.dataset.val > 90) {
          fill.style.background = 'var(--text)';
        } else {
          fill.style.background = 'var(--accent)';
        }
        
        exp.innerText = b.dataset.text;
      };
    });
    
    // Init first state
    document.querySelector('.btn').click();
  </script>
<script>function sendHeight(){const h=document.documentElement.scrollHeight;window.parent.postMessage({type:"resize-iframe",height:h},"*")}window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);new ResizeObserver(sendHeight).observe(document.body);</script></body>
</html>
