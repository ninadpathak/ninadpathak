<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Memory Management Visualization</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #info {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #ff5f1f;
    font-size: 12px;
    line-height: 1.8;
    pointer-events: none;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #legend {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: #d44000;
    font-size: 11px;
    pointer-events: none;
  }
  .legend-item { display: flex; align-items: center; margin-bottom: 6px; }
  .color-box { width: 14px; height: 14px; margin-right: 8px; border: 1px solid rgba(255,255,255,0.2); }
</style>
</head>
<body>
<div id="info">
  AI MEMORY HEAP<br>
  <span id="memoryStats">BLOCKS: 0 | COMPRESSED: 0 | EVICTED: 0</span><br>
  <br>
  DRAG TO ROTATE<br>
  SCROLL TO ZOOM
</div>
<div id="legend">
  <div class="legend-item"><div class="color-box" style="background:#ff5f1f;"></div>ACTIVE (HIGH PRIORITY)</div>
  <div class="legend-item"><div class="color-box" style="background:#d44000;"></div>COMPRESSED</div>
  <div class="legend-item"><div class="color-box" style="background:#ff9f5f;"></div>PENDING EVICTION</div>
  <div class="legend-item"><div class="color-box" style="background:#2a2a2a;"></div>EVICTED</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(25, 20, 25);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 10;
controls.maxDistance = 80;

const DARK = 0xff5f1f;
const LIGHT = 0xd44000;
const PENDING = 0xff9f5f;
const EVICTED = 0x2a2a2a;
const EMPTY = 0x111111;

const blocks = [];
const GRID_SIZE = 8;
const GRID_SPACING = 3.5;
const GRID_OFFSET = (GRID_SIZE - 1) * GRID_SPACING / 2;

const activeCount = { value: 0 };
const compressedCount = { value: 0 };
const evictedCount = { value: 0 };

function createBlockMaterial(color, opacity = 0.85, wireframeOpacity = 0.4) {
  return new THREE.MeshBasicMaterial({
    color: color,
    transparent: true,
    opacity: opacity,
  });
}

function createWireframeGeometry(size) {
  return new THREE.BoxGeometry(size, size, size);
}

function createBlock(x, y, z, color, wireColor) {
  const size = 2.5;
  const group = new THREE.Group();
  group.position.set(x, y, z);

  const solidGeo = new THREE.BoxGeometry(size, size, size);
  const solidMat = createBlockMaterial(color, 0.7);
  const solid = new THREE.Mesh(solidGeo, solidMat);
  group.add(solid);

  const wireGeo = new THREE.BoxGeometry(size + 0.1, size + 0.1, size + 0.1);
  const wireMat = new THREE.MeshBasicMaterial({
    color: wireColor || color,
    wireframe: true,
    transparent: true,
    opacity: 0.5,
  });
  const wireframe = new THREE.Mesh(wireGeo, wireMat);
  group.add(wireframe);

  group.userData = {
    solid,
    wireframe,
    originalColor: color,
    baseY: y,
    blockSize: size,
    priority: Math.random(),
    active: true
  };

  return group;
}

function initGrid() {
  let idx = 0;
  for (let x = 0; x < GRID_SIZE; x++) {
    for (let z = 0; z < GRID_SIZE; z++) {
      if (idx >= 50) break;
      const px = x * GRID_SPACING - GRID_OFFSET;
      const pz = z * GRID_SPACING - GRID_OFFSET;
      const py = (Math.random() - 0.5) * 2;

      const isActive = Math.random() > 0.3;
      const priority = Math.random();
      const color = isActive
        ? (priority > 0.7 ? DARK : (priority > 0.4 ? LIGHT : PENDING))
        : EMPTY;
      const wireColor = isActive ? color : 0x333333;

      const block = createBlock(px, py, pz, color, wireColor);
      block.userData.priority = priority;
      block.userData.isActive = isActive;
      block.userData.gridX = x;
      block.userData.gridZ = z;
      block.userData.compressionLevel = 0;

      scene.add(block);
      blocks.push(block);
      idx++;
    }
  }
}

function updateStats() {
  let active = 0, compressed = 0, evicted = 0;
  blocks.forEach(b => {
    if (!b.userData.isActive && b.userData.compressionLevel === 0) evicted++;
    else if (b.userData.compressionLevel > 0) compressed++;
    else active++;
  });
  activeCount.value = active;
  compressedCount.value = compressed;
  evictedCount.value = evicted;
  document.getElementById('memoryStats').textContent =
    `BLOCKS: ${blocks.length} | COMPRESSED: ${compressed} | EVICTED: ${evicted}`;
}

function animate() {
  requestAnimationFrame(animate);
  const time = Date.now() * 0.001;

  blocks.forEach((block, i) => {
    const data = block.userData;

    if (data.isActive) {
      block.position.y = data.baseY + Math.sin(time * 0.8 + i * 0.3) * 0.3;
      block.rotation.y = Math.sin(time * 0.3 + i * 0.2) * 0.1;
    } else if (data.compressionLevel > 0) {
      block.position.y = data.baseY - 1 + Math.sin(time * 1.5 + i * 0.5) * 0.15;
      block.scale.setScalar(1 - data.compressionLevel * 0.5);
    } else {
      block.position.y = data.baseY - 3;
      block.scale.setScalar(0.3);
      block.material && (block.material.opacity = 0.2);
    }

    if (data.solid) {
      const targetOpacity = data.isActive ? 0.8 : (data.compressionLevel > 0 ? 0.6 : 0.15);
      data.solid.material.opacity += (targetOpacity - data.solid.material.opacity) * 0.05;
    }

    const pulseSpeed = data.isActive && data.priority > 0.6 ? 2 : 0.5;
    const pulse = 0.4 + Math.sin(time * pulseSpeed + i) * 0.1;
    if (data.wireframe) {
      data.wireframe.material.opacity = pulse;
    }
  });

  controls.update();
  renderer.render(scene, camera);
}

function triggerEviction() {
  const candidates = blocks
    .filter(b => b.userData.isActive && b.userData.priority < 0.5)
    .sort((a, b) => a.userData.priority - b.userData.priority);

  const toEvict = candidates.slice(0, 3);
  toEvict.forEach((block, i) => {
    setTimeout(() => {
      block.userData.isActive = false;
      block.userData.priority = 0;
      if (block.userData.solid) block.userData.solid.material.color.setHex(EVICTED);
      if (block.userData.wireframe) block.userData.wireframe.material.color.setHex(EVICTED);
      updateStats();
    }, i * 200);
  });
}

function triggerCompression() {
  const candidates = blocks
    .filter(b => b.userData.isActive && b.userData.compressionLevel < 1)
    .sort((a, b) => b.userData.priority - a.userData.priority);

  const toCompress = candidates.slice(0, 4);
  toCompress.forEach((block, i) => {
    setTimeout(() => {
      block.userData.compressionLevel = Math.min(1, block.userData.compressionLevel + 0.5);
      if (block.userData.solid) block.userData.solid.material.color.setHex(LIGHT);
      updateStats();
    }, i * 150);
  });
}

function triggerEvictAll() {
  blocks.forEach((block, i) => {
    setTimeout(() => {
      block.userData.isActive = false;
      block.userData.priority = 0;
      block.userData.compressionLevel = 0;
      if (block.userData.solid) block.userData.solid.material.color.setHex(EVICTED);
      if (block.userData.wireframe) block.userData.wireframe.material.color.setHex(EVICTED);
      updateStats();
    }, i * 30);
  });
}

function resetBlocks() {
  blocks.forEach((block, i) => {
    setTimeout(() => {
      const isActive = Math.random() > 0.3;
      const priority = Math.random();
      const color = isActive
        ? (priority > 0.7 ? DARK : (priority > 0.4 ? LIGHT : PENDING))
        : EMPTY;

      block.userData.isActive = isActive;
      block.userData.priority = priority;
      block.userData.compressionLevel = 0;
      block.userData.baseY = block.position.y;
      if (block.userData.solid) block.userData.solid.material.color.setHex(color);
      if (block.userData.wireframe) block.userData.wireframe.material.color.setHex(color);
      updateStats();
    }, i * 20);
  });
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

window.addEventListener('keydown', (e) => {
  if (e.key === 'e') triggerEviction();
  if (e.key === 'c') triggerCompression();
  if (e.key === 'r') resetBlocks();
  if (e.key === 'x') triggerEvictAll();
});

const instruction = document.createElement('div');
instruction.style.cssText = 'position:absolute;top:20px;right:20px;color:#ff5f1f;font-size:11px;text-align:right;line-height:2;';
instruction.innerHTML = 'KEYS: [E] EVICT LOW PRIORITY | [C] COMPRESS | [R] RESET | [X] EVICT ALL';
document.body.appendChild(instruction);

initGrid();
updateStats();
animate();
</script>
</body>
</html>
