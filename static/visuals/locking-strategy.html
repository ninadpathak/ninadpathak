<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locking Strategy Visualization</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #0e0e0e;
            --text-dim: #888888;
            --accent: #d44000;
            --border: #e0e0dc;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111111;
                --text: #f0f0f0;
                --text-dim: #6a6a6a;
                --accent: #ff5f1f;
                --border: #1e1e1e;
            }
        }

        body {
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased; margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 800px; padding: 40px; background: var(--bg); }
        svg { width: 100%; height: auto; overflow: visible; }
        .step-label { font-family: var(--mono); font-size: 22px; fill: var(--text); font-weight: 600; }
        .time-label { font-family: var(--mono); font-size: 20px; fill: var(--text-dim); }
        .state-box { fill: var(--bg); stroke: var(--border); stroke-width: 2.5; }
        .lock-line { stroke: #0088ff; stroke-width: 3.5; stroke-dasharray: 4; }
    </style>
</head>
<body>
    <div class="container">
        <svg viewBox="-80 -40 960 420">
            <!-- Timeline -->
            <line x1="50" y1="250" x2="750" y2="250" stroke="var(--text-dim)" stroke-width="1" />
            <text x="750" y="270" text-anchor="end" class="time-label">TIME →</text>

            <!-- Serialized Execution -->
            <g transform="translate(100, 50)">
                <rect width="120" height="40" rx="4" class="state-box" style="stroke: #0088ff;" />
                <text x="60" y="25" text-anchor="middle" class="step-label">A: READ (0)</text>
                <rect x="130" y="0" width="150" height="40" rx="4" class="state-box" style="stroke: var(--accent);" />
                <text x="205" y="25" text-anchor="middle" class="step-label">A: WRITE (1)</text>
                
                <!-- B is locked until A finishes -->
                <path d="M 280 20 L 320 20" stroke="#0088ff" stroke-width="2" marker-end="url(#lock-arrow)" />
                
                <rect x="330" y="0" width="120" height="40" rx="4" class="state-box" style="stroke: #0088ff;" />
                <text x="390" y="25" text-anchor="middle" class="step-label">B: READ (1)</text>
                <rect x="460" y="0" width="150" height="40" rx="4" class="state-box" style="stroke: var(--accent);" />
                <text x="535" y="25" text-anchor="middle" class="step-label">B: WRITE (2)</text>
            </g>

            <defs>
                <marker id="lock-arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#0088ff" />
                </marker>
            </defs>

            <text x="400" y="200" text-anchor="middle" class="time-label" style="font-weight: 700; fill: #0088ff;">SOLUTION: ATOMIC QUEUING (PROMISE CHAIN)</text>
            <text x="400" y="225" text-anchor="middle" class="time-label">B WAITS FOR A TO PERSIST BEFORE READING STATE</text>
        </svg>
    </div>
</body>
</html>
