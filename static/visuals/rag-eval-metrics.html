<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Evaluation Funnel: Recall, Precision, Faithfulness, Relevance</title>
<style>
:root{--bg-1:#fff;--bg-2:#efefed;--border:#e0e0dc;--text-1:#0e0e0e;--text-2:#3a3a3a;--text-3:#888;--accent:#d44000;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;}
@media (prefers-color-scheme:dark){:root{--bg-1:#111;--bg-2:#1a1a1a;--border:#1e1e1e;--text-1:#f0f0f0;--text-2:#c2c2c2;--text-3:#6a6a6a;--accent:#ff5f1f;}}
body{margin:0;background:var(--bg-1);font-family:var(--sans);color:var(--text-1);overflow:hidden;}

body{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.wrap{width:100%;max-width:560px;padding:0 20px;box-sizing:border-box;}
.title{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-3);text-align:center;margin-bottom:16px;}
.stage{display:flex;align-items:center;gap:14px;margin-bottom:10px;}
.stage-meta{flex:0 0 200px;}
.stage-name{font-family:var(--mono);font-size:12px;color:var(--text-1);}
.stage-sub{font-family:var(--mono);font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;}
.gauge{flex:1;height:20px;border:1px solid var(--border);background:var(--bg-2);position:relative;overflow:hidden;}
.gauge .fill{position:absolute;left:0;top:0;bottom:0;width:0;background:var(--text-3);transition:width 1s ease;}
.gauge.key .fill{background:var(--accent);}
.thresh{position:absolute;top:-2px;bottom:-2px;width:1px;background:var(--text-1);opacity:0.5;}
.val{flex:0 0 42px;text-align:right;font-family:var(--mono);font-size:12px;color:var(--text-2);}
.gauge.key + .val{color:var(--accent);}
.legend{display:flex;justify-content:center;gap:20px;margin-top:16px;font-family:var(--mono);font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.08em;}
.legend span{display:inline-flex;align-items:center;gap:6px;}
.swatch{width:10px;height:10px;border:1px solid var(--border);}
.swatch.acc{background:var(--accent);border-color:var(--accent);}
.swatch.grey{background:var(--text-3);}
.tline{display:inline-block;width:10px;height:0;border-top:1px solid var(--text-1);opacity:0.6;}

@media (max-width:600px){
.stage-meta{flex:0 0 130px;}
.stage-name{font-size:11px;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="title">RAG Eval Funnel / Score 0&ndash;1</div>

  <div class="stage">
    <div class="stage-meta"><div class="stage-name">Context Recall</div><div class="stage-sub">retrieval &middot; thresh 0.70</div></div>
    <div class="gauge"><div class="fill" data-w="84"></div><div class="thresh" style="left:70%"></div></div>
    <div class="val" data-v="0.84">0.00</div>
  </div>

  <div class="stage">
    <div class="stage-meta"><div class="stage-name">Context Precision</div><div class="stage-sub">selection &middot; thresh 0.50</div></div>
    <div class="gauge"><div class="fill" data-w="71"></div><div class="thresh" style="left:50%"></div></div>
    <div class="val" data-v="0.71">0.00</div>
  </div>

  <div class="stage">
    <div class="stage-meta"><div class="stage-name">Faithfulness</div><div class="stage-sub">generation &middot; thresh 0.50</div></div>
    <div class="gauge"><div class="fill" data-w="66"></div><div class="thresh" style="left:50%"></div></div>
    <div class="val" data-v="0.66">0.00</div>
  </div>

  <div class="stage">
    <div class="stage-meta"><div class="stage-name">Answer Relevance</div><div class="stage-sub">end-to-end &middot; thresh 0.60</div></div>
    <div class="gauge key"><div class="fill" data-w="78"></div><div class="thresh" style="left:60%"></div></div>
    <div class="val" data-v="0.78">0.00</div>
  </div>

  <div class="legend">
    <span><span class="swatch acc"></span>End-to-end signal</span>
    <span><span class="swatch grey"></span>Stage score</span>
    <span><span class="tline"></span>Min threshold</span>
  </div>
</div>
<script>
var fills=document.querySelectorAll('.fill');
var vals=document.querySelectorAll('.val');
function reset(){fills.forEach(function(f){f.style.width='0';});vals.forEach(function(v){v.textContent='0.00';});}
function play(){
  reset();
  fills.forEach(function(f,i){
    setTimeout(function(){
      f.style.width=f.getAttribute('data-w')+'%';
      var target=parseFloat(vals[i].getAttribute('data-v'));
      var steps=20,n=0;
      var t=setInterval(function(){
        n++;vals[i].textContent=(target*n/steps).toFixed(2);
        if(n>=steps){vals[i].textContent=target.toFixed(2);clearInterval(t);}
      },45);
    },i*450+200);
  });
}
play();
setInterval(play,4200);
</script>
</body>
</html>
