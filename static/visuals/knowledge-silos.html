<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Silo Bottleneck</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root {
            --bg-1: #ffffff;
            --bg-2: #efefed;
            --border: #e0e0dc;
            --text-1: #0e0e0e;
            --text-2: #3a3a3a;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --bg-2: #1a1a1a;
                --border: #1e1e1e;
                --text-1: #f0f0f0;
                --text-2: #c2c2c2;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }

        body { margin: 0; background: var(--bg-1); font-family: var(--sans); color: var(--text-1); overflow: hidden; }
        #label { position: absolute; bottom: 20px; left: 20px; font-family: var(--mono); font-size: 12px; color: var(--text-3); text-transform: uppercase; }
        #status { position: absolute; top: 20px; right: 20px; font-family: var(--mono); font-size: 12px; color: var(--accent); text-align: right; }
    </style>
</head>
<body>
    <div id="label">Knowledge Silo // Throughput Bottleneck</div>
    <div id="status">Throughput Capacity: <span id="flow">100</span>%</div>

    <script>
        const scene = new THREE.Scene();
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        scene.background = new THREE.Color(isDark ? 0x111111 : 0xffffff);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Pipe representing the engineering pipeline
        const pipeGeo = new THREE.CylinderGeometry(2, 2, 10, 32, 1, true);
        const pipeMat = new THREE.MeshBasicMaterial({ 
            color: isDark ? 0x222222 : 0xeeeeee, 
            wireframe: true, 
            transparent: true, 
            opacity: 0.3 
        });
        const pipe = new THREE.Mesh(pipeGeo, pipeMat);
        pipe.rotation.z = Math.PI / 2;
        scene.add(pipe);

        // Particles representing "Throughput"
        const particleCount = 200;
        const particles = new THREE.Group();
        scene.add(particles);

        const pGeo = new THREE.SphereGeometry(0.05, 8, 8);
        const pMat = new THREE.MeshBasicMaterial({ color: isDark ? 0x888888 : 0x333333 });

        const particleData = [];
        for (let i = 0; i < particleCount; i++) {
            const p = new THREE.Mesh(pGeo, pMat);
            particles.add(p);
            particleData.push({
                mesh: p,
                x: (Math.random() - 0.5) * 10,
                y: (Math.random() - 0.5) * 3,
                z: (Math.random() - 0.5) * 3,
                speed: 0.05 + Math.random() * 0.1
            });
        }

        // The "Silt" (Undocumented code) blocking the pipe
        const siltGeo = new THREE.TorusGeometry(1.5, 0.5, 16, 100);
        const siltMat = new THREE.MeshBasicMaterial({ color: isDark ? 0xff5f1f : 0xd44000, transparent: true, opacity: 0.6 });
        const silt = new THREE.Mesh(siltGeo, siltMat);
        silt.rotation.y = Math.PI / 2;
        scene.add(silt);

        camera.position.set(0, 5, 12);
        camera.lookAt(0, 0, 0);

        const flowEl = document.getElementById('flow');

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            const time = Date.now() * 0.001;
            const siltScale = 1 + Math.sin(time) * 0.5;
            silt.scale.set(siltScale, siltScale, 1);
            
            const capacity = (100 - (siltScale * 25)).toFixed(0);
            flowEl.innerText = capacity;

            particleData.forEach(p => {
                p.x += p.speed;
                if (p.x > 5) p.x = -5;
                
                // Slow down particles as they pass through silt
                if (Math.abs(p.x) < 1) {
                    p.mesh.position.x = p.x;
                    p.mesh.scale.setScalar(0.5);
                } else {
                    p.mesh.position.x = p.x;
                    p.mesh.scale.setScalar(1);
                }
                p.mesh.position.y = p.y;
                p.mesh.position.z = p.z;
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
