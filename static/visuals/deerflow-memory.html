<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DeerFlow Memory Architecture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #info {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #ff5f1f;
    font-size: 13px;
    line-height: 1.6;
    pointer-events: none;
    text-shadow: 0 0 8px rgba(255,95,31,0.5);
  }
  #info h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    color: #ff5f1f;
  }
  #info p { color: #d44000; opacity: 0.8; }
  #legend {
    position: absolute;
    bottom: 20px;
    right: 20px;
    color: #ff5f1f;
    font-size: 11px;
    text-align: right;
    pointer-events: none;
  }
  #legend span { display: block; margin-bottom: 4px; opacity: 0.7; }
</style>
</head>
<body>
<div id="info">
  <h1>DEERFLOW MEMORY ARCHITECTURE</h1>
  <p>Drag to orbit &bull; Scroll to zoom</p>
</div>
<div id="legend">
  <span>Layer 1: ThreadState (session)</span>
  <span>Layer 2: Summarization (within-session)</span>
  <span>Layer 3: Long-term (cross-session)</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const DARK = 0xff5f1f;
const LIGHT = 0xd44000;
const EDGE_COLOR = 0xff5f1f;

function createBox(w, h, d, color, label, scene) {
  const geometry = new THREE.BoxGeometry(w, h, d);
  const edges = new THREE.EdgesGeometry(geometry);
  const line = new THREE.LineSegments(
    edges,
    new THREE.LineBasicMaterial({ color: color, linewidth: 1, transparent: true, opacity: 0.9 })
  );

  const fillMat = new THREE.MeshBasicMaterial({
    color: color,
    transparent: true,
    opacity: 0.04,
    side: THREE.BackSide
  });
  const fill = new THREE.Mesh(geometry, fillMat);

  const group = new THREE.Group();
  group.add(line);
  group.add(fill);
  group.userData.label = label;
  scene.add(group);
  return group;
}

function createConnection(start, end, scene, dashOffset) {
  const midY = (start.position.y + end.position.y) / 2;
  const points = [
    new THREE.Vector3(start.position.x, start.position.y, start.position.z),
    new THREE.Vector3(start.position.x, midY, start.position.z),
    new THREE.Vector3(end.position.x, midY, end.position.z),
    new THREE.Vector3(end.position.x, end.position.y, end.position.z),
  ];
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({
    color: EDGE_COLOR,
    transparent: true,
    opacity: 0.4,
  });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  return line;
}

// Scene setup
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a0a, 0.04);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 12, 28);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxDistance = 60;
controls.minDistance = 5;

// Grid
const gridHelper = new THREE.GridHelper(40, 40, 0x1a1a1a, 0x1a1a1a);
scene.add(gridHelper);

// Ambient glow plane
const planeGeo = new THREE.PlaneGeometry(60, 60);
const planeMat = new THREE.MeshBasicMaterial({
  color: 0x1a0800,
  transparent: true,
  opacity: 0.3,
  side: THREE.DoubleSide
});
const plane = new THREE.Mesh(planeGeo, planeMat);
plane.rotation.x = -Math.PI / 2;
plane.position.y = -6;
scene.add(plane);

// Layer 1 boxes — ThreadState (session)
const userBox = createBox(3.5, 1.2, 2, LIGHT, 'User Input', scene);
userBox.position.set(-12, 3, 0);

const threadBox = createBox(4, 1.5, 2.5, DARK, 'ThreadState', scene);
threadBox.position.set(-6, 3, 0);

const msgBox = createBox(3, 1, 2, LIGHT, 'messages[]', scene);
msgBox.position.set(0, 3, 0);

const sandboxBox = createBox(3.5, 1.2, 2, DARK, 'Sandbox', scene);
sandboxBox.position.set(5.5, 3, 0);

const artifactsBox = createBox(3, 1, 2, LIGHT, 'artifacts[]', scene);
artifactsBox.position.set(10, 3, 0);

// Layer 2 — Summarization
const summBox = createBox(4.5, 1.5, 2.5, DARK, 'SummarizationMiddleware', scene);
summBox.position.set(0, -1, 0);

const summArrow1 = createConnection(threadBox, summBox, scene);
const summArrow2 = createConnection(msgBox, summBox, scene);

// Layer 3 — Long-term memory
const memoryBox = createBox(4, 1.5, 2.5, DARK, 'memory.json', scene);
memoryBox.position.set(0, -5, 0);

const longTermArrow = createConnection(summBox, memoryBox, scene);

// Sub-agents row
const leadBox = createBox(3.5, 1.2, 2, DARK, 'Lead Agent', scene);
leadBox.position.set(-10, -5, 8);

const sub1Box = createBox(2.8, 1, 1.8, LIGHT, 'Sub-Agent 1', scene);
sub1Box.position.set(-5, -5, 8);

const sub2Box = createBox(2.8, 1, 1.8, LIGHT, 'Sub-Agent 2', scene);
sub2Box.position.set(0, -5, 8);

const sub3Box = createBox(2.8, 1, 1.8, LIGHT, 'Sub-Agent N', scene);
sub3Box.position.set(5, -5, 8);

const isolationBox = createBox(9, 0.4, 3, LIGHT, 'Isolated Context', scene);
isolationBox.position.set(-2.5, -6.2, 8);
isolationBox.children[0].material.opacity = 0.15;
isolationBox.children[1].material.opacity = 0.03;

// Connections: lead to sub-agents
createConnection(leadBox, sub1Box, scene);
createConnection(leadBox, sub2Box, scene);
createConnection(leadBox, sub3Box, scene);

// Connections: memory to lead (cross-session)
createConnection(memoryBox, leadBox, scene);

// Middleware chain annotation boxes
const mw1 = createBox(3, 0.7, 1.5, LIGHT, 'ThreadDataMW', scene);
mw1.position.set(-12, -1, -5);
mw1.children[0].material.opacity = 0.6;

const mw2 = createBox(3, 0.7, 1.5, LIGHT, 'SandboxMW', scene);
mw2.position.set(-8, -1, -5);
mw2.children[0].material.opacity = 0.6;

const mw3 = createBox(3.5, 0.7, 1.5, DARK, 'SummarizationMW', scene);
mw3.position.set(-3.5, -1, -5);
mw3.children[0].material.opacity = 0.9;

const mw4 = createBox(3, 0.7, 1.5, LIGHT, 'TitleMW', scene);
mw4.position.set(1, -1, -5);
mw4.children[0].material.opacity = 0.6;

const mw5 = createBox(3, 0.7, 1.5, LIGHT, 'ClarifyMW', scene);
mw5.position.set(5, -1, -5);
mw5.children[0].material.opacity = 0.6;

const mwLabel = createBox(2, 0.4, 1, LIGHT, 'Middleware Chain', scene);
mwLabel.position.set(-3.5, -1.8, -5);
mwLabel.children[0].material.opacity = 0.4;
mwLabel.children[1].material.opacity = 0.02;

// Vertical connector for middleware chain
const mwVerts = [
  new THREE.Vector3(-12, -0.4, -5),
  new THREE.Vector3(-3.5, -0.4, -5),
];
for (let i = 0; i < 4; i++) {
  mwVerts.push(new THREE.Vector3(-12 + i * 2.25, -0.4, -5));
}
const mwGeo = new THREE.BufferGeometry().setFromPoints(mwVerts);
const mwLine = new THREE.Line(mwGeo, new THREE.LineBasicMaterial({
  color: EDGE_COLOR, transparent: true, opacity: 0.2
}));
scene.add(mwLine);

// Title
const titleBox = createBox(6, 0.6, 1, DARK, 'LangGraph Agent Runtime', scene);
titleBox.position.set(0, 6, 0);
titleBox.children[0].material.opacity = 0.7;

// Subtitle
const subBox = createBox(5, 0.5, 1, LIGHT, 'DeerFlow 2.0 Memory Flow', scene);
subBox.position.set(0, 7.2, 0);
subBox.children[0].material.opacity = 0.4;

// Floating particles
const particlesGeo = new THREE.BufferGeometry();
const pCount = 300;
const pPositions = new Float32Array(pCount * 3);
for (let i = 0; i < pCount * 3; i++) {
  pPositions[i] = (Math.random() - 0.5) * 50;
}
particlesGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
const particles = new THREE.Points(
  particlesGeo,
  new THREE.PointsMaterial({ color: DARK, size: 0.08, transparent: true, opacity: 0.4 })
);
scene.add(particles);

// Pulse animation for key nodes
let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.01;

  // Pulse threadBox
  const pulse = 1 + Math.sin(time * 2) * 0.03;
  threadBox.scale.set(pulse, pulse, pulse);

  // Pulse memory
  const pulse2 = 1 + Math.sin(time * 1.5 + 1) * 0.04;
  memoryBox.scale.set(pulse2, pulse2, pulse2);

  // Slow particle drift
  particles.rotation.y += 0.0005;

  controls.update();
  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
