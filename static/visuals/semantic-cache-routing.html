<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Cache Routing</title>
    <style>
        :root {
            --bg-1: #ffffff;
            --text-1: #0e0e0e;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --text-1: #f0f0f0;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }
        
        body { margin: 0; height: 100vh; background: var(--bg-1); font-family: var(--mono); color: var(--text-1); overflow: hidden; display: flex; align-items: center; justify-content: center;}
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;}
        
        .overlay {
            position: absolute;
            top: 2rem;
            left: 2rem;
            font-size: 12px;
            pointer-events: none;
            background: var(--bg-1);
            padding: 10px;
            border: 1px solid var(--text-3);
            z-index: 10;
        }
        .stat { color: var(--accent); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="overlay">
        Architecture: <span class="stat">Semantic Cache</span> <br>
        Status: <span class="stat" id="status-val">Cache Hit</span><br>
        Cost: <span class="stat" id="cost-val">$0.00</span>
        <div style="font-size: 10px; color: var(--text-3); margin-top: 8px;">Drag to rotate</div>
    </div>

    <script>
        const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const colorBg = isDark ? 0x111111 : 0xffffff;
        const colorPoint = isDark ? 0xff5f1f : 0xd44000;
        const colorText = isDark ? 0xffffff : 0x000000;
        const colorWire = isDark ? 0x444444 : 0xcccccc;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(colorBg);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const group = new THREE.Group();
        scene.add(group);

        // Nodes
        const createNode = (x, y, radius, color) => {
            const geo = new THREE.CircleGeometry(radius, 32);
            const edges = new THREE.EdgesGeometry(geo);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: color, linewidth: 2 }));
            
            const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: colorBg, transparent: true, opacity: 0.8 }));
            
            const nodeGroup = new THREE.Group();
            nodeGroup.add(mesh);
            nodeGroup.add(line);
            nodeGroup.position.set(x, y, 0);
            return nodeGroup;
        };

        const router = createNode(-5, 0, 1.5, colorText);
        const cache = createNode(2, 4, 2, colorPoint);
        const llm = createNode(2, -4, 2.5, colorWire);

        group.add(router);
        group.add(cache);
        group.add(llm);

        // Connectors
        const createCurve = (start, end) => {
            const curve = new THREE.QuadraticBezierCurve3(
                new THREE.Vector3(start.x, start.y, 0),
                new THREE.Vector3(start.x + (end.x - start.x) / 2, start.y, 0),
                new THREE.Vector3(end.x, end.y, 0)
            );
            const points = curve.getPoints(50);
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            return new THREE.Line(geo, new THREE.LineBasicMaterial({ color: colorWire }));
        };

        const lineToCache = createCurve(router.position, cache.position);
        const lineToLlm = createCurve(router.position, llm.position);

        group.add(lineToCache);
        group.add(lineToLlm);

        // Packet
        const packet = new THREE.Mesh(
            new THREE.SphereGeometry(0.3, 16, 16),
            new THREE.MeshBasicMaterial({ color: colorPoint })
        );
        group.add(packet);

        const statusEl = document.getElementById('status-val');
        const costEl = document.getElementById('cost-val');

        let time = 0;
        let packetPath = 'cache';

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            time += 0.015;
            let t = (time % 2) / 2; // 0 to 1

            if (time % 4 < 2) {
                // To cache
                packetPath = 'cache';
                statusEl.innerText = "Cache Hit";
                costEl.innerText = "$0.00";
                
                const curve = new THREE.QuadraticBezierCurve3(
                    new THREE.Vector3(router.position.x, router.position.y, 0),
                    new THREE.Vector3(router.position.x + (cache.position.x - router.position.x) / 2, router.position.y, 0),
                    new THREE.Vector3(cache.position.x, cache.position.y, 0)
                );
                const pos = curve.getPoint(t);
                packet.position.copy(pos);
            } else {
                // To LLM
                packetPath = 'llm';
                statusEl.innerText = "Cache Miss -> LLM";
                costEl.innerText = "$0.02";
                
                const curve = new THREE.QuadraticBezierCurve3(
                    new THREE.Vector3(router.position.x, router.position.y, 0),
                    new THREE.Vector3(router.position.x + (llm.position.x - router.position.x) / 2, router.position.y, 0),
                    new THREE.Vector3(llm.position.x, llm.position.y, 0)
                );
                const pos = curve.getPoint(t);
                packet.position.copy(pos);
            }

            // Pulse effects
            cache.scale.setScalar(1 + (packetPath === 'cache' && t > 0.8 ? 0.1 : 0));
            llm.scale.setScalar(1 + (packetPath === 'llm' && t > 0.8 ? 0.1 : 0));

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
