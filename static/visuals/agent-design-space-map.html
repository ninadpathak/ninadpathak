<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Agent Design Space Map</title>
<style>
:root{--bg-1:#fff;--bg-2:#efefed;--border:#e0e0dc;--text-1:#0e0e0e;--text-2:#3a3a3a;--text-3:#888;--accent:#d44000;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;}
@media (prefers-color-scheme:dark){:root{--bg-1:#111;--bg-2:#1a1a1a;--border:#1e1e1e;--text-1:#f0f0f0;--text-2:#c2c2c2;--text-3:#6a6a6a;--accent:#ff5f1f;}}
body{margin:0;background:var(--bg-1);font-family:var(--sans);color:var(--text-1);overflow:hidden;}

.scene{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;box-sizing:border-box;padding:18px;}
.wrap{position:relative;width:100%;max-width:540px;}

.ylabel{
  position:absolute;left:-6px;top:50%;transform:translate(-100%,-50%) rotate(-180deg);writing-mode:vertical-rl;
  font-family:var(--mono);font-size:8.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-3);
}
.xlabel{
  text-align:center;font-family:var(--mono);font-size:8.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-3);margin-top:8px;
}

.plot{position:relative;width:100%;height:300px;border-left:1px solid var(--border);border-bottom:1px solid var(--border);box-sizing:border-box;}
.grid{position:absolute;inset:0;}
.gl{position:absolute;background:var(--border);}
.gl.h{left:0;right:0;height:1px;}
.gl.v{top:0;bottom:0;width:1px;}

.node{
  position:absolute;transform:translate(-50%,-50%);text-align:center;width:110px;
  transition:opacity 0.3s linear;
}
.dot{
  width:13px;height:13px;border-radius:50%;margin:0 auto 4px;
  border:1.5px solid var(--text-3);background:var(--bg-1);
  transition:background 0.3s linear,border-color 0.3s linear,box-shadow 0.3s linear,width 0.3s linear,height 0.3s linear;
}
.lbl{font-family:var(--mono);font-size:8px;line-height:1.25;color:var(--text-2);letter-spacing:0.02em;transition:color 0.3s linear;}

.node.active .dot{background:var(--accent);border-color:var(--accent);width:16px;height:16px;box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 18%,transparent);}
.node.active .lbl{color:var(--accent);font-weight:700;}

/* positions: x = run frequency (left once -> right continuous), y = blast radius / harder to audit (bottom low -> top high) */
.p-rag{left:17%;top:80%;}
.p-conv{left:33%;top:62%;}
.p-flow{left:55%;top:46%;}
.p-sup{left:72%;top:30%;}
.p-goal{left:88%;top:14%;}

.tick{position:absolute;font-family:var(--mono);font-size:7px;color:var(--text-3);letter-spacing:0.08em;text-transform:uppercase;}
.tick.bl{left:2px;bottom:-14px;}
.tick.br{right:2px;bottom:-14px;}
.tick.tl{left:-2px;top:-2px;transform:translateX(-100%);}

@media (max-width:600px){
  .plot{height:260px;}
  .node{width:90px;}
  .lbl{font-size:7.5px;}
}
</style>
</head>
<body>
<div class="scene">
  <div class="wrap">
    <div class="ylabel">Blast radius / harder to audit &rarr;</div>
    <div class="plot">
      <div class="grid">
        <div class="gl h" style="top:25%"></div>
        <div class="gl h" style="top:50%"></div>
        <div class="gl h" style="top:75%"></div>
        <div class="gl v" style="left:25%"></div>
        <div class="gl v" style="left:50%"></div>
        <div class="gl v" style="left:75%"></div>
      </div>

      <div class="node p-rag" data-i="0"><div class="dot"></div><div class="lbl">RAG single-loop</div></div>
      <div class="node p-conv" data-i="1"><div class="dot"></div><div class="lbl">Multi-turn conversational</div></div>
      <div class="node p-flow" data-i="2"><div class="dot"></div><div class="lbl">Workflow orchestration</div></div>
      <div class="node p-sup" data-i="3"><div class="dot"></div><div class="lbl">Supervisor-delegation</div></div>
      <div class="node p-goal" data-i="4"><div class="dot"></div><div class="lbl">Persistent-goal</div></div>

      <div class="tick bl">runs once</div>
      <div class="tick br">runs continuously</div>
    </div>
    <div class="xlabel">Run frequency &rarr;</div>
  </div>
</div>
<script>
const nodes=Array.from(document.querySelectorAll('.node')).sort((a,b)=>a.dataset.i-b.dataset.i);
let i=0;
function step(){
  nodes.forEach(n=>n.classList.remove('active'));
  nodes[i].classList.add('active');
  i=(i+1)%nodes.length;
}
step();
setInterval(step,1700);
</script>
</body>
</html>
