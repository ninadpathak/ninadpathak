<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Success Rates</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #0e0e0e;
            --text-dim: #888888;
            --accent: #d44000;
            --border: #e0e0dc;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111111;
                --text: #f0f0f0;
                --text-dim: #6a6a6a;
                --accent: #ff5f1f;
                --border: #1e1e1e;
            }
        }

        body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 800px; padding: 40px; background: var(--bg); }
        svg { width: 100%; height: auto; overflow: visible; }
        .bar-label { font-family: var(--mono); font-size: 18px; fill: var(--text); font-weight: 600; text-transform: uppercase; }
        .bar-val { font-family: var(--mono); font-size: 20px; fill: var(--accent); font-weight: 700; }
        .axis { stroke: var(--text); stroke-width: 3.0; }
        .grid { stroke: var(--border); stroke-width: 2.5; stroke-dasharray: 4; }
    </style>
</head>
<body>
    <div class="container">
        <svg viewBox="0 0 800 400">
            <!-- Grid -->
            <line x1="200" y1="50" x2="800" y2="50" class="grid" />
            <line x1="200" y1="150" x2="800" y2="150" class="grid" />
            <line x1="200" y1="250" x2="800" y2="250" class="grid" />
            <line x1="200" y1="350" x2="800" y2="350" class="grid" />
            
            <!-- Claude Code -->
            <g>
                <rect x="200" y="70" width="485" height="40" fill="var(--accent)" />
                <text x="190" y="95" text-anchor="end" class="bar-label">Claude Code (Logic)</text>
                <text x="695" y="95" class="bar-val">80.9%</text>
            </g>
            <g>
                <rect x="200" y="120" width="450" height="40" fill="var(--border)" />
                <text x="190" y="145" text-anchor="end" class="bar-label">Gemini CLI (Logic)</text>
                <text x="660" y="145" class="bar-val">75.2%</text>
            </g>

            <!-- System Migration -->
            <g>
                <rect x="200" y="200" width="460" height="40" fill="var(--border)" opacity="0.6" />
                <text x="190" y="225" text-anchor="end" class="bar-label">Claude Code (Scale)</text>
                <text x="670" y="225" class="bar-val">76.8%</text>
            </g>
            <g>
                <rect x="200" y="250" width="483" height="40" fill="var(--accent)" />
                <text x="190" y="275" text-anchor="end" class="bar-label">Gemini CLI (Scale)</text>
                <text x="693" y="275" class="bar-val">80.6%</text>
            </g>
            
            <!-- Y-Axis -->
            <line x1="200" y1="50" x2="200" y2="350" class="axis" />
        </svg>
    </div>
</body>
</html>
