<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hertzum Trust Model</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #0e0e0e;
            --text-dim: #888888;
            --accent: #d44000;
            --border: #e0e0dc;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111111;
                --text: #f0f0f0;
                --text-dim: #6a6a6a;
                --accent: #ff5f1f;
                --border: #1e1e1e;
            }
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .chart-container {
            width: 90%;
            height: 80%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .axis { stroke: var(--text); stroke-width: 3.0; }
        .grid { stroke: var(--border); stroke-width: 2.5; stroke-dasharray: 4; }
        .axis-title { font-family: var(--mono); font-size: 20px; fill: var(--text); font-weight: 500; text-transform: uppercase; }
        
        .curve { fill: none; stroke: var(--accent); stroke-width: 4.5; stroke-dasharray: 8 4; opacity: 0.6; }
        .point { fill: var(--accent); stroke: var(--bg); stroke-width: 3.5; }
        .point-label { font-family: var(--mono); font-size: 18px; fill: var(--text); font-weight: 600; }
        .point-desc { font-family: var(--sans); font-size: 17px; fill: var(--text-dim); }
        
        .legend {
            margin-top: 40px;
            font-family: var(--mono);
            font-size: 17px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <svg viewBox="0 0 800 400" preserveAspectRatio="xMidYMid meet">
            <!-- Grid Lines -->
            <line x1="0" y1="100" x2="800" y2="100" class="grid" />
            <line x1="0" y1="200" x2="800" y2="200" class="grid" />
            <line x1="0" y1="300" x2="800" y2="300" class="grid" />
            
            <!-- Axes -->
            <line x1="0" y1="400" x2="800" y2="400" class="axis" /> <!-- X -->
            <line x1="0" y1="0" x2="0" y2="400" class="axis" />   <!-- Y -->
            
            <!-- Axis Titles -->
            <text x="400" y="450" text-anchor="middle" class="axis-title">Ease of Access (Effort →)</text>
            <text x="-250" y="-50" text-anchor="middle" class="axis-title" transform="rotate(-90)">Trust (Verify-ability →)</text>
            
            <!-- Trend Line (Trust follows proximity to source) -->
            <path d="M 50 50 L 750 380" class="curve" />
            
            <!-- Data Points -->
            <!-- Source Code -->
            <g>
                <circle cx="50" cy="50" r="6" class="point" />
                <text x="65" y="45" class="point-label">Source Code</text>
                <text x="65" y="62" class="point-desc">Highest trust, high effort to parse</text>
            </g>
            
            <!-- API Reference -->
            <g>
                <circle cx="200" cy="150" r="6" class="point" />
                <text x="215" y="145" class="point-label">API Reference</text>
                <text x="215" y="162" class="point-desc">The formal contract</text>
            </g>
            
            <!-- Technical Tutorial -->
            <g>
                <circle cx="500" cy="300" r="6" class="point" />
                <text x="515" y="295" class="point-label">Technical Tutorial</text>
                <text x="515" y="312" class="point-desc">Proven through working builds</text>
            </g>
            
            <!-- Marketing Blog -->
            <g>
                <circle cx="750" cy="380" r="6" class="point" />
                <text x="750" y="365" text-anchor="end" class="point-label">Marketing Blog</text>
                <text x="750" y="350" text-anchor="end" class="point-desc">Lowest trust, high perceived bias</text>
            </g>
        </svg>
    </div>
    <div class="legend">// HERTZUM MODEL: ENGINEERS PRIORITIZE VERIFY-ABILITY OVER EASE OF USE</div>
</body>
</html>
