<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Architecture | Ninad Pathak</title>
  <link rel="stylesheet" href="/static/css/visuals-base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .mcp-grid { flex: 1; display: flex; align-items: center; justify-content: center; gap: 30px; margin-top: 20px; }
    
    .box { border: 1px solid var(--border); padding: 24px; text-align: center; width: 160px; background: var(--bg); transition: all var(--t); position: relative; }
    .box.active { border-color: var(--accent); color: var(--accent); font-weight: 600; box-shadow: 0 0 20px rgba(212, 64, 0, 0.1); transform: scale(1.05); }
    
    .box-label { font-family: var(--mono); font-size: 9px; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.1em; font-weight: 600; }
    .box-title { font-size: 13px; font-weight: 700; line-height: 1.3; }
    
    .arrow-container { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .arrow { font-size: 20px; color: var(--border); transition: color 0.3s; }
    .arrow.active { color: var(--accent); }
    
    .protocol-tag { border: 1px dashed var(--accent); padding: 6px 12px; font-family: var(--mono); font-size: 10px; color: var(--accent); background: rgba(212, 64, 0, 0.02); font-weight: 600; }

    @media (max-width: 600px) {
      .mcp-grid { flex-direction: column; gap: 20px; }
      .box { width: 100%; max-width: 300px; }
      .arrow { transform: rotate(90deg); }
    }
  </style>
</head>
<body>
  <div class="viz-container">
    <div class="header-meta">
      <div>
        <div class="label">// Integration_Pattern</div>
        <h1 class="title">Host-Client-Server Topology</h1>
      </div>
      <div class="label" style="color: var(--text-dim);">Standardized_Interface</div>
    </div>

    <div class="mcp-grid">
      <div class="box active">
        <div class="box-label">Agent_Host</div>
        <div class="box-title">Claude Desktop / IDE</div>
      </div>
      <div class="arrow-container">
        <div class="arrow">↔</div>
        <div class="protocol-tag">MCP_RPC</div>
        <div class="arrow">↔</div>
      </div>
      <div class="box">
        <div class="box-label">Data_Server</div>
        <div class="box-title">SaaS / Local_DB / Filesystem</div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot"></div> PROTOCOL: ACTIVE</div>
      <div class="status-item">VERSION: 1.0.0</div>
    </div>
  </div>
  <script>function sendHeight(){const h=document.documentElement.scrollHeight;window.parent.postMessage({type:"resize-iframe",height:h},"*")}window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);new ResizeObserver(sendHeight).observe(document.body);</script>
</body>
</html>
