<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thermal Throttling Impact</title>
    <style>
        :root {
            --bg-1: #ffffff; --bg-2: #efefed; --border: #e0e0dc;
            --text-1: #0e0e0e; --text-2: #3a3a3a; --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111; --bg-2: #1a1a1a; --border: #1e1e1e;
                --text-1: #f0f0f0; --text-2: #c2c2c2; --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }
        html, body { height: 100%; margin: 0; padding: 0; }
        body { background: var(--bg-1); font-family: var(--sans); color: var(--text-1); overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .container { width: 100%; height: 100%; padding: 1rem; box-sizing: border-box; display: flex; justify-content: center; align-items: center; }
        svg { width: 100%; height: auto; max-height: 100%; overflow: visible; }
        .label { font-family: var(--mono); font-size: 16px; fill: var(--text-2); font-weight: 600; text-transform: uppercase; }
        .val { font-family: var(--mono); font-size: 18px; fill: var(--accent); font-weight: 700; }
        .tick { font-family: var(--mono); font-size: 14px; fill: var(--text-3); }
        .title { font-family: var(--mono); font-size: 24px; fill: var(--text-1); font-weight: 700; text-transform: uppercase; }
        .axis { stroke: var(--text-1); stroke-width: 2; }
        .grid { stroke: var(--border); stroke-width: 1.5; stroke-dasharray: 4; }
    </style>
</head>
<body>
    <div class="container">
        <svg viewBox="0 0 1000 420" preserveAspectRatio="xMidYMid meet">
            <line x1="120" y1="60" x2="120" y2="340" class="axis" />
            <line x1="120" y1="340" x2="860" y2="340" class="axis" />
            <text x="110" y="80" text-anchor="end" class="tick">1700ms</text><line x1="120" y1="78" x2="860" y2="78" class="grid" />
            <text x="110" y="150" text-anchor="end" class="tick">1600ms</text><line x1="120" y1="148" x2="860" y2="148" class="grid" />
            <text x="110" y="220" text-anchor="end" class="tick">1500ms</text><line x1="120" y1="218" x2="860" y2="218" class="grid" />
            <text x="110" y="290" text-anchor="end" class="tick">1400ms</text><line x1="120" y1="288" x2="860" y2="288" class="grid" />
            <text x="200" y="365" text-anchor="middle" class="tick">Turn 1-10</text>
            <text x="380" y="365" text-anchor="middle" class="tick">Turn 20-30</text>
            <text x="560" y="365" text-anchor="middle" class="tick">Turn 40-50</text>
            <text x="740" y="365" text-anchor="middle" class="tick">Turn 60+</text>
            <text x="450" y="395" text-anchor="middle" class="label">Conversation Progress</text>
            <path d="M 200 295 L 380 246 L 560 196 L 740 146" fill="none" stroke="var(--accent)" stroke-width="3" />
            <circle cx="200" cy="295" r="5" fill="var(--accent)" /><text x="200" y="282" text-anchor="middle" class="val">1415ms</text>
            <circle cx="380" cy="246" r="5" fill="var(--accent)" /><text x="380" y="233" text-anchor="middle" class="val">1480ms</text>
            <circle cx="560" cy="196" r="5" fill="var(--accent)" /><text x="560" y="183" text-anchor="middle" class="val">1540ms</text>
            <circle cx="740" cy="146" r="5" fill="var(--accent)" /><text x="740" y="133" text-anchor="middle" class="val">1610ms</text>
            <text x="30" y="200" text-anchor="middle" class="label" transform="rotate(-90 30,200)">A2A Latency</text>
            <text x="450" y="30" text-anchor="middle" class="title">Thermal Throttling: Latency Over Time</text>
        </svg>
    </div>
</body>
</html>
