<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Single vs Multi-Agent Topology</title>
<style>
:root{--bg-1:#fff;--bg-2:#efefed;--border:#e0e0dc;--text-1:#0e0e0e;--text-2:#3a3a3a;--text-3:#888;--accent:#d44000;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;}
@media (prefers-color-scheme:dark){:root{--bg-1:#111;--bg-2:#1a1a1a;--border:#1e1e1e;--text-1:#f0f0f0;--text-2:#c2c2c2;--text-3:#6a6a6a;--accent:#ff5f1f;}}
body{margin:0;background:var(--bg-1);font-family:var(--sans);color:var(--text-1);overflow:hidden;}

.scene{width:100%;height:100vh;display:flex;align-items:center;justify-content:center;box-sizing:border-box;padding:14px;}
.cols{display:flex;gap:18px;width:100%;max-width:600px;align-items:stretch;}
.col{flex:1;border:1px solid var(--border);border-radius:5px;background:var(--bg-2);padding:14px 12px;box-sizing:border-box;display:flex;flex-direction:column;}
.col.multi{border-color:var(--accent);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 12%,transparent);}

.hdr{font-family:var(--mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-3);}
.col.multi .hdr{color:var(--accent);}

.topo{position:relative;height:120px;margin:12px 0 8px;}
.topo svg{position:absolute;inset:0;width:100%;height:100%;}
.edge{stroke:var(--text-3);stroke-width:1.5;fill:none;}
.box{
  position:absolute;transform:translate(-50%,-50%);
  border:1px solid var(--border);background:var(--bg-1);border-radius:4px;
  font-family:var(--mono);font-size:8px;letter-spacing:0.05em;
  padding:5px 7px;text-align:center;white-space:nowrap;color:var(--text-1);
}
.box.sup{border-color:var(--accent);color:var(--accent);font-weight:700;}
.box.work{font-size:7.5px;}

/* single layout */
.s-agent{left:50%;top:50%;border-color:var(--accent);color:var(--accent);font-weight:700;}

/* multi layout */
.m-sup{left:50%;top:18%;}
.m-w1{left:22%;top:80%;}
.m-w2{left:50%;top:80%;}
.m-w3{left:78%;top:80%;}

.readout{margin-top:auto;border-top:1px solid var(--border);padding-top:9px;}
.row{display:flex;justify-content:space-between;align-items:baseline;font-family:var(--mono);font-size:9px;margin:4px 0;}
.row .k{color:var(--text-3);letter-spacing:0.05em;text-transform:uppercase;font-size:7.5px;}
.row .v{font-weight:700;font-size:11px;color:var(--text-1);}
.row .v.up{color:var(--accent);}
.row .v.good{color:var(--text-2);}

.delta{font-size:7px;letter-spacing:0.1em;text-transform:uppercase;margin-left:5px;color:var(--text-3);}

@media (max-width:600px){
  .cols{flex-direction:column;gap:14px;}
  .topo{height:104px;}
}
</style>
</head>
<body>
<div class="scene">
  <div class="cols">

    <div class="col single">
      <div class="hdr">Single Agent</div>
      <div class="topo">
        <div class="box s-agent">AGENT</div>
      </div>
      <div class="readout">
        <div class="row"><span class="k">Reliability</span><span class="v good">90%</span></div>
        <div class="row"><span class="k">Failure surface</span><span class="v good">1 trace</span></div>
        <div class="row"><span class="k">Execution</span><span class="v good">serial</span></div>
        <div class="row"><span class="k">Debug</span><span class="v good">easy</span></div>
      </div>
    </div>

    <div class="col multi">
      <div class="hdr">Multi-Agent</div>
      <div class="topo">
        <svg viewBox="0 0 200 120" preserveAspectRatio="none">
          <path class="edge" d="M100 30 L44 84"></path>
          <path class="edge" d="M100 30 L100 84"></path>
          <path class="edge" d="M100 30 L156 84"></path>
        </svg>
        <div class="box sup m-sup">SUPERVISOR</div>
        <div class="box work m-w1">worker</div>
        <div class="box work m-w2">worker</div>
        <div class="box work m-w3">worker</div>
      </div>
      <div class="readout">
        <div class="row"><span class="k">Reliability (5&times;90%)</span><span class="v up">59%<span class="delta">&darr; product of all</span></span></div>
        <div class="row"><span class="k">Failure surface</span><span class="v up">+ message boundaries</span></div>
        <div class="row"><span class="k">Latency (parallel)</span><span class="v up">3&times; faster<span class="delta">if parallelizable</span></span></div>
        <div class="row"><span class="k">Debug</span><span class="v up">harder</span></div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
