<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contextual Compression Pipeline</title>
<style>
:root{--bg-1:#fff;--bg-2:#efefed;--border:#e0e0dc;--text-1:#0e0e0e;--text-2:#3a3a3a;--text-3:#888;--accent:#d44000;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;}
@media (prefers-color-scheme:dark){:root{--bg-1:#111;--bg-2:#1a1a1a;--border:#1e1e1e;--text-1:#f0f0f0;--text-2:#c2c2c2;--text-3:#6a6a6a;--accent:#ff5f1f;}}
body{margin:0;background:var(--bg-1);font-family:var(--sans);color:var(--text-1);overflow:hidden;}

.scene{width:100%;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;box-sizing:border-box;padding:20px 24px;gap:18px;}

.header{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--text-3);text-align:center;}

.pipeline{display:flex;align-items:center;gap:0;width:100%;max-width:640px;}

.stage{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;}

.box{width:100%;border:1px solid var(--border);padding:10px 8px;box-sizing:border-box;display:flex;flex-direction:column;gap:6px;transition:border-color .3s,background .3s;}
.box.lit{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 7%,transparent);}

.box-label{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-3);transition:color .3s;}
.box.lit .box-label{color:var(--accent);}

.token-bar{height:8px;background:var(--border);width:100%;overflow:hidden;}
.token-fill{height:100%;background:var(--text-3);width:0%;transition:width 0.6s ease,background 0.3s;}
.box.lit .token-fill{background:var(--accent);}

.token-count{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--text-2);transition:color .3s;}
.box.lit .token-count{color:var(--accent);}

.token-sub{font-family:var(--mono);font-size:8px;color:var(--text-3);letter-spacing:0.04em;}

.arrow-wrap{flex:0 0 auto;width:36px;display:flex;align-items:center;justify-content:center;padding-bottom:28px;}
.arrow-svg{width:28px;height:16px;}
.arrow-svg path{stroke:var(--border);transition:stroke .3s;}
.arrow-svg.lit path{stroke:var(--accent);}

.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px;}
.tag{font-family:var(--mono);font-size:7.5px;border:1px solid var(--border);padding:2px 5px;color:var(--text-3);letter-spacing:0.04em;text-transform:uppercase;transition:border-color .3s,color .3s;}
.box.lit .tag{border-color:var(--accent);color:var(--accent);}
.tag.dropped{text-decoration:line-through;opacity:0.45;}

.status{font-family:var(--mono);font-size:9.5px;color:var(--text-2);text-align:center;min-height:14px;letter-spacing:0.02em;}
.status b{color:var(--accent);}

@media (max-width:600px){
  .pipeline{flex-direction:column;gap:10px;}
  .arrow-wrap{width:auto;height:20px;padding:0;transform:rotate(90deg);}
}
</style>
</head>
<body>
<div class="scene">
  <div class="header">Contextual Compression Pipeline</div>

  <div class="pipeline">
    <!-- Stage 1: Full context -->
    <div class="stage">
      <div class="box" id="b0">
        <div class="box-label">Full context</div>
        <div class="token-bar"><div class="token-fill" id="f0" style="width:100%"></div></div>
        <div class="token-count" id="c0">8 400 tok</div>
        <div class="token-sub">before compression</div>
        <div class="tags">
          <span class="tag">session log</span>
          <span class="tag">file reads</span>
          <span class="tag" id="t-old1">stale refs</span>
          <span class="tag" id="t-old2">dupe facts</span>
          <span class="tag">decisions</span>
          <span class="tag">errors</span>
        </div>
      </div>
    </div>

    <div class="arrow-wrap">
      <svg class="arrow-svg" id="a0" viewBox="0 0 28 16" fill="none">
        <path d="M2 8 H22 M16 3 L23 8 L16 13" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Stage 2: Compression pass -->
    <div class="stage">
      <div class="box" id="b1">
        <div class="box-label">Compression pass</div>
        <div class="token-bar"><div class="token-fill" id="f1" style="width:0%"></div></div>
        <div class="token-count" id="c1">--</div>
        <div class="token-sub">scoring + eviction</div>
        <div class="tags">
          <span class="tag">recency score</span>
          <span class="tag">access freq</span>
          <span class="tag">importance</span>
        </div>
      </div>
    </div>

    <div class="arrow-wrap">
      <svg class="arrow-svg" id="a1" viewBox="0 0 28 16" fill="none">
        <path d="M2 8 H22 M16 3 L23 8 L16 13" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Stage 3: Compressed context -->
    <div class="stage">
      <div class="box" id="b2">
        <div class="box-label">Compressed context</div>
        <div class="token-bar"><div class="token-fill" id="f2" style="width:0%"></div></div>
        <div class="token-count" id="c2">--</div>
        <div class="token-sub">after compression</div>
        <div class="tags">
          <span class="tag" id="t-kept1">session log</span>
          <span class="tag" id="t-kept2">decisions</span>
          <span class="tag" id="t-kept3">errors</span>
        </div>
      </div>
    </div>
  </div>

  <div class="status" id="status">&nbsp;</div>
</div>

<script>
var b=[0,1,2].map(function(i){return document.getElementById('b'+i);});
var f=[0,1,2].map(function(i){return document.getElementById('f'+i);});
var c=[0,1,2].map(function(i){return document.getElementById('c'+i);});
var a=[0,1].map(function(i){return document.getElementById('a'+i);});
var status=document.getElementById('status');
var tOld1=document.getElementById('t-old1');
var tOld2=document.getElementById('t-old2');

var step=0;
function clear(){
  b.forEach(function(x){x.classList.remove('lit');});
  a.forEach(function(x){x.classList.remove('lit');});
  f[1].style.width='0%';f[2].style.width='0%';
  c[1].textContent='--';c[2].textContent='--';
  tOld1.classList.remove('dropped');tOld2.classList.remove('dropped');
  status.innerHTML='&nbsp;';
}
var steps=[
  function(){b[0].classList.add('lit');status.innerHTML='full context loaded: <b>8 400 tokens</b>';},
  function(){a[0].classList.add('lit');b[1].classList.add('lit');f[1].style.width='60%';c[1].textContent='scoring...';status.innerHTML='scoring by recency + access frequency';},
  function(){tOld1.classList.add('dropped');tOld2.classList.add('dropped');c[1].textContent='evicting';status.innerHTML='evicting stale refs and duplicate facts';},
  function(){a[1].classList.add('lit');b[2].classList.add('lit');f[2].style.width='25%';c[2].textContent='2 100 tok';status.innerHTML='compressed to <b>2 100 tokens</b> -- 75% reduction';}
];
function tick(){
  if(step===0)clear();
  steps[step]();
  step++;
  if(step>steps.length){step=0;}
}
tick();
setInterval(tick,1600);
</script>
</body>
</html>
