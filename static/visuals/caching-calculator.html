<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caching ROI | Ninad Pathak</title>
  <link rel="stylesheet" href="/static/css/visuals-base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .calc { flex: 1; width: 100%; max-width: 500px; margin: 20px auto 0; border: 1px solid var(--border); padding: 40px; display: flex; flex-direction: column; gap: 30px; background: var(--bg); box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
    
    .row { display: flex; flex-direction: column; gap: 12px; }
    .slider-label { font-family: var(--mono); font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    
    input { width: 100%; accent-color: var(--accent); height: 4px; background: var(--border); appearance: none; border-radius: 2px; cursor: pointer; }
    input::-webkit-slider-thumb { appearance: none; width: 16px; height: 16px; background: var(--accent); border-radius: 50%; cursor: pointer; }
    
    .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px; }
    .res-box { border: 1px solid var(--border); padding: 20px; text-align: center; }
    .val { font-family: var(--mono); font-size: 28px; font-weight: 700; color: var(--accent); margin-bottom: 6px; letter-spacing: -0.05em; }
    .v-label { font-family: var(--mono); font-size: 9px; color: var(--text-dim); text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="viz-container">
    <div class="header-meta">
      <div>
        <div class="label">// Calculator</div>
        <h1 class="title">Prompt Caching ROI</h1>
      </div>
      <div class="label" style="color: var(--text-dim);">Cost_Optimization</div>
    </div>

    <div class="calc">
      <div class="row">
        <div class="slider-label">Cache Hit Rate: <span id="hit-val" style="color: var(--accent);">50%</span></div>
        <input type="range" id="hit" min="0" max="100" value="50">
      </div>
      
      <div class="res-grid">
        <div class="res-box">
          <div class="val" id="cost-save">$0</div>
          <div class="v-label">Monthly Savings</div>
        </div>
        <div class="res-box">
          <div class="val" id="speed-up">1.0x</div>
          <div class="v-label">Latency Speedup</div>
        </div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot"></div> BASE_COST: $3/1M</div>
      <div class="status-item">DISCOUNT: 90% (ANTHROPIC)</div>
    </div>
  </div>

  <script>
    const hit = document.getElementById('hit');
    const hitVal = document.getElementById('hit-val');
    const costSave = document.getElementById('cost-save');
    const speedUp = document.getElementById('speed-up');

    function update() {
      const h = hit.value / 100;
      hitVal.innerText = hit.value + '%';
      
      const monthlyVol = 15000; 
      const savings = monthlyVol * 0.05 * h * 0.9;
      costSave.innerText = '$' + Math.round(savings).toLocaleString();
      
      const speed = 1 + (h * 1.5);
      speedUp.innerText = speed.toFixed(1) + 'x';
    }

    hit.oninput = update;
    update();
  </script>
<script>function sendHeight(){const h=document.documentElement.scrollHeight;window.parent.postMessage({type:"resize-iframe",height:h},"*")}window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);new ResizeObserver(sendHeight).observe(document.body);</script></body>
</html>
