<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dimensionality Reduction | Ninad Pathak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090909;
      --accent: #ff5f1f;
      --border: #1e1e1e;
      --text: #f0f0f0;
      --mono: 'JetBrains Mono', monospace;
    }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--mono); overflow: hidden; padding: 40px; box-sizing: border-box; }
    .stage { display: flex; align-items: center; justify-content: center; height: 300px; gap: 60px; }
    .box-3d { width: 100px; height: 100px; border: 1px solid #444; position: relative; transform-style: preserve-3d; animation: rotate 5s linear infinite; }
    .box-3d::after { content: '1536D'; position: absolute; top: -20px; font-size: 10px; color: var(--accent); }
    .face { position: absolute; width: 100%; height: 100%; border: 1px solid var(--accent); opacity: 0.3; }
    
    .arrow { font-size: 24px; color: #333; }
    
    .plane-2d { width: 100px; height: 100px; border: 1px solid var(--accent); position: relative; }
    .plane-2d::after { content: '3D/2D'; position: absolute; top: -20px; font-size: 10px; color: var(--accent); }
    .dot { width: 4px; height: 4px; background: var(--accent); position: absolute; border-radius: 50%; }

    @keyframes rotate { from { transform: rotateX(0) rotateY(0); } to { transform: rotateX(360deg) rotateY(360deg); } }
  </style>
</head>
<body>
  <div class="stage">
    <div class="box-3d">
      <div class="face" style="transform: translateZ(50px)"></div>
      <div class="face" style="transform: rotateY(90deg) translateZ(50px)"></div>
      <div class="face" style="transform: rotateY(180deg) translateZ(50px)"></div>
      <div class="face" style="transform: rotateY(-90deg) translateZ(50px)"></div>
      <div class="face" style="transform: rotateX(90deg) translateZ(50px)"></div>
      <div class="face" style="transform: rotateX(-90deg) translateZ(50px)"></div>
    </div>
    
    <div class="arrow">→</div>
    
    <div class="plane-2d" id="plane"></div>
  </div>

  <script>
    const plane = document.getElementById('plane');
    for(let i=0; i<30; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.style.left = Math.random() * 96 + 'px';
      dot.style.top = Math.random() * 96 + 'px';
      plane.appendChild(dot);
    }
  </script>
</body>
</html>
