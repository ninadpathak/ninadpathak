<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Context Management | Ninad Pathak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f8f6;
      --accent: #d44000;
      --border: #e0e0dc;
      --text: #0e0e0e;
      --mono: 'JetBrains Mono', monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #090909;
        --accent: #ff5f1f;
        --border: #1e1e1e;
        --text: #f0f0f0;
      }
    }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--mono); overflow: hidden; padding: 40px; box-sizing: border-box; }
    
    .gauge-wrap { display: flex; flex-direction: column; align-items: center; gap: 40px; }
    .bar-container { width: 100%; max-width: 600px; height: 40px; background: var(--bg); border: 1px solid var(--border); position: relative; display: flex; }
    .bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.5s; }
    .limit-marker { position: absolute; right: 10%; top: -5px; bottom: -5px; width: 2px; background: #ff3b30; z-index: 5; }
    .limit-label { position: absolute; right: 10%; top: -25px; font-size: 10px; color: #ff3b30; font-weight: 600; }

    .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .btn { padding: 8px 16px; border: 1px solid var(--border); color: #888; font-size: 11px; cursor: pointer; text-transform: uppercase; }
    .btn.active { border-color: var(--accent); color: var(--accent); font-weight: 600; }
    
    .explanation { font-size: 12px; color: #888; line-height: 1.6; text-align: center; max-width: 500px; }
  </style>
</head>
<body>
  <div style="margin-bottom: 40px; text-align: center;">
    <div style="font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px;">// Resource Management</div>
    <div style="font-size: 16px; font-weight: 600;">Context window pressure management</div>
  </div>

  <div class="gauge-wrap">
    <div class="bar-container">
      <div class="limit-marker"></div>
      <div class="limit-label">CRITICAL (90%)</div>
      <div class="bar-fill" id="fill"></div>
    </div>

    <div class="controls" id="btns">
      <button class="btn" data-val="95" data-text="Context full. Logic likely to fail as oldest turns are lost.">Truncation</button>
      <button class="btn" data-val="40" data-text="Compression step reduces volume while preserving signal.">Summarization</button>
      <button class="btn" data-val="25" data-text="Storing history externally keeps working window empty.">External Memory</button>
      <button class="btn" data-val="15" data-text="Splitting tasks keeps total token count low per call.">Task Decomposition</button>
    </div>

    <div class="explanation" id="exp">Select a strategy to see its impact on the context window.</div>
  </div>

  <script>
    const fill = document.getElementById('fill');
    const exp = document.getElementById('exp');
    
    document.querySelectorAll('.btn').forEach(b => {
      b.onclick = () => {
        document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        fill.style.width = b.dataset.val + '%';
        exp.innerText = b.dataset.text;
      };
    });
  </script>
</body>
</html>
