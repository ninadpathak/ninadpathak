<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LinkedIn Banner | Ninad Pathak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e0e;
      --text: #f0f0f0;
      --accent: #ff5f1f;
      --border: #1e1e1e;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      width: 1584px; /* standard linkedin banner width */
      height: 396px;  /* standard linkedin banner height */
      overflow: hidden;
      font-family: var(--sans);
      color: var(--text);
      display: flex;
      border: 1px solid var(--border);
    }

    /* 1/10th spacer for profile picture */
    .pp-spacer {
      width: 15.84%; /* slightly more than 1/10 to be safe */
      height: 100%;
      border-right: 1px solid var(--border);
      position: relative;
    }
    .pp-spacer::after {
      content: '// PFP_ZONE';
      position: absolute;
      bottom: 20px;
      left: 20px;
      font-family: var(--mono);
      font-size: 10px;
      color: #333;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 60px;
      position: relative;
    }

    .grid-bg {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.3;
      pointer-events: none;
    }

    .top-meta {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 20px;
      z-index: 10;
    }

    .headline {
      font-size: 42px;
      font-weight: 700;
      max-width: 800px;
      line-height: 1.1;
      margin-bottom: 40px;
      z-index: 10;
    }
    .headline span { color: var(--accent); }

    .client-strip {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 40px;
      z-index: 10;
    }

    .client-label {
      font-family: var(--mono);
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-right: 1px solid var(--border);
      padding-right: 20px;
    }

    .logos {
      display: flex;
      gap: 40px;
      align-items: center;
    }

    .logo {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 600;
      color: #888;
      letter-spacing: -0.02em;
    }
    .logo span { color: var(--accent); opacity: 0.5; }

    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 60px;
      font-family: var(--mono);
      font-size: 10px;
      color: #444;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="pp-spacer"></div>
  
  <div class="main-content">
    <div class="grid-bg"></div>
    
    <div class="top-meta">// TECHNICAL_CONTENT_STRATEGY</div>
    
    <h1 class="headline">
      Precision-engineered narratives for <span>DevTools</span> and B2B SaaS.
    </h1>

    <div class="client-strip">
      <div class="client-label">Trusted by</div>
      <div class="logos">
        <div class="logo">CENTUS<span>_</span></div>
        <div class="logo">DELIGHT<span>CHAT</span></div>
        <div class="logo">KIWI<span>SIZING</span></div>
        <div class="logo">LINUX<span>4</span>DEVICES</div>
      </div>
    </div>

    <div class="bottom-bar">
      <div>BUILD_VER: 2026.03.15</div>
      <div>LOC: 12.9716° N, 77.5946° E</div>
      <div>STATUS: AVAILABLE_FOR_PROJECTS</div>
    </div>
  </div>
</body>
</html>
