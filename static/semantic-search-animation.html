<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Semantic Search | Ninad Pathak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090909;
      --accent: #ff5f1f;
      --border: #1e1e1e;
      --text: #f0f0f0;
      --mono: 'JetBrains Mono', monospace;
    }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--mono); overflow: hidden; padding: 40px; box-sizing: border-box; }
    .search-stage { display: flex; flex-direction: column; align-items: center; gap: 40px; height: 100%; }
    .input-box { border: 1px solid var(--border); padding: 10px 20px; font-size: 14px; color: var(--accent); }
    .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; width: 100%; max-width: 600px; }
    .item { aspect-ratio: 1; border: 1px solid var(--border); transition: all 0.5s; display: flex; align-items: center; justify-content: center; font-size: 8px; color: #333; }
    .match { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px var(--accent); transform: scale(1.1); }
  </style>
</head>
<body>
  <div class="search-stage">
    <div class="input-box" id="input">Query: "Financial results"</div>
    <div class="grid" id="grid"></div>
  </div>

  <script>
    const grid = document.getElementById('grid');
    const queries = ["Financial results", "Python coding", "Nature hiking", "Modern art"];
    const keywords = ["Revenue", "Profit", "Shares", "Earnings", "Tax", "Deficit", "Budget", "Stocks"];
    
    for(let i=0; i<50; i++) {
      const item = document.createElement('div');
      item.className = 'item';
      item.innerText = 'DOC';
      grid.appendChild(item);
    }

    const items = grid.querySelectorAll('.item');
    let qIdx = 0;

    function next() {
      items.forEach(i => i.classList.remove('match'));
      document.getElementById('input').innerText = `Query: "${queries[qIdx]}"`;
      
      const count = 3 + Math.floor(Math.random() * 5);
      for(let i=0; i<count; i++) {
        const idx = Math.floor(Math.random() * 50);
        items[idx].classList.add('match');
      }
      
      qIdx = (qIdx + 1) % queries.length;
      setTimeout(next, 3000);
    }
    
    next();
  </script>
</body>
</html>
