<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Agent Checkpointing | Ninad Pathak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f8f6;
      --accent: #d44000;
      --border: #e0e0dc;
      --text: #0e0e0e;
      --mono: 'JetBrains Mono', monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #090909;
        --accent: #ff5f1f;
        --border: #1e1e1e;
        --text: #f0f0f0;
      }
    }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--mono); overflow: hidden; padding: 40px; box-sizing: border-box; }
    
    .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; height: 300px; }
    .lane { border: 1px solid var(--border); padding: 20px; position: relative; }
    .lane-title { font-size: 11px; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; letter-spacing: 0.1em; }
    
    .steps-list { display: flex; flex-direction: column; gap: 10px; }
    .step-item { height: 30px; border: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; font-size: 11px; background: var(--bg); transition: all 0.3s; }
    .step-item.done { border-color: var(--accent); background: var(--accent); color: #fff; }
    .step-item.fail { border-color: #ff3b30; color: #ff3b30; background: rgba(255, 59, 48, 0.1); }
    
    .fail-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255, 59, 48, 0.1); display: none; align-items: center; justify-content: center; font-weight: 600; color: #ff3b30; font-size: 14px; z-index: 10; }
    
    .btn { margin-top: 30px; padding: 10px 20px; border: 1px solid var(--accent); color: var(--accent); cursor: pointer; font-size: 12px; }
    .btn:hover { background: var(--accent); color: #fff; }
  </style>
</head>
<body>
  <div style="margin-bottom: 30px;">
    <div style="font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px;">// Reliability</div>
    <div style="font-size: 16px; font-weight: 600;">Work lost on execution failure</div>
  </div>

  <div class="compare-grid">
    <div class="lane" id="no-checkpoint">
      <div class="lane-title">Without Checkpointing</div>
      <div class="steps-list" id="list-1"></div>
      <div class="fail-overlay" id="overlay-1">RESTARTING FROM STEP 1</div>
    </div>
    <div class="lane" id="with-checkpoint">
      <div class="lane-title">With Checkpointing</div>
      <div class="steps-list" id="list-2"></div>
      <div class="fail-overlay" id="overlay-2">RESUMING FROM STEP 18</div>
    </div>
  </div>

  <button class="btn" onclick="startSim()">Run Simulation</button>

  <script>
    function createSteps(id) {
      const list = document.getElementById(id);
      list.innerHTML = '';
      for(let i=1; i<=25; i++) {
        const item = document.createElement('div');
        item.className = 'step-item';
        item.innerText = `Step ${i}`;
        list.appendChild(item);
      }
    }

    createSteps('list-1');
    createSteps('list-2');

    async function startSim() {
      createSteps('list-1');
      createSteps('list-2');
      const items1 = document.getElementById('list-1').children;
      const items2 = document.getElementById('list-2').children;
      const overlay1 = document.getElementById('overlay-1');
      const overlay2 = document.getElementById('overlay-2');
      overlay1.style.display = 'none';
      overlay2.style.display = 'none';

      for(let i=0; i<18; i++) {
        items1[i].classList.add('done');
        items2[i].classList.add('done');
        await new Promise(r => setTimeout(r, 50));
      }

      items1[18].classList.add('fail');
      items2[18].classList.add('fail');
      
      await new Promise(r => setTimeout(r, 500));
      
      overlay1.style.display = 'flex';
      overlay2.style.display = 'flex';
      
      await new Promise(r => setTimeout(r, 1500));
      
      overlay1.style.display = 'none';
      overlay2.style.display = 'none';
      
      // Reset lane 1
      for(let i=0; i<19; i++) items1[i].classList.remove('done', 'fail');
      // Lane 2 stays at 18
      items2[18].classList.remove('fail');
    }
  </script>
</body>
</html>
