<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Provider Comparison | Ninad Pathak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090909;
      --accent: #ff5f1f;
      --border: #1e1e1e;
      --text: #f0f0f0;
      --mono: 'JetBrains Mono', monospace;
    }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--mono); overflow: hidden; padding: 40px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; height: 100vh; }
    canvas { background: transparent; }
    .ui { position: absolute; left: 40px; top: 40px; display: flex; flex-direction: column; gap: 10px; }
    .btn { background: #1a1a1a; border: 1px solid var(--border); color: #666; padding: 10px 20px; font-size: 11px; text-transform: uppercase; cursor: pointer; }
    .btn.active { color: var(--accent); border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="ui" id="btns"></div>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const btns = document.getElementById('btns');
    
    const providers = {
      'OpenAI': [0.9, 0.7, 0.6, 0.8, 0.9],
      'Cohere': [0.85, 0.9, 0.8, 0.7, 0.85],
      'Voyage': [0.95, 0.6, 0.7, 0.75, 0.8],
      'Jina': [0.8, 0.65, 0.95, 0.6, 0.7],
      'BGE (local)': [0.75, 0.95, 0.4, 0.9, 0.6]
    };

    const metrics = ['Accuracy', 'Latency', 'Context', 'Cost', 'Multilingual'];
    let current = 'OpenAI';

    Object.keys(providers).forEach(p => {
      const b = document.createElement('button');
      b.className = 'btn' + (p === current ? ' active' : '');
      b.innerText = p;
      b.onclick = () => {
        document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        current = p;
      };
      btns.appendChild(b);
    });

    function draw() {
      const size = 400;
      canvas.width = size * window.devicePixelRatio;
      canvas.height = size * window.devicePixelRatio;
      canvas.style.width = size + 'px';
      canvas.style.height = size + 'px';
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
      
      const cx = size / 2;
      const cy = size / 2;
      const radius = size * 0.35;

      ctx.clearRect(0, 0, size, size);

      // Web
      ctx.strokeStyle = '#222';
      for(let i=1; i<=5; i++) {
        const r = radius * (i/5);
        ctx.beginPath();
        for(let j=0; j<5; j++) {
          const a = (j/5) * Math.PI * 2 - Math.PI/2;
          ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
        }
        ctx.closePath();
        ctx.stroke();
      }

      // Axis lines & labels
      ctx.textAlign = 'center';
      ctx.font = '10px "JetBrains Mono"';
      for(let i=0; i<5; i++) {
        const a = (i/5) * Math.PI * 2 - Math.PI/2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + radius * Math.cos(a), cy + radius * Math.sin(a));
        ctx.stroke();
        
        ctx.fillStyle = '#555';
        ctx.fillText(metrics[i], cx + (radius + 25) * Math.cos(a), cy + (radius + 25) * Math.sin(a));
      }

      // Shape
      const vals = providers[current];
      ctx.fillStyle = 'rgba(255, 95, 31, 0.2)';
      ctx.strokeStyle = '#ff5f1f';
      ctx.lineWidth = 2;
      ctx.beginPath();
      vals.forEach((v, i) => {
        const a = (i/5) * Math.PI * 2 - Math.PI/2;
        ctx.lineTo(cx + radius * v * Math.cos(a), cy + radius * v * Math.sin(a));
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      requestAnimationFrame(draw);
    }
    
    draw();
  </script>
</body>
</html>
