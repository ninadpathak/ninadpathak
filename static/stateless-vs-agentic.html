<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stateless vs Agentic | Ninad Pathak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f8f6;
      --accent: #d44000;
      --border: #e0e0dc;
      --text: #0e0e0e;
      --mono: 'JetBrains Mono', monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #090909;
        --accent: #ff5f1f;
        --border: #1e1e1e;
        --text: #f0f0f0;
      }
    }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--mono); overflow: hidden; padding: 40px; box-sizing: border-box; }
    
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; height: 300px; }
    .side { border: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .label { font-size: 10px; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; }
    
    .box { border: 1px solid var(--border); padding: 15px; margin: 5px; font-size: 12px; width: 80%; background: var(--bg); }
    .arrow { font-size: 20px; color: var(--border); margin: 5px 0; }
    .active-box { border-color: var(--accent); color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>
  <div style="margin-bottom: 40px; text-align: center;">
    <div style="font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px;">// Workflow Patterns</div>
    <div style="font-size: 16px; font-weight: 600;">Stateless API Call vs Statefull Agent Harness</div>
  </div>

  <div class="split">
    <div class="side">
      <div class="label">Standard API</div>
      <div class="box">Prompt</div>
      <div class="arrow">↓</div>
      <div class="box active-box">LLM Generation</div>
      <div class="arrow">↓</div>
      <div class="box">Result</div>
    </div>
    <div class="side">
      <div class="label">Agent Harness</div>
      <div class="box">Prompt + History</div>
      <div class="arrow">↓</div>
      <div class="box active-box">LLM Reasoning Step</div>
      <div class="arrow">↓</div>
      <div class="box" style="border-style: dashed;">Tool Request → Result</div>
      <div class="arrow">↑</div>
      <div class="box">State Persistence</div>
    </div>
  </div>
</body>
</html>
