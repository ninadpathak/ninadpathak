faqs:
  - q: "What makes technical writing good for a developer audience?"
    a: "Accuracy first, then a clear path to a working result. Engineers trust writing that shows real commands, real output, and the parts that usually go wrong. Marketing language and vague benefits make them leave."
  - q: "Why do DevTools companies lose deals over bad docs?"
    a: "Developers evaluate tools by reading the docs before they ever talk to sales. If the docs are thin or wrong, the evaluation stalls and the deal dies quietly. The lose-deals post breaks down where this happens."
  - q: "How is writing for AI products different?"
    a: "AI product docs have to cover prompts, schemas, evals, and version boundaries that change fast. The new-rules post covers the structure I would use to keep them accurate as the product moves."
  - q: "Should technical docs be short or thorough?"
    a: "As short as possible while still getting the reader to a working result. Length for its own sake hides the important parts. The shorter-docs post makes the case with examples."

