title: "Technical Writing for DevTools: Content Engineers Actually Trust"
h1: "Technical Writing for DevTools"
description: "How to write documentation, tutorials, and developer content that engineers respect and buyers act on. The craft, the business case, and what separates practitioner writing from marketing."
intro: |
  Developers can smell marketing in one sentence and they close the tab. Content that
  earns their trust reads like it was written by someone who has shipped the thing,
  because it was. That is the whole game for DevTools content.

  I came to writing from engineering, so the posts here treat docs as a product surface,
  not a chore. They cover the craft of writing for engineers, the business case that ties
  docs to revenue, and the patterns behind the teams who do it well.

