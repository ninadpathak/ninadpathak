faqs:
  - q: "What is the difference between an agent's memory and its context window?"
    a: "A context window is the text an agent can read in a single call. Memory is the system that decides what to put in that window, what to store outside it, and how to bring the right facts back later. A large window helps, but on its own it forgets everything between sessions and pays full price to re-read history every turn."
  - q: "Is RAG enough for agent memory?"
    a: "No. RAG retrieves documents well, but agent memory also needs episodic recall of past actions, working state for the current task, and the ability to update facts over time. Document retrieval handles one slice of that. The memory-hierarchy posts cover where it stops being enough."
  - q: "Why do AI agents forget things between sessions?"
    a: "Agents usually hold state only in the context window, so a restart wipes it. Persistence requires serializing memory to storage and reloading it on the next session. The serialization and coding-agent posts walk through the patterns that survive a restart."
  - q: "What are the main types of AI agent memory?"
    a: "Working memory for the current task, episodic memory for past events and actions, and semantic memory for durable facts. Production agents need all three, and most memory bugs come from mixing them up."

