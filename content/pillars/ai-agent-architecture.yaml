faqs:
  - q: "What is an agent loop?"
    a: "An agent loop is the repeating cycle an agent runs: perceive the current state, decide the next step, act with a tool, and record the result. The loop continues until the task is complete or a stop condition fires. Almost all agent behavior is explained by how this loop is structured."
  - q: "When should I use multiple agents instead of one?"
    a: "Reach for multiple agents when the work splits into clearly separate roles that each need their own context and tools. The cost is coordination, latency, and new failure modes. For most tasks a single well-instrumented agent is simpler and more reliable."
  - q: "Why do AI agents fail in production?"
    a: "The common causes are brittle tool schemas, missing error handling, context that grows until it poisons reasoning, and no observability into what the agent did. The production-errors and why-agents-fail posts cover each pattern and the fixes."
  - q: "What is the Model Context Protocol (MCP)?"
    a: "MCP is a standard for connecting AI models to external tools and data sources through a common interface. It lets you wire the same tool into many agents without rewriting integrations each time."

