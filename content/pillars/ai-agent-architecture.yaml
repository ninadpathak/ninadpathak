title: "AI Agent Architecture: Patterns for Systems That Actually Ship"
h1: "AI Agent Architecture"
description: "The patterns, trade-offs, and failure modes behind production AI agents. From the agent loop and tool calls to multi-agent design and error handling."
intro: |
  An agent is a loop. It perceives, decides, acts, and remembers, then does it again
  until the work is done or it gives up. Everything hard about agents lives in how you
  wire that loop and what you do when a step fails.

  I have spent two years watching agents break in production and mapping the design
  space across real deployments. The posts here cover the anatomy of the loop, the
  choice between one agent and many, the harness that holds it together, and the errors
  nobody warns you about.

