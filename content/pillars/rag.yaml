title: "RAG and Retrieval: Building Pipelines That Return the Right Context"
h1: "RAG & Retrieval"
description: "A practitioner's guide to retrieval-augmented generation: embeddings, hybrid search, reranking, evaluation, and the optimizations that decide whether your RAG system works."
intro: |
  Retrieval-augmented generation is easy to demo and hard to ship. The demo works
  because the answer sits in the top result. Production breaks because the right chunk
  lands at rank 14, the embedding misses the intent, and nobody measured recall before
  launch.

  The posts below cover the retrieval stack end to end, from how embeddings encode
  meaning to reranking, hybrid search, caching, and the evaluation metrics that tell you
  whether any of it works.

