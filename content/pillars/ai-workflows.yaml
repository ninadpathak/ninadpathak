title: "AI Workflows and Automation: Getting Real Work Done with Coding Agents"
h1: "AI Workflows & Automation"
description: "How to wire AI agents and coding assistants into real work: choosing models, setting up coding agents, connecting tools with MCP, and automating the busywork without losing control."
intro: |
  The promise of AI at work is not a smarter chatbot. It is the boring stuff done for
  you, a refactor that spans forty files, a release note drafted from the diff, a
  research pass that reads twenty sources while you do something else.

  Getting there takes more than a good prompt. You need the right model for the job, an
  agent setup that holds context across a long task, tools wired in so the agent can act,
  and guardrails so it fails safely. The posts below are the practitioner's path into
  that setup.

  The work-faster thread is the newest on the site and it is still growing. Follow it for
  the workflows I run myself, and the playbooks I am writing next.

