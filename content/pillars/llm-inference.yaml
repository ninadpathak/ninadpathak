title: "LLM Inference, Cost, and Internals: The Engineering Behind Fast, Cheap Models"
h1: "LLM Inference & Cost"
description: "How LLMs actually run, and how to make them faster and cheaper. Context windows, token budgets, prompt caching, speculative decoding, TTFT, and KV-cache internals, all benchmarked."
intro: |
  Every LLM feature comes down to tokens moving through memory. Latency, cost, and
  quality are all downstream of how many tokens you send, how the model caches them, and
  how fast the first one comes back.

  I benchmark this on a MacBook Air M2 with real workloads and real pricing. The posts
  below explain the internals that drive your bill, then show the levers that cut it,
  from prompt caching to speculative decoding.

