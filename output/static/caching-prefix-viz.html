<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prefix Matching | Ninad Pathak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f8f6;
      --accent: #d44000;
      --border: #e0e0dc;
      --text: #0e0e0e;
      --mono: 'JetBrains Mono', monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #090909;
        --accent: #ff5f1f;
        --border: #1e1e1e;
        --text: #f0f0f0;
      }
    }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--mono); overflow: hidden; padding: 40px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    
    .stack { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 500px; }
    .block { border: 1px solid var(--border); padding: 15px; font-size: 12px; background: var(--bg); position: relative; }
    .block.cached { border-color: var(--accent); background: rgba(255, 95, 31, 0.05); }
    .cached::after { content: 'CACHED'; position: absolute; right: 10px; top: 10px; font-size: 8px; color: var(--accent); font-weight: 600; border: 1px solid var(--accent); padding: 2px 5px; }
    
    .status { margin-top: 30px; font-size: 11px; color: #888; }
  </style>
</head>
<body>
  <div style="margin-bottom: 40px; text-align: center;">
    <div style="font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px;">// KV Cache Reuse</div>
    <div style="font-size: 16px; font-weight: 600;">How Prefix Matching works</div>
  </div>

  <div class="stack">
    <div class="block cached">System Instructions (Fixed)</div>
    <div class="block cached">Knowledge Base / Documentation (Fixed)</div>
    <div class="block" id="user">User Query: "How do I install..."</div>
  </div>

  <div class="status">Only the unique user query requires new computation.</div>

  <script>
    const queries = ["How do I install...", "What is the pricing for...", "Can I use Python with..."];
    let idx = 0;
    setInterval(() => {
      document.getElementById('user').innerText = `User Query: "${queries[idx]}"`;
      idx = (idx + 1) % queries.length;
    }, 2500);
  </script>
</body>
</html>
