<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Animated MoE Topology | Ninad Pathak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #090909;
      --text-1: #f0f0f0;
      --text-3: #6a6a6a;
      --accent: #ff5f1f;
      --accent-dim: rgba(255, 95, 31, 0.1);
      --border: #1e1e1e;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      margin: 0;
      font-family: var(--sans);
      color: var(--text-1);
      overflow: hidden;
    }

    .canvas {
      width: 100%;
      height: 500px; /* Reduced for blog embed */
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .grid-bg {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .viz-stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 80px;
      position: relative;
    }

    /* Router Node */
    .router-node {
      width: 100px;
      height: 100px;
      border: 2px solid var(--accent);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 5;
      box-shadow: 0 0 30px var(--accent-dim);
      transition: all 0.2s ease;
    }
    .router-node::before {
      content: 'GATE_ROUTER';
      position: absolute;
      top: -25px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      font-weight: 600;
    }

    /* Expert Matrix */
    .expert-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 8px;
      width: 320px;
      z-index: 5;
    }
    .expert-cell {
      aspect-ratio: 1;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .expert-cell.active {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 15px var(--accent);
    }
    .expert-label {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 9px;
      color: var(--accent);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .expert-cell.active .expert-label { opacity: 1; }

    /* Tokens */
    .token {
      position: absolute;
      background: #fff;
      border-radius: 2px;
      z-index: 10;
      opacity: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .token-box { width: 14px; height: 14px; background: #fff; border-radius: 2px; }
    .token-text {
      font-family: var(--mono);
      font-size: 11px;
      color: #fff;
      white-space: nowrap;
      background: var(--accent);
      padding: 2px 6px;
      position: absolute;
      top: -25px;
    }

    @keyframes token-flow {
      0% { transform: translate(-150px, 0); opacity: 0; }
      10% { opacity: 1; }
      45% { transform: translate(0, 0); opacity: 1; }
      50% { transform: translate(0, 0); opacity: 1; scale: 1.1; }
      55% { transform: translate(0, 0); opacity: 1; scale: 1; }
      90% { opacity: 1; }
      100% { transform: translate(450px, 0); opacity: 0; }
    }

    .token-anim { animation: token-flow 4s linear infinite; }

    .svg-paths {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
    }
    .path-line {
      stroke: var(--accent);
      stroke-width: 1.5;
      fill: none;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .viz-footer {
      padding: 15px 40px;
      background: rgba(0,0,0,0.3);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      z-index: 10;
    }
    .stat-label { font-family: var(--mono); font-size: 11px; color: var(--text-3); text-transform: uppercase; }
    .stat-val { font-family: var(--mono); font-size: 14px; color: var(--text-1); font-weight: 600; }
    .stat-val span { color: var(--accent); }
  </style>
</head>
<body>

  <div class="canvas">
    <div class="grid-bg"></div>

    <svg class="svg-paths" id="svgPaths"></svg>

    <div class="viz-stage">
      <div id="tokenContainer"></div>

      <div class="router-node" id="routerNode">
        <div style="font-family: var(--mono); font-size: 11px; font-weight: 600;">ROUTER</div>
      </div>

      <div class="expert-grid" id="expertGrid"></div>
    </div>

    <div class="viz-footer">
      <div>
        <span class="stat-label">Model:</span>
        <span class="stat-val">DeepSeek-V3</span>
      </div>
      <div>
        <span class="stat-label">Active Params:</span>
        <span class="stat-val"><span>37B</span> / 671B</span>
      </div>
    </div>
  </div>

  <script>
    const grid = document.getElementById('expertGrid');
    const svg = document.getElementById('svgPaths');
    const router = document.getElementById('routerNode');
    const tokenContainer = document.getElementById('tokenContainer');
    
    const SCENARIOS = [
      { prompt: "Solve: 2+2", experts: ["Math Expert", "Logic Expert"] },
      { prompt: "Write Python", experts: ["Coding Expert", "Syntax Expert"] },
      { prompt: "Bonjour!", experts: ["French Expert", "Translation Expert"] },
      { prompt: "Explain MoE", experts: ["NLP Expert", "Arch Expert"] }
    ];

    for(let i=0; i<32; i++) {
      const cell = document.createElement('div');
      cell.className = 'expert-cell';
      cell.id = `expert-${i}`;
      cell.innerHTML = `<span class="expert-label" id="label-${i}"></span>`;
      grid.appendChild(cell);
    }

    function updatePaths() {
      svg.innerHTML = '';
      const rRect = router.getBoundingClientRect();
      const canvasRect = document.querySelector('.canvas').getBoundingClientRect();
      const x1 = (rRect.left + rRect.width) - canvasRect.left;
      const y1 = (rRect.top + rRect.height/2) - canvasRect.top;

      for(let i=0; i<32; i++) {
        const eCell = document.getElementById(`expert-${i}`);
        const eRect = eCell.getBoundingClientRect();
        const x2 = eRect.left - canvasRect.left;
        const y2 = (eRect.top + eRect.height/2) - canvasRect.top;

        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", x1); line.setAttribute("y1", y1);
        line.setAttribute("x2", x2); line.setAttribute("y2", y2);
        line.setAttribute("class", "path-line");
        line.id = `path-${i}`;
        svg.appendChild(line);
      }
    }

    function spawnToken() {
      const scenario = SCENARIOS[Math.floor(Math.random() * SCENARIOS.length)];
      const token = document.createElement('div');
      token.className = 'token token-anim';
      token.innerHTML = `<div class="token-text">Prompt: ${scenario.prompt}</div><div class="token-box"></div>`;
      tokenContainer.appendChild(token);

      setTimeout(() => {
        activateExperts(scenario.experts);
        router.style.transform = 'scale(1.1)';
        router.style.borderColor = '#fff';
        setTimeout(() => {
          router.style.transform = 'scale(1)';
          router.style.borderColor = 'var(--accent)';
        }, 200);
      }, 2000);

      setTimeout(() => token.remove(), 4000);
    }

    function activateExperts(labels) {
      const indices = [];
      while(indices.length < labels.length) {
        const r = Math.floor(Math.random() * 32);
        if(!indices.includes(r)) indices.push(r);
      }

      indices.forEach((idx, i) => {
        const cell = document.getElementById(`expert-${idx}`);
        const path = document.getElementById(`path-${idx}`);
        const label = document.getElementById(`label-${idx}`);
        
        label.textContent = labels[i];
        cell.classList.add('active');
        path.style.opacity = "0.8";

        setTimeout(() => {
          cell.classList.remove('active');
          path.style.opacity = "0";
        }, 1000);
      });
    }

    window.onload = () => {
      updatePaths();
      setInterval(spawnToken, 2000);
    };
  </script>
</body>
</html>
