<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Curse of Dimensionality | Ninad Pathak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f8f6;
      --accent: #d44000;
      --border: #e0e0dc;
      --text: #0e0e0e;
      --mono: 'JetBrains Mono', monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #090909;
        --accent: #ff5f1f;
        --border: #1e1e1e;
        --text: #f0f0f0;
      }
    }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--mono); overflow: hidden; padding: 40px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 40px; }
    .header { text-align: center; }
    .label { font-size: 10px; color: var(--accent); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.1em; }
    .title { font-size: 14px; font-weight: 500; }
    
    .viz { height: 200px; border: 1px solid var(--border); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .circle { width: 150px; height: 150px; border: 1px solid var(--border); border-radius: 50%; position: relative; }
    .dot { width: 4px; height: 4px; background: var(--accent); position: absolute; border-radius: 50%; transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
    
    .controls { display: flex; align-items: center; gap: 20px; }
    input[type=range] { flex: 1; accent-color: var(--accent); }
    
    .info { font-size: 12px; color: #888; text-align: center; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="label">// Spatial Collapse</div>
      <div class="title">The Curse of Dimensionality</div>
    </div>

    <div class="viz">
      <div class="circle" id="sphere"></div>
    </div>

    <div class="controls">
      <span style="font-size: 10px;">D=2</span>
      <input type="range" id="dimRange" min="2" max="100" value="2">
      <span style="font-size: 10px;">D=100</span>
    </div>

    <div class="info" id="info">
      As dimensions increase, points move toward the boundary of the space.
    </div>
  </div>

  <script>
    const sphere = document.getElementById('sphere');
    const range = document.getElementById('dimRange');
    const info = document.getElementById('info');
    
    const count = 40;
    const dots = [];

    for(let i=0; i<count; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      sphere.appendChild(dot);
      dots.push(dot);
    }

    function update() {
      const d = parseInt(range.value);
      dots.forEach(dot => {
        // In high dimensions, the distance from center r follows r ~ sqrt(d)
        // Normalized, points push toward r=1
        const pull = Math.pow(Math.random(), 1/d);
        const angle = Math.random() * Math.PI * 2;
        const x = 75 + Math.cos(angle) * 75 * pull;
        const y = 75 + Math.sin(angle) * 75 * pull;
        dot.style.left = x + 'px';
        dot.style.top = y + 'px';
      });

      if (d > 50) info.innerText = "High Dimensionality: All vectors are now nearly orthogonal and equidistant.";
      else info.innerText = "As dimensions increase, points move toward the boundary of the space.";
    }

    range.addEventListener('input', update);
    update();
  </script>
</body>
</html>
