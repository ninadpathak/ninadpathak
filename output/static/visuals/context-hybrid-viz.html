<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hybrid Retrieval | Ninad Pathak</title>
  <link rel="stylesheet" href="/static/css/visuals-base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .pipeline { flex: 1; display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
    .step { border: 1px solid var(--border); padding: 16px; font-family: var(--mono); font-size: 10px; background: var(--bg); text-align: center; line-height: 1.4; transition: all 0.3s; color: var(--text-dim); }
    .arrow { color: var(--border); font-weight: 700; }
    .highlight { border-color: var(--accent); color: var(--accent); font-weight: 600; background: rgba(212, 64, 0, 0.02); }
    
    @media (max-width: 600px) {
      .pipeline { flex-direction: column; gap: 8px; }
      .arrow { transform: rotate(90deg); }
    }
  </style>
</head>
<body>
  <div class="viz-container">
    <div class="header-meta">
      <div>
        <div class="label">// Retrieval_Strategy</div>
        <h1 class="title">RAG + Long Context Hybrid</h1>
      </div>
      <div class="label" style="color: var(--text-dim);">Efficiency_Model</div>
    </div>

    <div class="pipeline">
      <div class="step">CORPUS<br>(10M+ TOKENS)</div>
      <div class="arrow">→</div>
      <div class="step highlight">VECTOR_SEARCH<br>(TOP_50_DOCS)</div>
      <div class="arrow">→</div>
      <div class="step highlight">RERANKER<br>(TOP_5_DOCS)</div>
      <div class="arrow">→</div>
      <div class="step">LLM_SYNTHESIS<br>(FINAL_ANSWER)</div>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot"></div> PIPELINE: ACTIVE</div>
      <div class="status-item">LATENCY: ~1.2s</div>
    </div>
  </div>
  <script>function sendHeight(){const h=document.documentElement.scrollHeight;window.parent.postMessage({type:"resize-iframe",height:h},"*")}window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);new ResizeObserver(sendHeight).observe(document.body);</script>
</body>
</html>
