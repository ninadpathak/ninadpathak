<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compounding Content Moat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-1: #ffffff;
            --bg-2: #efefed;
            --border: #e0e0dc;
            --text-1: #0e0e0e;
            --text-2: #3a3a3a;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --bg-2: #1a1a1a;
                --border: #1e1e1e;
                --text-1: #f0f0f0;
                --text-2: #c2c2c2;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }

        body { 
            margin: 0; 
            background: var(--bg-1); 
            font-family: var(--sans); 
            color: var(--text-1);
            overflow: hidden; 
        }

        #label {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-3);
            text-transform: uppercase;
        }

        #data {
            position: absolute;
            top: 20px;
            right: 20px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--accent);
            text-align: right;
        }
    </style>
</head>
<body>
    <div id="label">compounding content loop // trust accumulation</div>
    <div id="data">trust_score: <span id="trust">0.00</span><br>defensive_depth: <span id="depth">0.00</span></div>
    <script>
        const scene = new THREE.Scene();
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        scene.background = new THREE.Color(isDark ? 0x111111 : 0xffffff);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Core Moat structure - a spiral path of points
        const points = [];
        const numPoints = 200;
        const radius = 5;
        const height = 10;
        
        for (let i = 0; i < numPoints; i++) {
            const t = i / numPoints;
            const angle = t * Math.PI * 10;
            const r = radius * (1 + t * 0.5); // Compounding radius
            const x = r * Math.cos(angle);
            const z = r * Math.sin(angle);
            const y = (t - 0.5) * height;
            points.push(new THREE.Vector3(x, y, z));
        }

        const curve = new THREE.CatmullRomCurve3(points);
        const geometry = new THREE.TubeGeometry(curve, 100, 0.05, 8, false);
        const material = new THREE.MeshBasicMaterial({ color: isDark ? 0x333333 : 0xcccccc });
        const tube = new THREE.Mesh(geometry, material);
        scene.add(tube);

        // Highlight nodes representing content assets
        const assetNodes = [];
        const assetLabels = ['Quickstart', 'Concepts', 'Tutorials', 'Changelog', 'Upgrade Guide', 'Case Study', 'Reference'];
        const nodeMaterial = new THREE.MeshBasicMaterial({ color: isDark ? 0xff5f1f : 0xd44000 });
        
        assetLabels.forEach((label, i) => {
            const t = (i + 1) / (assetLabels.length + 1);
            const pos = curve.getPointAt(t);
            const nodeGeo = new THREE.SphereGeometry(0.15, 16, 16);
            const node = new THREE.Mesh(nodeGeo, nodeMaterial);
            node.position.copy(pos);
            scene.add(node);
            assetNodes.push(node);
        });

        // Connecting lines - represent relationships between assets
        const lineMaterial = new THREE.LineBasicMaterial({ color: isDark ? 0x222222 : 0xeeeeee, transparent: true, opacity: 0.5 });
        for (let i = 0; i < assetNodes.length - 1; i++) {
            const lineGeo = new THREE.BufferGeometry().setFromPoints([assetNodes[i].position, assetNodes[assetNodes[i+1] ? i+1 : 0].position]);
            const line = new THREE.Line(lineGeo, lineMaterial);
            scene.add(line);
        }

        camera.position.z = 12;
        camera.position.y = 5;
        camera.lookAt(0, 0, 0);

        const trustEl = document.getElementById('trust');
        const depthEl = document.getElementById('depth');

        function animate() {
            requestAnimationFrame(animate);
            tube.rotation.y += 0.005;
            assetNodes.forEach((node, i) => {
                const time = Date.now() * 0.001;
                node.scale.setScalar(1 + Math.sin(time + i) * 0.2);
            });
            
            // Mathematical precision: Compounding trust calculation
            const time = Date.now() * 0.001;
            const trust = (Math.pow(1.05, time % 100)).toFixed(2);
            const depth = (Math.pow(1.08, time % 100)).toFixed(2);
            trustEl.innerText = trust;
            depthEl.innerText = depth;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
