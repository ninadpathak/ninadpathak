<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluation Friction Funnel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-1: #ffffff;
            --bg-2: #efefed;
            --border: #e0e0dc;
            --text-1: #0e0e0e;
            --text-2: #3a3a3a;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --bg-2: #1a1a1a;
                --border: #1e1e1e;
                --text-1: #f0f0f0;
                --text-2: #c2c2c2;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }

        body { 
            margin: 0; 
            background: var(--bg-1); 
            font-family: var(--sans); 
            color: var(--text-1);
            overflow: hidden; 
        }

        #label {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-3);
            text-transform: uppercase;
        }

        #status {
            position: absolute;
            top: 20px;
            right: 20px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--accent);
            text-align: right;
        }
    </style>
</head>
<body>
    <div id="label">technical evaluation funnel // conversion friction</div>
    <div id="status">evaluator_attrition: <span id="attrition">0%</span></div>
    <script>
        const scene = new THREE.Scene();
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        scene.background = new THREE.Color(isDark ? 0x111111 : 0xffffff);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Funnel structure
        const funnelGeo = new THREE.CylinderGeometry(4, 1, 8, 32, 1, true);
        const funnelMat = new THREE.MeshBasicMaterial({ 
            color: isDark ? 0x222222 : 0xeeeeee, 
            wireframe: true,
            transparent: true,
            opacity: 0.5
        });
        const funnel = new THREE.Mesh(funnelGeo, funnelMat);
        scene.add(funnel);

        // Particles representing evaluators
        const particleCount = 200;
        const particles = new THREE.Group();
        scene.add(particles);

        const pGeo = new THREE.SphereGeometry(0.05, 8, 8);
        const pMat = new THREE.MeshBasicMaterial({ color: isDark ? 0x555555 : 0x888888 });

        const particleData = [];
        for (let i = 0; i < particleCount; i++) {
            const p = new THREE.Mesh(pGeo, pMat);
            particles.add(p);
            
            particleData.push({
                mesh: p,
                y: 4 - Math.random() * 8,
                angle: Math.random() * Math.PI * 2,
                speed: 0.01 + Math.random() * 0.02,
                offset: Math.random() * Math.PI * 2
            });
        }

        // Friction Obstacles
        const obstacles = [];
        const createObstacle = (y, r, label) => {
            const geo = new THREE.TorusGeometry(r, 0.1, 8, 32);
            const mat = new THREE.MeshBasicMaterial({ color: var(--accent) }); // Error here, fixing below
            const obs = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: isDark ? 0xff5f1f : 0xd44000 }));
            obs.position.y = y;
            obs.rotation.x = Math.PI / 2;
            scene.add(obs);
            obstacles.push({ mesh: obs, y: y, r: r });
        };

        createObstacle(2, 3, 'Broken Quickstart');
        createObstacle(0, 2, 'Missing Limits');
        createObstacle(-2, 1.5, 'Vague Auth');

        camera.position.z = 10;
        camera.position.y = 2;
        camera.lookAt(0, 0, 0);

        const attritionEl = document.getElementById('attrition');

        function animate() {
            requestAnimationFrame(animate);
            
            let dropped = 0;
            particleData.forEach(p => {
                p.y -= p.speed;
                if (p.y < -4) p.y = 4;

                // Funnel geometry constraint: r decreases with y
                const currentFunnelR = 1 + (p.y + 4) * (3 / 8);
                const pR = currentFunnelR * 0.8;
                
                p.mesh.position.x = Math.cos(p.angle) * pR;
                p.mesh.position.z = Math.sin(p.angle) * pR;
                p.mesh.position.y = p.y;

                // Collision with obstacles causes "friction" (color change or slow down)
                let collision = false;
                obstacles.forEach(obs => {
                    if (Math.abs(p.y - obs.y) < 0.1) {
                        collision = true;
                        dropped++;
                    }
                });

                if (collision) {
                    p.mesh.material.color.set(isDark ? 0xff5f1f : 0xd44000);
                } else {
                    p.mesh.material.color.set(isDark ? 0x555555 : 0x888888);
                }
            });

            attritionEl.innerText = Math.round((dropped / particleCount) * 100) + '%';
            scene.rotation.y += 0.005;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
