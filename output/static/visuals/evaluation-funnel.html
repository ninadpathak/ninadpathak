<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluation Friction Funnel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root {
            --bg-1: #ffffff;
            --bg-2: #efefed;
            --border: #e0e0dc;
            --text-1: #0e0e0e;
            --text-2: #3a3a3a;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --bg-2: #1a1a1a;
                --border: #1e1e1e;
                --text-1: #f0f0f0;
                --text-2: #c2c2c2;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }

        body { 
            margin: 0; 
            background: var(--bg-1); 
            font-family: var(--sans); 
            color: var(--text-1);
            overflow: hidden; 
        }

        #label {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-3);
            text-transform: uppercase;
        }

        #status {
            position: absolute;
            top: 20px;
            right: 20px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--accent);
            text-align: right;
        }

        .floating-label {
            position: absolute;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-2);
            pointer-events: none;
            background: var(--bg-2);
            padding: 2px 6px;
            border: 1px solid var(--border);
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="label">technical evaluation funnel // conversion friction</div>
    <div id="status">evaluator_attrition: <span id="attrition">0%</span><br>active_trials: <span id="active">0</span></div>
    
    <div id="label-1" class="floating-label">BROKEN QUICKSTART</div>
    <div id="label-2" class="floating-label">MISSING LIMITS</div>
    <div id="label-3" class="floating-label">VAGUE AUTH</div>

    <script>
        const scene = new THREE.Scene();
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        scene.background = new THREE.Color(isDark ? 0x111111 : 0xffffff);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Funnel structure - more defined wireframe
        const funnelGeo = new THREE.CylinderGeometry(4, 0.8, 8, 32, 4, true);
        const funnelMat = new THREE.MeshBasicMaterial({ 
            color: isDark ? 0x222222 : 0xeeeeee, 
            wireframe: true,
            transparent: true,
            opacity: 0.4
        });
        const funnel = new THREE.Mesh(funnelGeo, funnelMat);
        scene.add(funnel);

        // Particles representing evaluators
        const particleCount = 300;
        const particles = new THREE.Group();
        scene.add(particles);

        const pGeo = new THREE.SphereGeometry(0.04, 6, 6);
        const pMatBase = { color: isDark ? 0x666666 : 0x999999, transparent: true, opacity: 0.8 };

        const particleData = [];
        for (let i = 0; i < particleCount; i++) {
            const mat = new THREE.MeshBasicMaterial(pMatBase);
            const p = new THREE.Mesh(pGeo, mat);
            particles.add(p);
            
            resetParticle(i, true);
        }

        function resetParticle(i, initial = false) {
            const data = particleData[i] || {};
            data.mesh = particles.children[i];
            data.y = initial ? (Math.random() * 8 - 4) : 4;
            data.angle = Math.random() * Math.PI * 2;
            data.speed = 0.02 + Math.random() * 0.03;
            data.frictioned = false;
            data.leaked = false;
            data.mesh.material.color.set(isDark ? 0x666666 : 0x999999);
            data.mesh.material.opacity = 0.8;
            particleData[i] = data;
        }

        // Friction Obstacles (Obstruction rings)
        const obstacles = [
            { y: 2.5, r: 3.2, label: 'label-1' },
            { y: 0, r: 2.2, label: 'label-2' },
            { y: -2.5, r: 1.3, label: 'label-3' }
        ];

        obstacles.forEach(obs => {
            const geo = new THREE.TorusGeometry(obs.r, 0.05, 8, 48);
            const mat = new THREE.MeshBasicMaterial({ color: isDark ? 0x333333 : 0xdddddd });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = obs.y;
            mesh.rotation.x = Math.PI / 2;
            scene.add(mesh);
            obs.mesh = mesh;
        });

        camera.position.z = 10;
        camera.position.y = 2;
        camera.lookAt(0, 0, 0);

        const attritionEl = document.getElementById('attrition');
        const activeEl = document.getElementById('active');

        function updateLabels() {
            obstacles.forEach(obs => {
                const vector = obs.mesh.position.clone();
                vector.project(camera);
                const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                const y = (vector.y * -0.5 + 0.5) * window.innerHeight;
                const el = document.getElementById(obs.label);
                el.style.left = x + 'px';
                el.style.top = (y - 20) + 'px';
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            let dropped = 0;
            let active = 0;

            particleData.forEach((p, i) => {
                if (!p.leaked) {
                    p.y -= p.speed;
                    active++;
                } else {
                    // Leaked particles drift away
                    p.mesh.position.x += Math.cos(p.angle) * 0.05;
                    p.mesh.position.z += Math.sin(p.angle) * 0.05;
                    p.y -= 0.02;
                    p.mesh.material.opacity -= 0.01;
                }

                if (p.y < -4.5 || p.mesh.material.opacity <= 0) {
                    resetParticle(i);
                    return;
                }

                if (!p.leaked) {
                    // Funnel geometry: r = 0.8 + (y + 4) * (3.2 / 8)
                    const funnelR = 0.8 + (p.y + 4) * (3.2 / 8);
                    const pR = funnelR * 0.85;
                    p.mesh.position.x = Math.cos(p.angle) * pR;
                    p.mesh.position.z = Math.sin(p.angle) * pR;
                    p.mesh.position.y = p.y;

                    // Friction collision
                    obstacles.forEach(obs => {
                        if (Math.abs(p.y - obs.y) < 0.1 && !p.frictioned) {
                            if (Math.random() < 0.4) { // 40% chance to "leak" at each obstacle
                                p.leaked = true;
                                p.mesh.material.color.set(isDark ? 0xff5f1f : 0xd44000);
                            }
                            p.frictioned = true;
                        }
                    });
                } else {
                    dropped++;
                }
            });

            const attritionRate = ((particleCount - active) / particleCount * 100).toFixed(0);
            attritionEl.innerText = attritionRate + '%';
            activeEl.innerText = active;

            scene.rotation.y += 0.005;
            updateLabels();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
