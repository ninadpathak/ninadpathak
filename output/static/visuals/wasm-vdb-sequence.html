<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASM VDB Sequence</title>
    <style>
        :root {
            --bg-1: #ffffff;
            --bg-2: #efefed;
            --border: #e0e0dc;
            --text-1: #0e0e0e;
            --text-2: #3a3a3a;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --bg-2: #1a1a1a;
                --border: #1e1e1e;
                --text-1: #f0f0f0;
                --text-2: #c2c2c2;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }

        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            background: var(--bg-1); 
            font-family: var(--sans); 
            color: var(--text-1);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container { 
            width: 100%; 
            height: 100%;
            padding: 1.5rem;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            height: auto;
            max-height: 100%;
            overflow: visible;
        }

        .label { font-family: var(--mono); font-size: 18px; fill: var(--text-2); font-weight: 600; text-transform: uppercase; }
        .desc { font-family: var(--sans); font-size: 16px; fill: var(--text-3); }
        .line { stroke: var(--border); stroke-width: 2; }
        .arrow { stroke: var(--accent); stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
        .box { fill: var(--bg-2); stroke: var(--border); stroke-width: 1.5; }
        .highlight { fill: var(--accent); font-weight: 700; font-size: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <svg viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet">
            <defs>
                <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                    <polygon points="0 0, 8 3, 0 6" fill="var(--accent)" />
                </marker>
            </defs>
            
            <g transform="translate(150, 80)">
                <rect x="-80" y="0" width="160" height="50" rx="4" class="box" />
                <text x="0" y="32" text-anchor="middle" class="label">Main Thread</text>
                <line x1="0" y1="50" x2="0" y2="380" class="line" stroke-dasharray="6" />
            </g>
            
            <g transform="translate(500, 80)">
                <rect x="-90" y="0" width="180" height="50" rx="4" class="box" />
                <text x="0" y="32" text-anchor="middle" class="label">Worker</text>
                <line x1="0" y1="50" x2="0" y2="380" class="line" stroke-dasharray="6" />
            </g>
            
            <g transform="translate(850, 80)">
                <rect x="-90" y="0" width="180" height="50" rx="4" class="box" style="stroke: var(--accent); stroke-width: 2.5;" />
                <text x="0" y="32" text-anchor="middle" class="label" style="fill: var(--accent);">WASM Engine</text>
                <line x1="0" y1="50" x2="0" y2="380" class="line" stroke-dasharray="6" />
            </g>

            <g transform="translate(0, 150)">
                <path d="M 150 0 L 490 0" class="arrow" />
                <text x="325" y="-15" text-anchor="middle" class="label" style="font-size: 16px;">1. Spawn Worker</text>
            </g>
            
            <g transform="translate(0, 220)">
                <path d="M 500 0 L 840 0" class="arrow" />
                <text x="670" y="-15" text-anchor="middle" class="label" style="font-size: 16px;">2. Load WASM</text>
            </g>
            
            <g transform="translate(0, 290)">
                <path d="M 850 0 L 510 0" class="arrow" />
                <text x="680" y="-15" text-anchor="middle" class="label" style="font-size: 16px;">3. Ready</text>
            </g>
            
            <g transform="translate(0, 360)">
                <path d="M 150 0 L 490 0" class="arrow" />
                <text x="325" y="-15" text-anchor="middle" class="highlight">4. Query(vector)</text>
            </g>
            
            <rect x="150" y="420" width="700" height="60" rx="4" fill="var(--bg-2)" stroke="var(--border)" />
            <text x="500" y="458" text-anchor="middle" class="label" style="font-size: 22px; fill: var(--text-1);">Local-First WASM Execution Flow</text>
        </svg>
    </div>
</body>
</html>
