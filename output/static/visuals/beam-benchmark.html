<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEAM Memory Benchmark - Lost in the Middle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
  #canvas { display: block; }
  #info {
    position: absolute;
    top: 24px;
    left: 24px;
    color: #e0e0e0;
    pointer-events: none;
  }
  #info h1 {
    font-size: 18px;
    font-weight: 600;
    color: #ff5f1f;
    margin-bottom: 4px;
  }
  #info p {
    font-size: 12px;
    color: #888;
  }
  #legend {
    position: absolute;
    bottom: 24px;
    right: 24px;
    background: rgba(10,10,15,0.85);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 16px 20px;
    color: #e0e0e0;
    font-size: 12px;
    backdrop-filter: blur(8px);
  }
  #legend .title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #666;
    margin-bottom: 12px;
  }
  #legend .item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  #legend .item:last-child { margin-bottom: 0; }
  #legend .swatch {
    width: 28px;
    height: 3px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  #legend .label { color: #ccc; }
  #legend .label span { color: #888; font-size: 10px; }
</style>
</head>
<body>
<div id="info">
  <h1>BEAM Memory Benchmark</h1>
  <p>Retrieval Accuracy vs. Context Position</p>
</div>
<div id="legend">
  <div class="title">Retrieval Methods</div>
  <div class="item">
    <div class="swatch" style="background:#ff5f1f;"></div>
    <div class="label">Standard Context <span>(U-shaped loss)</span></div>
  </div>
  <div class="item">
    <div class="swatch" style="background:#ffb08a;"></div>
    <div class="label">Importance-Weighted <span>(improved)</span></div>
  </div>
  <div class="item">
    <div class="swatch" style="background:#555;"></div>
    <div class="label">Random Retrieval <span>(baseline)</span></div>
  </div>
</div>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(6, 5, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
renderer.domElement.id = 'canvas';

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 5;
controls.maxDistance = 20;
controls.maxPolarAngle = Math.PI * 0.55;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.6;

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.3));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

// Grid dimensions
const widthSegs = 60;
const depthSegs = 1;
const meshWidth = 8;
const meshDepth = 0.6;

// Build a ribbon mesh (flat strip with height variation)
function buildRibbon(heights, color, yOffset = 0) {
  const geo = new THREE.BufferGeometry();
  const positions = [];
  const indices = [];
  const colors = [];

  const baseColor = new THREE.Color(color);

  for (let i = 0; i <= widthSegs; i++) {
    const t = i / widthSegs;
    const x = (t - 0.5) * meshWidth;
    const h = heights(i / widthSegs);
    positions.push(x, h + yOffset, 0);
    positions.push(x, yOffset, meshDepth);

    // Color: slightly brighter at peaks, dimmer at valleys
    const brightness = 0.7 + 0.3 * (h / 1.2);
    const c = baseColor.clone().multiplyScalar(brightness);
    colors.push(c.r, c.g, c.b);
    colors.push(c.r * 0.7, c.g * 0.7, c.b * 0.7);
  }

  for (let i = 0; i < widthSegs; i++) {
    const a = i * 2;
    const b = i * 2 + 1;
    const c = i * 2 + 2;
    const d = i * 2 + 3;
    indices.push(a, b, c);
    indices.push(b, d, c);
  }

  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();

  const mat = new THREE.MeshPhongMaterial({
    vertexColors: true,
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0.92,
    shininess: 80,
    specular: new THREE.Color(0x333333),
  });

  return new THREE.Mesh(geo, mat);
}

// Surface 1: Standard context window - deep U-shape
function standardHeights(t) {
  // U-shaped: high at edges (0 and 1), low in middle (~0.5)
  const u = 1 - Math.abs(t * 2 - 1);
  const valley = Math.pow(u, 0.5); // 0 at edges? no...
  // Let me do proper U: high at edges, low at middle
  // t=0 -> 1.0, t=0.5 -> 0.2, t=1 -> 1.0
  const uVal = Math.abs(t * 2 - 1); // 1 at middle, 0 at edges
  return 0.15 + (1 - uVal) * 1.05; // ~0.15 at middle, ~1.2 at edges
}

// Surface 2: Importance-weighted - flatter
function importanceHeights(t) {
  const u = Math.abs(t * 2 - 1);
  return 0.55 + (1 - u) * 0.55; // ~0.55 at middle, ~1.1 at edges
}

// Surface 3: Random retrieval - nearly flat low
function randomHeights(t) {
  // ~0.08 base with tiny noise
  const noise = (Math.sin(t * 23.7) * 0.5 + Math.sin(t * 7.3) * 0.5) * 0.04;
  return 0.08 + noise;
}

// Add ribbons with Z offsets
const s1 = buildRibbon(standardHeights, 0xff5f1f, 0.0);
const s2 = buildRibbon(importanceHeights, 0xffb08a, 0.22);
const s3 = buildRibbon(randomHeights, 0x555555, 0.42);

scene.add(s1, s2, s3);

// Grid floor
const gridHelper = new THREE.GridHelper(meshWidth, 20, 0x222233, 0x181828);
gridHelper.position.y = -0.01;
scene.add(gridHelper);

// Wireframe overlays for each ribbon
function buildWireframe(heights, color, yOffset) {
  const geo = new THREE.BufferGeometry();
  const positions = [];
  for (let i = 0; i <= widthSegs; i++) {
    const t = i / widthSegs;
    const x = (t - 0.5) * meshWidth;
    const h = heights(t);
    positions.push(x, h + yOffset, 0);
    positions.push(x, yOffset, meshDepth);
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.15 });
  const lines = [];
  for (let i = 0; i < widthSegs; i++) {
    const bottom = new THREE.Line(geo, mat);
    lines.push(bottom);
  }
  return lines;
}

// Draw the accuracy lines (front edge of each ribbon)
function buildLine(heights, color, yOffset) {
  const pts = [];
  for (let i = 0; i <= widthSegs; i++) {
    const t = i / widthSegs;
    const x = (t - 0.5) * meshWidth;
    const h = heights(t);
    pts.push(new THREE.Vector3(x, h + yOffset, 0));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color, linewidth: 2 });
  return new THREE.Line(geo, mat);
}

scene.add(buildLine(standardHeights, 0xff5f1f, 0.0));
scene.add(buildLine(importanceHeights, 0xffb08a, 0.22));
scene.add(buildLine(randomHeights, 0x666666, 0.42));

// Axis labels using sprites
function makeLabel(text, position, color = '#888899', fontSize = 14) {
  const canvas = document.createElement('canvas');
  canvas.width = 512;
  canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'transparent';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.font = `${fontSize}px 'Segoe UI', system-ui, sans-serif`;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, canvas.width / 2, canvas.height / 2);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.position.copy(position);
  sprite.scale.set(2.5, 0.6, 1);
  return sprite;
}

scene.add(makeLabel('Context Position (Beginning → End)', new THREE.Vector3(0, -0.35, -0.8), '#6666aa', 16));
scene.add(makeLabel('Retrieval Accuracy', new THREE.Vector3(-5.5, 0.5, 0), '#6666aa', 16));

// Tick marks on X axis
const tickGroup = new THREE.Group();
for (let i = 0; i <= 4; i++) {
  const t = i / 4;
  const x = (t - 0.5) * meshWidth;
  const pts = [new THREE.Vector3(x, -0.05, 0), new THREE.Vector3(x, -0.18, 0)];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  tickGroup.add(new THREE.Line(geo, new THREE.LineBasicMaterial({ color: 0x444455 })));
}
scene.add(tickGroup);

// Context position labels (Beginning, 25%, 50%, 75%, End)
const labelTexts = ['Beginning', '', 'Middle', '', 'End'];
for (let i = 0; i <= 4; i++) {
  const t = i / 4;
  const x = (t - 0.5) * meshWidth;
  scene.add(makeLabel(labelTexts[i], new THREE.Vector3(x, -0.5, 0), '#555566', 11));
}

// Accuracy tick labels
const accLabels = ['High', '', 'Low', '', ''];
for (let i = 0; i < accLabels.length; i++) {
  const y = 0.15 + i * 0.3;
  if (accLabels[i]) {
    scene.add(makeLabel(accLabels[i], new THREE.Vector3(-4.8, y, 0), '#555566', 11));
  }
}

// Highlight the "valley" region in the middle
function addValleyHighlight() {
  const pts = [
    new THREE.Vector3(-1.2, 0.08, 0),
    new THREE.Vector3(-1.2, 1.3, 0),
    new THREE.Vector3(1.2, 1.3, 0),
    new THREE.Vector3(1.2, 0.08, 0),
  ];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color: 0xff5f1f, transparent: true, opacity: 0.3 });
  const outline = new THREE.LineLoop(geo, mat);
  scene.add(outline);
}
addValleyHighlight();

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
