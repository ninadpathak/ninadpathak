<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEAM Memory Benchmark - 3D Performance Surface</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a0a; 
            overflow: hidden; 
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        #container { width: 100vw; height: 100vh; }
        #info {
            position: absolute;
            top: 24px;
            left: 24px;
            color: #ff5f1f;
            z-index: 10;
            max-width: 320px;
        }
        #info h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }
        #info p {
            font-size: 12px;
            color: #888;
            line-height: 1.5;
        }
        #legend {
            position: absolute;
            bottom: 24px;
            right: 24px;
            color: #fff;
            z-index: 10;
            text-align: right;
        }
        #legend .item {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 8px;
            font-size: 11px;
        }
        #legend .color {
            width: 24px;
            height: 4px;
            border-radius: 2px;
            margin-left: 10px;
        }
        #instructions {
            position: absolute;
            bottom: 24px;
            left: 24px;
            color: #555;
            font-size: 11px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="info">
        <h1>BEAM Benchmark: Retrieval Accuracy vs Context Position</h1>
        <p>Height represents accuracy. The valley in the center shows the "Lost in the Middle" degradation. Flat retrieval maintains consistent performance.</p>
    </div>
    <div id="legend">
        <div class="item">
            <span>Standard Context</span>
            <div class="color" style="background: #ff5f1f;"></div>
        </div>
        <div class="item">
            <span>Importance-Weighted Memory</span>
            <div class="color" style="background: #ff9f5f;"></div>
        </div>
        <div class="item">
            <span>Flat Retrieval</span>
            <div class="color" style="background: #ffcfa0;"></div>
        </div>
    </div>
    <div id="instructions">Drag to rotate · Scroll to zoom</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        const container = document.getElementById('container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(25, 20, 25);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 15;
        controls.maxDistance = 80;
        controls.target.set(0, 5, 0);

        function createSurface(getHeight, color, segments, xSize, zSize, yOffset) {
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            const indices = [];

            for (let i = 0; i <= segments; i++) {
                for (let j = 0; j <= segments; j++) {
                    const x = (i / segments - 0.5) * xSize;
                    const z = (j / segments - 0.5) * zSize;
                    const y = getHeight(x / (xSize / 2), z / (zSize / 2)) + yOffset;
                    vertices.push(x, y, z);
                }
            }

            for (let i = 0; i < segments; i++) {
                for (let j = 0; j < segments; j++) {
                    const a = i * (segments + 1) + j;
                    const b = a + 1;
                    const c = a + (segments + 1);
                    const d = c + 1;
                    indices.push(a, b, d);
                    indices.push(a, d, c);
                }
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geometry.setIndex(indices);
            geometry.computeVertexNormals();

            const material = new THREE.MeshPhongMaterial({
                color: color,
                specular: 0x444444,
                shininess: 80,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.92
            });

            return new THREE.Mesh(geometry, material);
        }

        // Standard context: U-shaped curve (lost in middle) - degrades in center
        function standardContextHeight(nx, nz) {
            // nx = -1 to 1 (left to right), nz = -1 to 1 (context length)
            // U-shape: high at edges, low in middle
            const edgeFactor = 1 - Math.pow(nx, 2);
            const lengthFactor = 0.7 + 0.3 * (1 - Math.abs(nz));
            return edgeFactor * lengthFactor * 12;
        }

        // Importance-weighted memory: nearly flat, slight preference for important
        function importanceWeightedHeight(nx, nz) {
            const base = 0.85 + 0.1 * (1 - Math.pow(nx, 2));
            const lengthFactor = 0.9 + 0.1 * (1 - Math.abs(nz) * 0.3);
            return base * lengthFactor * 13;
        }

        // Flat retrieval: constant across all positions
        function flatRetrievalHeight(nx, nz) {
            return 11 + Math.sin(nx * 2) * 0.5 + Math.cos(nz * 2) * 0.3;
        }

        const segments = 60;

        // Surface 1: Standard context - shows U-shaped degradation
        const surface1 = createSurface(standardContextHeight, 0xff5f1f, segments, 30, 20, 0);
        scene.add(surface1);

        // Surface 2: Importance-weighted - more consistent
        const surface2 = createSurface(importanceWeightedHeight, 0xff9f5f, segments, 30, 20, 2);
        scene.add(surface2);

        // Surface 3: Flat retrieval
        const surface3 = createSurface(flatRetrievalHeight, 0xffcfa0, segments, 30, 20, 4);
        scene.add(surface3);

        // Grid lines
        const gridHelper = new THREE.GridHelper(30, 30, 0x222222, 0x111111);
        gridHelper.position.y = -1;
        scene.add(gridHelper);

        // Axis labels
        function createTextSprite(text, position, size = 0.8) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#666';
            ctx.font = 'bold 28px Segoe UI';
            ctx.textAlign = 'center';
            ctx.fillText(text, 128, 40);
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.position.copy(position);
            sprite.scale.set(size * 2, size * 0.5, 1);
            return sprite;
        }

        scene.add(createTextSprite('Context Position (Start → Middle → End)', new THREE.Vector3(0, -2, 12), 1.2));
        scene.add(createTextSprite('Context Length', new THREE.Vector3(18, -2, 0), 1.0));

        // Y-axis label
        const yLabelCanvas = document.createElement('canvas');
        yLabelCanvas.width = 64;
        yLabelCanvas.height = 256;
        const yCtx = yLabelCanvas.getContext('2d');
        yCtx.fillStyle = '#666';
        yCtx.font = 'bold 28px Segoe UI';
        yCtx.textAlign = 'center';
        yCtx.save();
        yCtx.translate(32, 128);
        yCtx.rotate(-Math.PI / 2);
        yCtx.fillText('Retrieval Accuracy', 0, 0);
        yCtx.restore();
        const yTexture = new THREE.CanvasTexture(yLabelCanvas);
        const ySprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: yTexture }));
        ySprite.position.set(-18, 6, 0);
        ySprite.scale.set(1.5, 0.4, 1);
        scene.add(ySprite);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0xff5f1f, 0.5, 50);
        pointLight.position.set(-10, 15, -10);
        scene.add(pointLight);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
