<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic Success Rate | Ninad Pathak</title>
  <link rel="stylesheet" href="/static/css/visuals-base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .circles { flex: 1; display: flex; justify-content: center; align-items: center; gap: 40px; margin-top: 20px; flex-wrap: wrap; }
    .circle-item { display: flex; flex-direction: column; align-items: center; gap: 16px; background: rgba(0,0,0,0.02); padding: 20px; border: 1px solid var(--border); }
    
    .radial { width: 120px; height: 120px; position: relative; }
    .radial svg { transform: rotate(-90deg); width: 100%; height: 100%; }
    .radial-bg { fill: none; stroke: var(--border); stroke-width: 8; }
    .radial-fill { fill: none; stroke: var(--accent); stroke-width: 8; stroke-dasharray: 314; stroke-dashoffset: 314; transition: stroke-dashoffset 2s cubic-bezier(0.16, 1, 0.3, 1); stroke-linecap: round; }
    
    .percent { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 20px; font-weight: 600; color: var(--accent); }
    .name { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text); }
    .desc { font-size: 11px; color: var(--text-dim); text-align: center; max-width: 120px; line-height: 1.4; }

    @media (max-width: 600px) {
      .circles { gap: 20px; }
      .circle-item { padding: 15px; }
      .radial { width: 90px; height: 90px; }
      .radial-bg, .radial-fill { stroke-width: 6; stroke-dasharray: 235.5; stroke-dashoffset: 235.5; }
    }
  </style>
</head>
<body>
  <div class="viz-container">
    <div class="header-meta">
      <div>
        <div class="label">// Autonomous_Coding</div>
        <h1 class="title">Agentic Success Rate</h1>
      </div>
      <div class="label" style="color: var(--text-dim);">End_To_End_Resolution</div>
    </div>

    <div class="circles">
      <div class="circle-item">
        <div class="radial">
          <svg viewBox="0 0 120 120"><circle class="radial-bg" cx="60" cy="60" r="50"/><circle id="f1" class="radial-fill" cx="60" cy="60" r="50"/></svg>
          <div class="percent">80%</div>
        </div>
        <div class="name">Claude 4.6</div>
        <div class="desc">High tool calling accuracy</div>
      </div>
      <div class="circle-item">
        <div class="radial">
          <svg viewBox="0 0 120 120"><circle class="radial-bg" cx="60" cy="60" r="50"/><circle id="f2" class="radial-fill" cx="60" cy="60" r="50"/></svg>
          <div class="percent">78%</div>
        </div>
        <div class="name">DeepSeek V4</div>
        <div class="desc">Exceptional logic density</div>
      </div>
      <div class="circle-item">
        <div class="radial">
          <svg viewBox="0 0 120 120"><circle class="radial-bg" cx="60" cy="60" r="50"/><circle id="f3" class="radial-fill" cx="60" cy="60" r="50"/></svg>
          <div class="percent">76%</div>
        </div>
        <div class="name">GPT-5.4</div>
        <div class="desc">Strong instruction following</div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot"></div> DATA: 2026_Q1</div>
      <div class="status-item">METRIC: MULTI_TURN_COMPLETION</div>
    </div>
  </div>

  <script>
    const isMobile = window.innerWidth < 600;
    const circ = isMobile ? 235.5 : 314;
    
    setTimeout(() => {
      document.getElementById('f1').style.strokeDashoffset = circ * (1 - 0.809);
      document.getElementById('f2').style.strokeDashoffset = circ * (1 - 0.785);
      document.getElementById('f3').style.strokeDashoffset = circ * (1 - 0.762);
    }, 500);
  </script>
<script>function sendHeight(){const h=document.documentElement.scrollHeight;window.parent.postMessage({type:"resize-iframe",height:h},"*")}window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);new ResizeObserver(sendHeight).observe(document.body);</script></body>
</html>
