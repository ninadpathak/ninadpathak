<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uv Cache Deduplication</title>
    <style>
        :root {
            --bg-1: #ffffff;
            --bg-2: #efefed;
            --border: #e0e0dc;
            --text-1: #0e0e0e;
            --text-2: #3a3a3a;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --bg-2: #1a1a1a;
                --border: #1e1e1e;
                --text-1: #f0f0f0;
                --text-2: #c2c2c2;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }

        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            background: var(--bg-1); 
            font-family: var(--sans); 
            color: var(--text-1);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container { 
            width: 100%; 
            height: 100%;
            padding: 1.5rem;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            height: auto;
            max-height: 100%;
            overflow: visible;
        }

        .label { font-family: var(--mono); font-size: 20px; fill: var(--text-2); font-weight: 600; text-transform: uppercase; }
        .desc { font-family: var(--sans); font-size: 18px; fill: var(--text-3); }
        .box { fill: var(--bg-2); stroke: var(--border); stroke-width: 1.5; }
        .link { stroke: var(--accent); stroke-width: 3; stroke-dasharray: 8; fill: none; }
    </style>
</head>
<body>
    <div class="container">
        <svg viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet">
            <!-- Global Cache -->
            <g transform="translate(500, 250)">
                <rect x="-150" y="-80" width="300" height="160" rx="8" class="box" style="stroke: var(--accent); stroke-width: 3;" />
                <text x="0" y="-20" text-anchor="middle" class="label" style="fill: var(--accent); font-size: 24px;">Global Cache</text>
                <text x="0" y="20" text-anchor="middle" class="desc">Content-Addressable</text>
                <text x="0" y="50" text-anchor="middle" class="label" style="font-size: 14px;">torch-2.5.0.whl</text>
            </g>
            
            <!-- Project Nodes -->
            <g transform="translate(180, 120)">
                <rect x="-80" y="-40" width="160" height="80" rx="4" class="box" />
                <text x="0" y="10" text-anchor="middle" class="label">Project A</text>
                <path d="M 80 0 L 350 130" class="link" />
            </g>
            
            <g transform="translate(180, 380)">
                <rect x="-80" y="-40" width="160" height="80" rx="4" class="box" />
                <text x="0" y="10" text-anchor="middle" class="label">Project B</text>
                <path d="M 80 0 L 350 -130" class="link" />
            </g>
            
            <g transform="translate(820, 250)">
                <rect x="-80" y="-40" width="160" height="80" rx="4" class="box" />
                <text x="0" y="10" text-anchor="middle" class="label">Project C</text>
                <path d="M -80 0 L -170 0" class="link" />
            </g>
            
            <text x="500" y="60" text-anchor="middle" class="label" style="font-size: 28px; fill: var(--text-1);">Global Deduplication Architecture</text>
            <text x="500" y="460" text-anchor="middle" class="desc">Dashed lines: Zero-copy links. Disk space used once.</text>
        </svg>
    </div>
</body>
</html>
