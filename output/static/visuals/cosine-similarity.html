<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distance - Cosine Similarity</title>
    <style>
        :root {
            --bg-1: #ffffff;
            --text-1: #0e0e0e;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --text-1: #f0f0f0;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }
        
        body { margin: 0; height: 100vh; background: var(--bg-1); font-family: var(--mono); color: var(--text-1); overflow: hidden; }
        #canvas-container { width: 100vw; height: 100vh; }
        
        .overlay {
            position: absolute;
            top: 2rem;
            left: 2rem;
            font-size: 12px;
            pointer-events: none;
            background: var(--bg-1);
            padding: 10px;
            border: 1px solid var(--text-3);
        }
        .stat { color: var(--accent); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="overlay">
        Angle (θ): <span class="stat" id="angle-val">0.00</span>° <br>
        Cosine Similarity: <span class="stat" id="cos-val">1.000</span>
        <div style="font-size: 10px; color: var(--text-3); margin-top: 8px;">Drag to rotate</div>
    </div>

    <script>
        const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const colorBg = isDark ? 0x111111 : 0xffffff;
        const colorPoint = isDark ? 0xff5f1f : 0xd44000;
        const colorLine = isDark ? 0x444444 : 0xcccccc;
        const colorText = isDark ? 0xffffff : 0x000000;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(colorBg);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Add OrbitControls for interactivity
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enablePan = false;
        controls.enableZoom = false;

        // Origin
        const origin = new THREE.Vector3(0, -2, 0);

        // Materials
        const lineMatPrimary = new THREE.LineBasicMaterial({ color: colorText, linewidth: 2 });
        const lineMatQuery = new THREE.LineBasicMaterial({ color: colorPoint, linewidth: 3 });

        // Vector 1 (Fixed Document Vector)
        const vec1 = new THREE.Vector3(3, 4, 0);
        const geo1 = new THREE.BufferGeometry().setFromPoints([origin, vec1]);
        const line1 = new THREE.Line(geo1, lineMatPrimary);
        scene.add(line1);

        // Vector 2 (Moving Query Vector)
        const vec2 = new THREE.Vector3(0, 0, 0); // Gets updated
        const geo2 = new THREE.BufferGeometry().setFromPoints([origin, vec2]);
        const line2 = new THREE.Line(geo2, lineMatQuery);
        scene.add(line2);

        // Arc (Angle visualizer)
        const arcCurve = new THREE.EllipseCurve(0, -2, 1.5, 1.5, 0, 0, false, 0);
        const arcPoints = arcCurve.getPoints(50);
        const arcGeo = new THREE.BufferGeometry().setFromPoints(arcPoints);
        const arcLine = new THREE.Line(arcGeo, new THREE.LineBasicMaterial({ color: colorPoint, transparent: true, opacity: 0.5 }));
        scene.add(arcLine);

        // Add small spheres to ends
        const sphereGeo = new THREE.SphereGeometry(0.15, 16, 16);
        const mesh1 = new THREE.Mesh(sphereGeo, new THREE.MeshBasicMaterial({color: colorText}));
        mesh1.position.copy(vec1);
        scene.add(mesh1);
        
        const mesh2 = new THREE.Mesh(sphereGeo, new THREE.MeshBasicMaterial({color: colorPoint}));
        scene.add(mesh2);

        const angleValEl = document.getElementById('angle-val');
        const cosValEl = document.getElementById('cos-val');

        let time = 0;

        function animate() {
            requestAnimationFrame(animate);

            // Animate vector 2 sweeping back and forth
            const angle = Math.sin(time) * 1.5; // Sweep angle
            
            vec2.x = origin.x + 5 * Math.sin(angle);
            vec2.y = origin.y + 5 * Math.cos(angle);
            
            mesh2.position.copy(vec2);

            const positions = line2.geometry.attributes.position.array;
            positions[3] = vec2.x;
            positions[4] = vec2.y;
            positions[5] = vec2.z;
            line2.geometry.attributes.position.needsUpdate = true;

            // Calculate actual angle and cosine
            const v1Dir = new THREE.Vector3().subVectors(vec1, origin).normalize();
            const v2Dir = new THREE.Vector3().subVectors(vec2, origin).normalize();
            
            const dot = v1Dir.dot(v2Dir);
            const actualAngle = Math.acos(dot);
            
            angleValEl.innerText = (actualAngle * (180/Math.PI)).toFixed(1);
            cosValEl.innerText = dot.toFixed(4);

            // Update arc visually
            const startAngle = Math.atan2(v1Dir.y, v1Dir.x);
            let endAngle = Math.atan2(v2Dir.y, v2Dir.x);
            
            if (endAngle < startAngle) {
                // Keep drawing simple
                const temp = arcCurve.aStartAngle;
                arcCurve.aStartAngle = endAngle;
                arcCurve.aEndAngle = startAngle;
            } else {
                arcCurve.aStartAngle = startAngle;
                arcCurve.aEndAngle = endAngle;
            }

            arcLine.geometry.setFromPoints(arcCurve.getPoints(30));

            controls.update();
            time += 0.015;
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
