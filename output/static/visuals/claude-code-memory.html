<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Memory Architecture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #info {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 95, 31, 0.6);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    pointer-events: none;
  }
  #title {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: #ff5f1f;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    pointer-events: none;
    text-shadow: 0 0 20px rgba(255, 95, 31, 0.4);
  }
</style>
</head>
<body>
<div id="title">Claude Code Memory</div>
<div id="info">Drag to orbit &nbsp; Scroll to zoom</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  var scene = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 8, 18);

  var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);
  document.body.appendChild(renderer.domElement);

  var controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.minDistance = 10;
  controls.maxDistance = 40;

  // Terminal box - wireframe
  var boxGeo = new THREE.BoxGeometry(10, 6, 3);
  var edges = new THREE.EdgesGeometry(boxGeo);
  var lineMat = new THREE.LineBasicMaterial({ color: 0xff5f1f, transparent: true, opacity: 0.4 });
  var wireBox = new THREE.LineSegments(edges, lineMat);
  wireBox.position.set(0, 0, 0);
  scene.add(wireBox);

  // Terminal screen plane
  var screenGeo = new THREE.PlaneGeometry(9.2, 5.2);
  var screenMat = new THREE.MeshBasicMaterial({ color: 0x0a0a0a, transparent: true, opacity: 0.6, side: THREE.DoubleSide });
  var screen = new THREE.Mesh(screenGeo, screenMat);
  screen.position.set(0, 0, 1.51);
  scene.add(screen);

  // Terminal lines (code simulation)
  var lineCount = 8;
  var lineSpacing = 0.5;
  for (var i = 0; i < lineCount; i++) {
    var lGeo = new THREE.PlaneGeometry(7 - i * 0.4, 0.08);
    var lMat = new THREE.MeshBasicMaterial({ color: 0xff5f1f, transparent: true, opacity: 0.25 - i * 0.02 });
    var line = new THREE.Mesh(lGeo, lMat);
    line.position.set(-2.5 + i * 0.3, 1.8 - i * lineSpacing, 1.55);
    scene.add(line);
  }

  // Connection lines from terminal to layers
  var connMat = new THREE.LineBasicMaterial({ color: 0xff5f1f, transparent: true, opacity: 0.2 });
  var connPoints1 = [new THREE.Vector3(0, 3, 0), new THREE.Vector3(0, 6, 0)];
  var connGeo1 = new THREE.BufferGeometry().setFromPoints(connPoints1);
  scene.add(new THREE.Line(connGeo1, connMat));

  // Project Memory Layer (top)
  var pmGeo = new THREE.BoxGeometry(6, 0.6, 4);
  var pmEdges = new THREE.EdgesGeometry(pmGeo);
  var pmMat = new THREE.LineBasicMaterial({ color: 0xff5f1f, transparent: true, opacity: 0.8 });
  var projectMem = new THREE.LineSegments(pmEdges, pmMat);
  projectMem.position.set(0, 6, 0);
  scene.add(projectMem);

  // Project memory fill
  var pmFillMat = new THREE.MeshBasicMaterial({ color: 0xff5f1f, transparent: true, opacity: 0.05 });
  var pmFill = new THREE.Mesh(pmGeo, pmFillMat);
  pmFill.position.set(0, 6, 0);
  scene.add(pmFill);

  // Project memory label
  var label1 = makeTextSprite('PROJECT MEMORY', { fontSize: 10, color: '#ff5f1f' });
  label1.position.set(0, 7.1, 0);
  scene.add(label1);

  // Session Memory Layer (middle floating)
  var smGeo = new THREE.BoxGeometry(5, 0.5, 3.5);
  var smEdges = new THREE.EdgesGeometry(smGeo);
  var smMat = new THREE.LineBasicMaterial({ color: 0xd44000, transparent: true, opacity: 0.7 });
  var sessionMem = new THREE.LineSegments(smEdges, smMat);
  sessionMem.position.set(-1, 9, 0);
  scene.add(sessionMem);

  var smFillMat = new THREE.MeshBasicMaterial({ color: 0xd44000, transparent: true, opacity: 0.04 });
  var smFill = new THREE.Mesh(smGeo, smFillMat);
  smFill.position.set(-1, 9, 0);
  scene.add(smFill);

  var label2 = makeTextSprite('SESSION MEMORY', { fontSize: 9, color: '#d44000' });
  label2.position.set(-1, 10, 0);
  scene.add(label2);

  // Long-term Memory Layer (topmost, smaller)
  var ltGeo = new THREE.BoxGeometry(4, 0.4, 3);
  var ltEdges = new THREE.EdgesGeometry(ltGeo);
  var ltMat = new THREE.LineBasicMaterial({ color: 0xff5f1f, transparent: true, opacity: 0.5 });
  var longTermMem = new THREE.LineSegments(ltEdges, ltMat);
  longTermMem.position.set(1.5, 12, 0);
  scene.add(longTermMem);

  var ltFillMat = new THREE.MeshBasicMaterial({ color: 0xff5f1f, transparent: true, opacity: 0.03 });
  var ltFill = new THREE.Mesh(ltGeo, ltFillMat);
  ltFill.position.set(1.5, 12, 0);
  scene.add(ltFill);

  var label3 = makeTextSprite('LONG-TERM (CLAUDE.md)', { fontSize: 8, color: '#ff5f1f' });
  label3.position.set(1.5, 12.9, 0);
  scene.add(label3);

  // Connection lines between layers
  var conn2Points = [new THREE.Vector3(0, 6.3, 0), new THREE.Vector3(-1, 8.75, 0)];
  var conn2Geo = new THREE.BufferGeometry().setFromPoints(conn2Points);
  scene.add(new THREE.Line(conn2Geo, new THREE.LineBasicMaterial({ color: 0xd44000, transparent: true, opacity: 0.3 })));

  var conn3Points = [new THREE.Vector3(-0.5, 9.25, 0), new THREE.Vector3(1.3, 11.8, 0)];
  var conn3Geo = new THREE.BufferGeometry().setFromPoints(conn3Points);
  scene.add(new THREE.Line(conn3Geo, new THREE.LineBasicMaterial({ color: 0xff5f1f, transparent: true, opacity: 0.2 })));

  // Floating particles around layers
  var particleCount = 80;
  var positions = new Float32Array(particleCount * 3);
  for (var p = 0; p < particleCount; p++) {
    positions[p * 3] = (Math.random() - 0.5) * 20;
    positions[p * 3 + 1] = Math.random() * 16;
    positions[p * 3 + 2] = (Math.random() - 0.5) * 12;
  }
  var pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  var pMat = new THREE.PointsMaterial({ color: 0xff5f1f, size: 0.08, transparent: true, opacity: 0.4 });
  var particles = new THREE.Points(pGeo, pMat);
  scene.add(particles);

  // Subtle grid floor
  var gridHelper = new THREE.GridHelper(30, 30, 0xff5f1f, 0x1a0800);
  gridHelper.position.y = -3.5;
  gridHelper.material.opacity = 0.08;
  gridHelper.material.transparent = true;
  scene.add(gridHelper);

  // Animation
  var time = 0;
  function animate() {
    requestAnimationFrame(animate);
    time += 0.005;

    // Gentle bob for floating layers
    projectMem.position.y = 6 + Math.sin(time * 0.8) * 0.15;
    sessionMem.position.y = 9 + Math.sin(time * 1.1 + 1) * 0.2;
    longTermMem.position.y = 12 + Math.sin(time * 0.6 + 2) * 0.12;

    // Screen flicker
    screen.material.opacity = 0.55 + Math.sin(time * 3) * 0.05;

    particles.rotation.y = time * 0.03;

    controls.update();
    renderer.render(scene, camera);
  }

  // Text sprite helper
  function makeTextSprite(text, opts) {
    opts = opts || {};
    var fontSize = opts.fontSize || 12;
    var color = opts.color || '#ffffff';

    var canvas = document.createElement('canvas');
    canvas.width = 512;
    canvas.height = 64;
    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 512, 64);
    ctx.font = 'bold ' + fontSize + 'px Courier New';
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 256, 32);

    var tex = new THREE.CanvasTexture(canvas);
    var mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.9 });
    var sprite = new THREE.Sprite(mat);
    sprite.scale.set(5, 0.6, 1);
    return sprite;
  }

  animate();

  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();
</script>
</body>
</html>
