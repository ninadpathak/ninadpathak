<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding Critical Path</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-1: #ffffff;
            --bg-2: #efefed;
            --border: #e0e0dc;
            --text-1: #0e0e0e;
            --text-2: #3a3a3a;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --bg-2: #1a1a1a;
                --border: #1e1e1e;
                --text-1: #f0f0f0;
                --text-2: #c2c2c2;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }

        body { 
            margin: 0; 
            background: var(--bg-1); 
            font-family: var(--sans); 
            color: var(--text-1);
            overflow: hidden; 
        }

        #label {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-3);
            text-transform: uppercase;
        }

        .node-label {
            position: absolute;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-1);
            background: var(--bg-2);
            padding: 4px 8px;
            border: 1px solid var(--border);
            transform: translate(-50%, -50%);
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="label">onboarding critical path // dependency layers</div>
    
    <div id="node-1" class="node-label">1. ENVIRONMENT (SDK, Runtimes, Seeds)</div>
    <div id="node-2" class="node-label">2. WORKFLOW (PRs, Tests, Deploy)</div>
    <div id="node-3" class="node-label">3. ARCHITECTURE (Data Flow, Services)</div>

    <script>
        const scene = new THREE.Scene();
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        scene.background = new THREE.Color(isDark ? 0x111111 : 0xffffff);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const nodes = [
            { y: -3, label: 'node-1', color: 0x888888 },
            { y: 0, label: 'node-2', color: 0xaaaaaa },
            { y: 3, label: 'node-3', color: isDark ? 0xff5f1f : 0xd44000 }
        ];

        const nodeMeshes = [];
        nodes.forEach(n => {
            const geo = new THREE.BoxGeometry(4, 0.5, 4);
            const mat = new THREE.MeshBasicMaterial({ color: n.color, wireframe: false, transparent: true, opacity: 0.8 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = n.y;
            scene.add(mesh);
            nodeMeshes.push(mesh);
            n.mesh = mesh;

            const wireGeo = new THREE.EdgesGeometry(geo);
            const wireMat = new THREE.LineBasicMaterial({ color: isDark ? 0x333333 : 0xdddddd });
            const wire = new THREE.LineSegments(wireGeo, wireMat);
            mesh.add(wire);
        });

        // Connecting pillars
        const pillarGeo = new THREE.CylinderGeometry(0.05, 0.05, 3);
        const pillarMat = new THREE.MeshBasicMaterial({ color: isDark ? 0x222222 : 0xeeeeee });
        
        const pillarPositions = [
            { x: 1.8, z: 1.8 }, { x: -1.8, z: 1.8 }, { x: 1.8, z: -1.8 }, { x: -1.8, z: -1.8 }
        ];

        pillarPositions.forEach(p => {
            const p1 = new THREE.Mesh(pillarGeo, pillarMat);
            p1.position.set(p.x, -1.5, p.z);
            scene.add(p1);

            const p2 = new THREE.Mesh(pillarGeo, pillarMat);
            p2.position.set(p.x, 1.5, p.z);
            scene.add(p2);
        });

        camera.position.z = 10;
        camera.position.y = 2;
        camera.lookAt(0, 0, 0);

        function updateLabels() {
            nodes.forEach(n => {
                const vector = n.mesh.position.clone();
                vector.project(camera);
                const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                const y = (vector.y * -0.5 + 0.5) * window.innerHeight;
                const el = document.getElementById(n.label);
                el.style.left = x + 'px';
                el.style.top = y + 'px';
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            scene.rotation.y += 0.005;
            
            const time = Date.now() * 0.001;
            nodeMeshes.forEach((m, i) => {
                m.position.y = nodes[i].y + Math.sin(time + i) * 0.1;
            });

            updateLabels();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
