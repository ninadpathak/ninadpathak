<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Decay | Ninad Pathak</title>
  <link rel="stylesheet" href="/static/css/visuals-base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .decay-stage { 
      flex: 1; 
      border-left: 1px solid var(--border); 
      border-bottom: 1px solid var(--border); 
      position: relative; 
      margin: 20px 0 40px 60px;
    }
    .curve { fill: none; stroke: var(--accent); stroke-width: 3; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 3s forwards ease-in-out; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    
    .point { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; position: absolute; transform: translate(-50%, -50%); box-shadow: 0 0 15px var(--accent); }
    .label-dot { font-family: var(--mono); font-size: 10px; position: absolute; color: var(--text); background: var(--bg); padding: 2px 6px; border: 1px solid var(--border); white-space: nowrap; transform: translate(15px, -50%); font-weight: 500; }
    
    .axis-label { position: absolute; font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
  </style>
</head>
<body>
  <div class="viz-container">
    <div class="header-meta">
      <div>
        <div class="label">// Active_Forgetting</div>
        <h1 class="title">Ebbinghaus Memory Decay</h1>
      </div>
      <div class="label" style="color: var(--text-dim);">Salience_Filtering</div>
    </div>
    
    <div class="decay-stage">
      <svg width="100%" height="100%" viewBox="0 0 500 250" preserveAspectRatio="none">
        <path class="curve" d="M 0 30 Q 150 220 500 240" />
      </svg>
      <div class="point" style="left: 0; top: 30px;"></div>
      <div class="label-dot" style="left: 0; top: 30px;">NEW_EPISODE</div>
      
      <div class="point" style="left: 200px; top: 180px;"></div>
      <div class="label-dot" style="left: 200px; top: 180px;">CONSOLIDATION_TH</div>
      
      <div class="point" style="left: 500px; top: 240px;"></div>
      <div class="label-dot" style="left: 400px; top: 220px;">EVICTION_READY</div>

      <div class="axis-label" style="bottom: -25px; left: 0;">TIME_ELAPSED</div>
      <div class="axis-label" style="top: 50%; left: -75px; transform: rotate(-90deg) translateY(-50%);">WEIGHT_ACTIVATION</div>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot"></div> DECAY_RATE: 0.04/h</div>
      <div class="status-item">SET_SIZE: 4,200</div>
      <div class="status-item">AUTO_CLEAN: ENABLED</div>
    </div>
  </div>
<script>function sendHeight(){const h=document.body.scrollHeight;window.parent.postMessage({type:"resize-iframe",height:h},"*")}window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);new ResizeObserver(sendHeight).observe(document.body);</script></body>
</html>
