<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speculative Decoding Animation | Ninad Pathak</title>
  <link rel="stylesheet" href="/static/css/visuals-base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .loop { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 40px; width: 100%; max-width: 600px; margin: 0 auto; }
    
    .model-row { display: flex; align-items: center; gap: 20px; }
    .model-label { width: 120px; font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 600; }
    .token-track { flex: 1; height: 50px; border: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; gap: 8px; background: rgba(0,0,0,0.02); }
    
    .token { font-family: var(--mono); font-size: 11px; padding: 6px 10px; border: 1px solid var(--border); background: var(--bg); opacity: 0; transform: translateY(10px); transition: all 0.3s; color: var(--text-dim); }
    .token.show { opacity: 1; transform: translateY(0); }
    .token.verified { border-color: var(--accent); color: var(--bg); background: var(--accent); font-weight: 600; box-shadow: 0 4px 8px rgba(212, 64, 0, 0.2); }
    .token.rejected { border-color: var(--text); color: var(--text); background: var(--bg); opacity: 0.3; text-decoration: line-through; }

    @media (max-width: 600px) {
      .model-row { flex-direction: column; align-items: flex-start; gap: 10px; }
      .model-label { width: auto; }
      .token-track { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="viz-container">
    <div class="header-meta">
      <div>
        <div class="label">// Parallel_Compute</div>
        <h1 class="title">Speculative Decoding Loop</h1>
      </div>
      <div class="label" style="color: var(--text-dim);">Draft_and_Verify</div>
    </div>

    <div class="loop">
      <div class="model-row">
        <div class="model-label">Draft Model (Fast)</div>
        <div class="token-track" id="draft-track"></div>
      </div>
      <div class="model-row">
        <div class="model-label" style="color: var(--accent);">Target Model (Slow)</div>
        <div class="token-track" id="target-track"></div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot pulse"></div> <span id="status">DRAFTING...</span></div>
      <div class="status-item" style="margin-left: auto;">SPEEDUP: ~2.4x</div>
    </div>
  </div>

  <script>
    const dTrack = document.getElementById('draft-track');
    const tTrack = document.getElementById('target-track');
    const status = document.getElementById('status');
    const words = ["The", "quick", "brown", "fox", "jumps", "over"];

    async function run() {
      dTrack.innerHTML = '';
      tTrack.innerHTML = '';
      status.innerText = "DRAFTING_TOKENS...";
      
      // 1. Drafting
      for(let i=0; i<4; i++) {
        const t = document.createElement('div');
        t.className = 'token';
        t.innerText = words[i];
        dTrack.appendChild(t);
        setTimeout(() => t.classList.add('show'), i * 150);
      }
      
      await new Promise(r => setTimeout(r, 1200));
      status.innerText = "VERIFYING_PARALLEL...";
      
      // 2. Verifying
      for(let i=0; i<4; i++) {
        const t = document.createElement('div');
        t.className = 'token show verified';
        t.innerText = words[i];
        tTrack.appendChild(t);
        dTrack.children[i].classList.add('verified');
        await new Promise(r => setTimeout(r, 200));
      }
      
      status.innerText = "ACCEPTED. 1_STEP_OVERHEAD.";
      await new Promise(r => setTimeout(r, 2000));
      run();
    }

    run();
  </script>
<script>function sendHeight(){const h=document.body.scrollHeight;window.parent.postMessage({type:"resize-iframe",height:h},"*")}window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);new ResizeObserver(sendHeight).observe(document.body);</script></body>
</html>
