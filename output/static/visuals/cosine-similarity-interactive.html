<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosine Similarity | Ninad Pathak</title>
  <link rel="stylesheet" href="/static/css/visuals-base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .math-stage { display: flex; gap: 40px; align-items: center; padding: 20px 0; min-height: 350px; }
    #viz { flex: 1; height: 350px; position: relative; }
    #ui { width: 220px; border-left: 1px solid var(--border); padding-left: 40px; height: 350px; display: flex; flex-direction: column; justify-content: center; }
    
    .stat { margin-bottom: 24px; }
    .stat-val { font-family: var(--mono); font-size: 28px; color: var(--accent); font-weight: 600; letter-spacing: -0.05em; }
    .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-top: 4px; }
    
    .relationship { font-size: 12px; color: var(--text); line-height: 1.5; margin-top: 20px; font-weight: 500; }
    
    @media (max-width: 600px) {
      .math-stage { flex-direction: column; min-height: auto; }
      #ui { width: 100%; border-left: none; border-top: 1px solid var(--border); padding-left: 0; padding-top: 30px; height: auto; }
      #viz { width: 100%; height: 300px; }
    }
  </style>
</head>
<body>
  <div class="viz-container">
    <div class="header-meta">
      <div>
        <div class="label">// Vector_Arithmetic</div>
        <h1 class="title">Cosine Similarity</h1>
      </div>
      <div class="label" style="color: var(--text-dim);">Unit_Sphere_Math</div>
    </div>

    <div class="math-stage">
      <div id="viz">
        <canvas id="canvas"></canvas>
      </div>
      <div id="ui">
        <div class="stat">
          <div id="similarity" class="stat-val">1.000</div>
          <div class="stat-label">Similarity (cos θ)</div>
        </div>
        <div class="stat">
          <div id="angle" class="stat-val">0°</div>
          <div class="stat-label">Angular Dist (θ)</div>
        </div>
        <div class="relationship" id="relationship">V1 and V2 are semantically identical.</div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot pulse"></div> INTERACTIVE: ENABLED</div>
      <div class="status-item">DRAG_VECTOR_HEADS</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const simEl = document.getElementById('similarity');
    const angleEl = document.getElementById('angle');
    const relEl = document.getElementById('relationship');

    let width, height, centerX, centerY, radius;
    let v1 = { x: 1, y: 0 };
    let v2 = { x: 0.8, y: 0.6 };
    let dragging = null;

    function resize() {
      const parent = canvas.parentElement;
      width = parent.clientWidth;
      height = parent.clientHeight;
      canvas.width = width * window.devicePixelRatio;
      canvas.height = height * window.devicePixelRatio;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
      
      centerX = width / 2;
      centerY = height / 2;
      radius = Math.min(width, height) * 0.4;
    }

    function draw() {
      const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      ctx.clearRect(0, 0, width, height);

      ctx.strokeStyle = isDark ? '#1e1e1e' : '#e0e0dc';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(centerX - radius - 20, centerY); ctx.lineTo(centerX + radius + 20, centerY);
      ctx.moveTo(centerX, centerY - radius - 20); ctx.lineTo(centerX, centerY + radius + 20);
      ctx.stroke();

      ctx.strokeStyle = isDark ? '#222' : '#f0f0f0';
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
      ctx.stroke();

      drawVector(v1, isDark ? '#444' : '#ccc');
      drawVector(v2, isDark ? '#ff5f1f' : '#d44000');

      requestAnimationFrame(draw);
    }

    function drawVector(v, color) {
      const tx = centerX + v.x * radius;
      const ty = centerY - v.y * radius;
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(centerX, centerY); ctx.lineTo(tx, ty);
      ctx.stroke();
      const angle = Math.atan2(-v.y, v.x);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(tx - 12 * Math.cos(angle - 0.5), ty - 12 * Math.sin(angle - 0.5));
      ctx.lineTo(tx - 12 * Math.cos(angle + 0.5), ty - 12 * Math.sin(angle + 0.5));
      ctx.fill();
    }

    function updateStats() {
      const dot = v1.x * v2.x + v1.y * v2.y;
      const mag1 = Math.sqrt(v1.x**2 + v1.y**2);
      const mag2 = Math.sqrt(v2.x**2 + v2.y**2);
      const similarity = dot / (mag1 * mag2);
      simEl.innerText = similarity.toFixed(3);
      const degrees = Math.acos(Math.max(-1, Math.min(1, similarity))) * (180 / Math.PI);
      angleEl.innerText = Math.round(degrees) + '°';

      if (similarity > 0.95) relEl.innerText = "Vectors are semantically identical.";
      else if (similarity > 0.7) relEl.innerText = "Strong relationship detected.";
      else if (similarity > 0.3) relEl.innerText = "Moderate context overlap.";
      else if (similarity > -0.1 && similarity < 0.1) relEl.innerText = "Orthogonal (Unrelated).";
      else relEl.innerText = "Low relationship.";
    }

    canvas.addEventListener('mousedown', e => {
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left - centerX) / radius;
      const y = -(e.clientY - rect.top - centerY) / radius;
      if (Math.sqrt((x - v1.x)**2 + (y - v1.y)**2) < 0.3) dragging = 'v1';
      else if (Math.sqrt((x - v2.x)**2 + (y - v2.y)**2) < 0.3) dragging = 'v2';
    });

    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      const rect = canvas.getBoundingClientRect();
      let x = (e.clientX - rect.left - centerX) / radius;
      let y = -(e.clientY - rect.top - centerY) / radius;
      const mag = Math.sqrt(x**2 + y**2);
      x /= mag; y /= mag;
      if (dragging === 'v1') { v1.x = x; v1.y = y; } else { v2.x = x; v2.y = y; }
      updateStats();
    });

    window.addEventListener('mouseup', () => dragging = null);
    window.addEventListener('resize', resize);
    resize(); updateStats(); draw();
  </script>
<script>function sendHeight(){const h=document.body.scrollHeight;window.parent.postMessage({type:"resize-iframe",height:h},"*")}window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);new ResizeObserver(sendHeight).observe(document.body);</script></body>
</html>
