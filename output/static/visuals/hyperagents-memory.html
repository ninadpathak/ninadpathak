<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HyperAgent Memory - Visual</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; font-family: monospace; }
  canvas { display: block; }
  #label {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: #ff5f1f;
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.7;
  }
  #tagline {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: #d44000;
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    opacity: 0.5;
  }
</style>
</head>
<body>
<div id="tagline">memory architecture</div>
<div id="label">HyperAgent</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 4, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0a0a);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 6;
controls.maxDistance = 25;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.6;

// Central node - HyperAgent core
const coreGeo = new THREE.IcosahedronGeometry(1.2, 2);
const coreMat = new THREE.MeshBasicMaterial({ color: 0xff5f1f, wireframe: true, transparent: true, opacity: 0.9 });
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

// Inner glow sphere
const innerGeo = new THREE.IcosahedronGeometry(0.6, 1);
const innerMat = new THREE.MeshBasicMaterial({ color: 0xd44000, wireframe: false, transparent: true, opacity: 0.3 });
const inner = new THREE.Mesh(innerGeo, innerMat);
scene.add(inner);

// Orbital rings
const ringMat = new THREE.LineBasicMaterial({ color: 0xff5f1f, transparent: true, opacity: 0.15 });
const ringData = [
  { radius: 3.5, tiltX: 0, tiltZ: 0 },
  { radius: 4.5, tiltX: Math.PI / 4, tiltZ: 0 },
  { radius: 5.0, tiltX: 0, tiltZ: Math.PI / 3 }
];

ringData.forEach(({ radius, tiltX, tiltZ }) => {
  const ringGeo = new THREE.RingGeometry(radius, radius + 0.02, 128);
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = tiltX;
  ring.rotation.z = tiltZ;
  scene.add(ring);
});

// Orbiting spheres - memory layers
const orbitRadii = [3.5, 4.5, 5.0];
const sphereColors = [0xff5f1f, 0xd44000, 0xff5f1f];
const sphereSizes = [0.25, 0.18, 0.3];
const sphereCounts = [4, 6, 3];

const orbiters = [];

orbitRadii.forEach((radius, li) => {
  const count = sphereCounts[li];
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2;
    const geo = new THREE.IcosahedronGeometry(sphereSizes[li], 1);
    const mat = new THREE.MeshBasicMaterial({ color: sphereColors[li], wireframe: true, transparent: true, opacity: 0.7 });
    const mesh = new THREE.Mesh(geo, mat);

    const pivot = new THREE.Object3D();
    const angleOffset = (li * Math.PI) / 6;
    pivot.rotation.x = (li * 0.4);
    pivot.rotation.y = angleOffset;
    mesh.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
    pivot.add(mesh);
    scene.add(pivot);

    orbiters.push({ mesh, pivot, radius, angleOffset, speed: 0.3 + li * 0.15 + i * 0.05 });
  }
});

// Floating particle field
const particleCount = 200;
const positions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  positions[i * 3] = (Math.random() - 0.5) * 20;
  positions[i * 3 + 1] = (Math.random() - 0.5) * 20;
  positions[i * 3 + 2] = (Math.random() - 0.5) * 20;
}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const pMat = new THREE.PointsMaterial({ color: 0xd44000, size: 0.05, transparent: true, opacity: 0.4 });
const particles = new THREE.Points(pGeo, pMat);
scene.add(particles);

let time = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.01;

  core.rotation.x += 0.003;
  core.rotation.y += 0.005;
  inner.rotation.x -= 0.005;
  inner.rotation.y -= 0.003;

  orbiters.forEach(({ mesh, pivot, radius, angleOffset, speed }) => {
    const angle = time * speed + angleOffset;
    mesh.position.set(Math.cos(angle) * radius, Math.sin(angle) * radius * 0.4, Math.sin(angle) * radius);
    mesh.rotation.x += 0.02;
    mesh.rotation.y += 0.015;
  });

  particles.rotation.y += 0.0005;

  controls.update();
  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
