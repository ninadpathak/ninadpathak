<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASM VDB ROI</title>
    <style>
        :root {
            --bg-1: #ffffff;
            --bg-2: #efefed;
            --border: #e0e0dc;
            --text-1: #0e0e0e;
            --text-2: #3a3a3a;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --bg-2: #1a1a1a;
                --border: #1e1e1e;
                --text-1: #f0f0f0;
                --text-2: #c2c2c2;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }

        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            background: var(--bg-1); 
            font-family: var(--sans); 
            color: var(--text-1);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container { 
            width: 100%; 
            height: 100%;
            padding: 1rem;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            height: auto;
            max-height: 100%;
            overflow: visible;
        }

        .bar-label { font-family: var(--mono); font-size: 22px; fill: var(--text-2); font-weight: 600; text-transform: uppercase; }
        .bar-val { font-family: var(--mono); font-size: 24px; fill: var(--accent); font-weight: 700; }
        .desc { font-family: var(--sans); font-size: 18px; fill: var(--text-3); }
        .chart-title { font-family: var(--mono); font-size: 26px; fill: var(--text-1); font-weight: 700; text-transform: uppercase; }
        
        .axis { stroke: var(--text-1); stroke-width: 2; vector-effect: non-scaling-stroke; }
    </style>
</head>
<body>
    <div class="container">
        <svg viewBox="0 0 1000 400" preserveAspectRatio="xMidYMid meet">
            <line x1="250" y1="80" x2="250" y2="300" class="axis" />
            <line x1="250" y1="300" x2="950" y2="300" class="axis" />
            
            <g>
                <text x="240" y="145" text-anchor="end" class="bar-label">Cloud VDB</text>
                <rect x="250" y="110" width="600" height="50" fill="var(--bg-2)" />
                <text x="860" y="145" class="bar-val">$$$ / Month</text>
                <text x="260" y="185" class="desc">Hosting & Data Egress</text>
            </g>

            <g>
                <text x="240" y="245" text-anchor="end" class="bar-label">Edge WASM</text>
                <rect x="250" y="210" width="40" height="50" fill="var(--accent)" />
                <text x="300" y="245" class="bar-val">$0 / Month</text>
                <text x="260" y="285" class="desc">Local execution</text>
            </g>

            <text x="500" y="40" text-anchor="middle" class="chart-title">Operational Cost Comparison</text>
        </svg>
    </div>
</body>
</html>
