<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Byte Pair Encoding</title>
    <style>
        :root {
            --bg-1: #ffffff;
            --text-1: #0e0e0e;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --text-1: #f0f0f0;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }
        
        body { margin: 0; height: 100vh; background: var(--bg-1); font-family: var(--mono); color: var(--text-1); overflow: hidden; display: flex; align-items: center; justify-content: center;}
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0;}
        
        .overlay {
            position: absolute;
            top: 2rem;
            left: 2rem;
            font-size: 12px;
            pointer-events: none;
            background: var(--bg-1);
            padding: 10px;
            border: 1px solid var(--text-3);
            z-index: 10;
        }
        .stat { color: var(--accent); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="overlay">
        Process: <span class="stat">Byte Pair Encoding (BPE)</span> <br>
        Word: <span class="stat">"unbelievable"</span> -> Tokens: <span class="stat">["un", "believ", "able"]</span>
        <div style="font-size: 10px; color: var(--text-3); margin-top: 8px;">Drag to rotate</div>
    </div>

    <script>
        const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const colorBg = isDark ? 0x111111 : 0xffffff;
        const colorPoint = isDark ? 0xff5f1f : 0xd44000;
        const colorText = isDark ? 0xffffff : 0x000000;
        const colorWire = isDark ? 0x444444 : 0xcccccc;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(colorBg);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Group to hold the blocks
        const group = new THREE.Group();
        scene.add(group);

        const createBlock = (width, xPos, label) => {
            const geo = new THREE.BoxGeometry(width, 1, 1);
            const edges = new THREE.EdgesGeometry(geo);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: colorText, linewidth: 2 }));
            
            const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: colorBg, transparent: true, opacity: 0.8 }));
            
            const blockGroup = new THREE.Group();
            blockGroup.add(mesh);
            blockGroup.add(line);
            blockGroup.position.x = xPos;
            
            return blockGroup;
        };

        // Create the initial full word block
        const fullBlock = createBlock(6, 0, "unbelievable");
        fullBlock.position.y = 2;
        group.add(fullBlock);

        // Create the token blocks
        const t1 = createBlock(1.5, -2.25, "un");
        const t2 = createBlock(2.5, 0, "believ");
        const t3 = createBlock(1.5, 2.25, "able");
        
        t1.position.y = -1;
        t2.position.y = -1;
        t3.position.y = -1;
        
        group.add(t1);
        group.add(t2);
        group.add(t3);

        // Add connecting lines
        const lineMat = new THREE.LineBasicMaterial({ color: colorPoint, transparent: true, opacity: 0.5 });
        
        const createLine = (startX, startY, endX, endY) => {
            const geo = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(startX, startY, 0),
                new THREE.Vector3(endX, endY, 0)
            ]);
            return new THREE.Line(geo, lineMat);
        };

        group.add(createLine(-2.25, 1.5, -2.25, -0.5));
        group.add(createLine(0, 1.5, 0, -0.5));
        group.add(createLine(2.25, 1.5, 2.25, -0.5));

        let time = 0;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Gentle floating
            group.position.y = Math.sin(time) * 0.2;
            
            // Pulsing tokens
            const scale = 1 + Math.sin(time * 2) * 0.05;
            t1.scale.set(scale, scale, scale);
            t2.scale.set(scale, scale, scale);
            t3.scale.set(scale, scale, scale);

            time += 0.02;
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
