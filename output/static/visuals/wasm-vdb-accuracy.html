<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASM VDB Accuracy</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #0e0e0e;
            --text-dim: #888888;
            --accent: #d44000;
            --border: #e0e0dc;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111111;
                --text: #f0f0f0;
                --text-dim: #6a6a6a;
                --accent: #ff5f1f;
                --border: #1e1e1e;
            }
        }
        body { text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { width: 95%; max-width: 1000px; padding: 40px; background: var(--bg); }
        svg { width: 100%; height: auto; overflow: visible; }
        .axis { vector-effect: non-scaling-stroke; stroke: var(--text); stroke-width: 3.0; }
        .grid { vector-effect: non-scaling-stroke; stroke: var(--border); stroke-width: 2.5; stroke-dasharray: 4; }
        .point { fill: var(--accent); stroke: var(--bg); stroke-width: 2; }
        .label { font-family: var(--mono); font-size: 18px; fill: var(--text); font-weight: 600; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <svg viewBox="-300 -80 1200 650">
            <!-- Grid -->
            <line x1="0" y1="100" x2="800" y2="100" class="grid" />
            <line x1="0" y1="200" x2="800" y2="200" class="grid" />
            <line x1="0" y1="300" x2="800" y2="300" class="grid" />
            
            <!-- Axes -->
            <line x1="0" y1="400" x2="800" y2="400" class="axis" />
            <line x1="0" y1="0" x2="0" y2="400" class="axis" />
            
            <!-- Curve -->
            <path d="M 0 0 Q 400 20 800 350" fill="none" stroke="var(--accent)" stroke-width="4" />
            
            <!-- Points -->
            <circle cx="0" cy="0" r="8" class="point" />
            <text x="20" y="10" class="label">Float32 (100%)</text>
            
            <circle cx="200" cy="15" r="8" class="point" />
            <text x="220" y="25" class="label">int8 (99.8%)</text>
            
            <circle cx="800" cy="350" r="8" class="point" />
            <text x="700" y="330" text-anchor="end" class="label">Binary (92%)</text>
            
            <text x="400" y="480" text-anchor="middle" class="label" style="font-size: 24px;">Recall Accuracy vs Quantization Level</text>
            <text x="400" y="520" text-anchor="middle" class="label" style="font-size: 18px; fill: var(--text-dim);">X: Memory Reduction | Y: Accuracy Loss</text>
        </svg>
    </div>
</body>
</html>
