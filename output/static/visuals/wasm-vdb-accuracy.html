<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASM VDB Accuracy</title>
    <style>
        :root {
            --bg-1: #ffffff;
            --bg-2: #efefed;
            --border: #e0e0dc;
            --text-1: #0e0e0e;
            --text-2: #3a3a3a;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --bg-2: #1a1a1a;
                --border: #1e1e1e;
                --text-1: #f0f0f0;
                --text-2: #c2c2c2;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }

        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            background: var(--bg-1); 
            font-family: var(--sans); 
            color: var(--text-1);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container { 
            width: 100%; 
            height: 100%;
            padding: 1.5rem;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            height: auto;
            max-height: 100%;
            overflow: visible;
        }

        .label { font-family: var(--mono); font-size: 11px; fill: var(--text-2); font-weight: 600; text-transform: uppercase; }
        .desc { font-family: var(--sans); font-size: 11px; fill: var(--text-3); }
        .axis { stroke: var(--text-1); stroke-width: 1.5; fill: none; }
        .grid { stroke: var(--border); stroke-width: 1; stroke-dasharray: 2; }
        .point { fill: var(--accent); stroke: var(--bg-1); stroke-width: 2; }
    </style>
</head>
<body>
    <div class="container">
        <svg viewBox="0 0 1000 450" preserveAspectRatio="xMidYMid meet">
            <!-- Grid Lines -->
            <line x1="100" y1="50" x2="100" y2="350" class="axis" />
            <line x1="100" y1="350" x2="750" y2="350" class="axis" />
            
            <line x1="100" y1="50" x2="750" y2="50" class="grid" />
            <line x1="100" y1="200" x2="750" y2="200" class="grid" />
            
            <!-- Labels -->
            <text x="50" y="200" text-anchor="middle" transform="rotate(-90 50,200)" class="label">Recall Accuracy (%)</text>
            <text x="425" y="400" text-anchor="middle" class="label">Memory Reduction Level</text>
            
            <text x="90" y="55" text-anchor="end" class="desc">100%</text>
            <text x="90" y="205" text-anchor="end" class="desc">95%</text>
            <text x="90" y="355" text-anchor="end" class="desc">90%</text>

            <!-- Curve -->
            <path d="M 100 50 Q 250 52 750 290" fill="none" stroke="var(--accent)" stroke-width="3" />
            
            <!-- Points -->
            <g>
                <circle cx="100" cy="50" r="6" class="point" />
                <text x="110" y="45" class="label">Float32 (100%)</text>
                <text x="110" y="65" class="desc">Baseline</text>
            </g>
            
            <g>
                <circle cx="250" cy="52" r="6" class="point" />
                <text x="260" y="47" class="label">int8 (99.8%)</text>
                <text x="260" y="67" class="desc">4x Reduction</text>
            </g>
            
            <g>
                <circle cx="750" cy="290" r="6" class="point" />
                <text x="760" y="280" text-anchor="start" class="label" style="fill: var(--accent);">Binary (92%)</text>
                <text x="760" y="300" text-anchor="start" class="desc">32x Reduction</text>
            </g>
            
            <!-- Summary Title -->
            <text x="425" y="30" text-anchor="middle" class="label" style="font-size: 16px; fill: var(--text-1);">The Accuracy-Efficiency Frontier</text>
        </svg>
    </div>
</body>
</html>
