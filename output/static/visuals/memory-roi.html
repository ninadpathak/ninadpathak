<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory ROI | Ninad Pathak</title>
  <link rel="stylesheet" href="/static/css/visuals-base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .roi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 10px; }
    .roi-box { border: 1px solid var(--border); padding: 30px; text-align: center; background: var(--bg); position: relative; overflow: hidden; }
    .roi-box::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent); opacity: 0.3; }
    
    .roi-val { font-size: 36px; font-weight: 800; color: var(--accent); margin-bottom: 4px; letter-spacing: -0.03em; }
    .roi-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
    
    .comparison { margin-top: 40px; display: flex; flex-direction: column; gap: 20px; padding: 20px; border: 1px solid var(--border); background: rgba(0,0,0,0.01); }
    .bar-row { display: grid; grid-template-columns: 100px 1fr; align-items: center; gap: 20px; }
    .track { height: 24px; background: var(--bg); border: 1px solid var(--border); position: relative; }
    .fill { height: 100%; background: var(--accent); width: 0%; transition: width 1.5s cubic-bezier(0.16, 1, 0.3, 1); }
    .bar-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-align: right; }
  </style>
</head>
<body>
  <div class="viz-container">
    <div class="header-meta">
      <div>
        <div class="label">// Economics_of_State</div>
        <h1 class="title">The ROI of Memory</h1>
      </div>
      <div class="label" style="color: var(--text-dim);">Infrastructure_Efficiency</div>
    </div>
    
    <div class="roi-grid">
      <div class="roi-box">
        <div class="roi-val">-65%</div>
        <div class="roi-label">Inference_Latency</div>
      </div>
      <div class="roi-box">
        <div class="roi-val">4.2x</div>
        <div class="roi-label">User_Retention</div>
      </div>
    </div>

    <div class="comparison">
      <div class="bar-row">
        <div class="bar-label">STATELESS</div>
        <div class="track"><div class="fill" style="width: 100%; opacity: 0.2;"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-label">STATEFUL</div>
        <div class="track"><div id="f1" class="fill"></div></div>
      </div>
      <div style="font-size: 9px; color: #888; text-align: right; font-family: var(--mono); margin-top: 10px;">METRIC: TOKENS_PER_SESSION_AVG</div>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot"></div> SAVINGS: $4,200/mo</div>
      <div class="status-item">COMPRESSION: 4:1</div>
    </div>
  </div>

  <script>
    setTimeout(() => {
      document.getElementById('f1').style.width = '25%';
    }, 500);
  </script>
<script>function sendHeight(){const h=document.body.scrollHeight;window.parent.postMessage({type:"resize-iframe",height:h},"*")}window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);new ResizeObserver(sendHeight).observe(document.body);</script></body>
</html>
