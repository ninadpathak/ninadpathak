<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated MoE Topology | Ninad Pathak</title>
  <link rel="stylesheet" href="/static/css/visuals-base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .moe-stage { flex: 1; border: 1px solid var(--border); position: relative; overflow: hidden; background: var(--bg); margin-top: 10px; display: flex; align-items: center; justify-content: center; }
    
    canvas { background: transparent; cursor: crosshair; }
    
    .overlay-ui { position: absolute; top: 20px; left: 20px; font-family: var(--mono); font-size: 10px; color: var(--accent); pointer-events: none; }
    
    .legend { position: absolute; bottom: 20px; right: 20px; font-family: var(--mono); font-size: 9px; color: var(--text-dim); text-align: right; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="viz-container">
    <div class="header-meta">
      <div>
        <div class="label">// Sparse_Activation_Pathways</div>
        <h1 class="title">Mixture of Experts Topology</h1>
      </div>
      <div class="label" style="color: var(--text-dim);">Routed_Inference</div>
    </div>

    <div class="moe-stage" id="container">
      <div class="overlay-ui">SYSTEM_STATUS: ROUTING_ACTIVE</div>
      <canvas id="moeCanvas"></canvas>
      <div class="legend">
        ● ACTIVE_EXPERT (VERMILLION)<br>
        ○ INACTIVE_EXPERT (NEUTRAL)
      </div>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot pulse"></div> ENGINE: DEEPSEEK_V3</div>
      <div class="status-item">SPARSITY: 37B / 671B</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('moeCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('container');

    let width, height;
    const experts = [];
    const tokens = [];
    const numExperts = 16;
    const activePerToken = 2;

    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const accentColor = isDark ? '#ff5f1f' : '#d44000';
    const borderColor = isDark ? '#1e1e1e' : '#e0e0dc';

    function resize() {
      width = container.clientWidth;
      height = container.clientHeight;
      canvas.width = width * window.devicePixelRatio;
      canvas.height = height * window.devicePixelRatio;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
      initExperts();
    }

    function initExperts() {
      experts.length = 0;
      const radius = Math.min(width, height) * 0.35;
      for (let i = 0; i < numExperts; i++) {
        const angle = (i / numExperts) * Math.PI * 2;
        experts.push({
          x: width / 2 + Math.cos(angle) * radius,
          y: height / 2 + Math.sin(angle) * radius,
          active: false,
          lastActive: 0
        });
      }
    }

    function spawnToken() {
      const startX = width / 2;
      const startY = height / 2;
      
      const targetIndices = [];
      while(targetIndices.length < activePerToken) {
        const idx = Math.floor(Math.random() * numExperts);
        if(!targetIndices.includes(idx)) targetIndices.push(idx);
      }

      targetIndices.forEach(idx => {
        tokens.push({
          x: startX,
          y: startY,
          targetIdx: idx,
          progress: 0,
          speed: 0.02 + Math.random() * 0.01
        });
      });
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);

      // Draw Router Core
      ctx.beginPath();
      ctx.arc(width/2, height/2, 10, 0, Math.PI*2);
      ctx.fillStyle = accentColor;
      ctx.fill();

      // Draw Experts
      experts.forEach((exp, i) => {
        const timeSinceActive = Date.now() - exp.lastActive;
        const isActive = timeSinceActive < 500;
        
        ctx.beginPath();
        ctx.arc(exp.x, exp.y, 6, 0, Math.PI*2);
        ctx.strokeStyle = isActive ? accentColor : borderColor;
        ctx.lineWidth = 2;
        ctx.stroke();
        
        if (isActive) {
          ctx.fillStyle = accentColor;
          ctx.globalAlpha = Math.max(0, 1 - (timeSinceActive / 500));
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      });

      // Draw Tokens
      for (let i = tokens.length - 1; i >= 0; i--) {
        const t = tokens[i];
        t.progress += t.speed;
        
        const target = experts[t.targetIdx];
        t.x = width/2 + (target.x - width/2) * t.progress;
        t.y = height/2 + (target.y - height/2) * t.progress;

        // Trace
        ctx.beginPath();
        ctx.moveTo(width/2, height/2);
        ctx.lineTo(t.x, t.y);
        ctx.strokeStyle = accentColor;
        ctx.globalAlpha = 0.15;
        ctx.stroke();
        ctx.globalAlpha = 1;

        // Dot
        ctx.beginPath();
        ctx.arc(t.x, t.y, 3, 0, Math.PI*2);
        ctx.fillStyle = accentColor;
        ctx.fill();

        if (t.progress >= 1) {
          experts[t.targetIdx].lastActive = Date.now();
          tokens.splice(i, 1);
        }
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    resize();
    draw();
    setInterval(spawnToken, 800);

    function sendHeight(){const h=document.body.scrollHeight;window.parent.postMessage({type:"resize-iframe",height:h},"*")}window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);new ResizeObserver(sendHeight).observe(document.body);
  </script>
</body>
</html>
