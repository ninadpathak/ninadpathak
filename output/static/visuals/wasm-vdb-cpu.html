<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASM VDB CPU Usage</title>
    <style>
        :root {
            --bg-1: #ffffff;
            --bg-2: #efefed;
            --border: #e0e0dc;
            --text-1: #0e0e0e;
            --text-2: #3a3a3a;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --bg-2: #1a1a1a;
                --border: #1e1e1e;
                --text-1: #f0f0f0;
                --text-2: #c2c2c2;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }

        html, body { height: 100%; margin: 0; padding: 0; }
        body { 
            background: var(--bg-1); 
            font-family: var(--sans); 
            color: var(--text-1);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container { 
            width: 100%; 
            height: 100%;
            padding: 1.5rem;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            width: 100%;
            height: auto;
            max-height: 100%;
            overflow: visible;
        }

        .label { font-family: var(--mono); font-size: 18px; fill: var(--text-2); font-weight: 600; text-transform: uppercase; }
        .desc { font-family: var(--sans); font-size: 16px; fill: var(--text-3); }
        .axis { stroke: var(--text-1); stroke-width: 2; vector-effect: non-scaling-stroke; fill: none; }
        .grid { stroke: var(--border); stroke-width: 1.5; stroke-dasharray: 4; vector-effect: non-scaling-stroke; }
        .line { stroke: var(--accent); stroke-width: 3; fill: none; }
        .fill { fill: var(--accent); fill-opacity: 0.1; }
    </style>
</head>
<body>
    <div class="container">
        <svg viewBox="0 0 1000 450" preserveAspectRatio="xMidYMid meet">
            <line x1="100" y1="80" x2="100" y2="350" class="axis" />
            <line x1="100" y1="350" x2="900" y2="350" class="axis" />
            
            <line x1="100" y1="80" x2="900" y2="80" class="grid" />
            <line x1="100" y1="215" x2="900" y2="215" class="grid" />
            
            <text x="50" y="215" text-anchor="middle" transform="rotate(-90 50,215)" class="label">CPU %</text>
            <text x="500" y="400" text-anchor="middle" class="label">Index Build Progress</text>
            
            <text x="90" y="85" text-anchor="end" class="desc">100%</text>
            <text x="90" y="220" text-anchor="end" class="desc">50%</text>

            <path d="M 100 350 L 200 350 L 300 80 L 700 80 L 800 350 L 900 350" class="fill" />
            <path d="M 100 350 L 200 350 L 300 80 L 700 80 L 800 350 L 900 350" class="line" />
            
            <text x="500" y="70" text-anchor="middle" class="label" style="fill: var(--accent);">HNSW Build Peak (100% Core)</text>
            <text x="500" y="40" text-anchor="middle" class="label" style="font-size: 24px; fill: var(--text-1);">The HNSW Build Tax</text>
        </svg>
    </div>
</body>
</html>
