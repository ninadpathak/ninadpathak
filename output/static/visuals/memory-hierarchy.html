<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Hierarchy Pyramid</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #canvas-container { width: 100vw; height: 100vh; }
    .label {
      position: absolute;
      color: #ff5f1f;
      font-size: 14px;
      font-weight: 600;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(255,95,31,0.8);
      transform: translate(-50%, -50%);
    }
    .label span { display: block; font-size: 11px; color: #d44000; font-weight: 400; }
    .info {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #ff5f1f;
      font-size: 12px;
      opacity: 0.6;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div class="info">Drag to rotate · Scroll to zoom</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;

    const dark = 0xff5f1f;
    const light = 0xd44000;
    const opacity = 0.85;

    function createPyramidLayer(width, height, depth, color, yPos, label, sublabel) {
      const geometry = new THREE.BoxGeometry(width, height, depth);
      const material = new THREE.MeshPhongMaterial({
        color: color,
        transparent: true,
        opacity: opacity,
        emissive: color,
        emissiveIntensity: 0.15,
        shininess: 80
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.y = yPos;
      scene.add(mesh);

      // Edge lines
      const edges = new THREE.EdgesGeometry(geometry);
      const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 }));
      line.position.y = yPos;
      scene.add(line);

      // Glow plane
      const glowGeo = new THREE.PlaneGeometry(width * 1.2, depth * 1.2);
      const glowMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.08, side: THREE.DoubleSide });
      const glow = new THREE.Mesh(glowGeo, glowMat);
      glow.rotation.x = -Math.PI / 2;
      glow.position.y = yPos - height / 2 - 0.01;
      scene.add(glow);

      return mesh;
    }

    // 5 layers - widest at bottom (sensory), narrowest at top (procedural)
    createPyramidLayer(5, 0.7, 2.5, dark, -2.2, 'SENSORY', 'Raw Input · 500ms TTL');
    createPyramidLayer(4.2, 0.7, 2.1, 0xff6a2a, -1.4, 'WORKING', 'Context Window · 128K tokens');
    createPyramidLayer(3.4, 0.7, 1.7, 0xff7a3a, -0.6, 'EPISODIC', 'Conversation History · Vector DB');
    createPyramidLayer(2.6, 0.7, 1.3, 0xff8a4a, 0.2, 'SEMANTIC', 'Knowledge Graph · Facts');
    createPyramidLayer(1.8, 0.7, 0.9, light, 1.0, 'PROCEDURAL', 'Function Store · Policies');

    // Connecting lines between layers
    const lineMat = new THREE.LineBasicMaterial({ color: 0xff5f1f, transparent: true, opacity: 0.4 });
    const linePoints = [
      new THREE.Vector3(-2.5, -2.55, 0),
      new THREE.Vector3(-2.1, -1.75, 0),
      new THREE.Vector3(-1.7, -1.05, 0),
      new THREE.Vector3(-1.3, -0.25, 0),
      new THREE.Vector3(-0.9, 0.55, 0),
      new THREE.Vector3(-0.5, 1.25, 0),
    ];
    const lineGeo = new THREE.BufferGeometry().setFromPoints(linePoints);
    const connectingLine = new THREE.Line(lineGeo, lineMat);
    scene.add(connectingLine);

    // Right side connecting line
    const linePoints2 = [
      new THREE.Vector3(2.5, -2.55, 0),
      new THREE.Vector3(2.1, -1.75, 0),
      new THREE.Vector3(1.7, -1.05, 0),
      new THREE.Vector3(1.3, -0.25, 0),
      new THREE.Vector3(0.9, 0.55, 0),
      new THREE.Vector3(0.5, 1.25, 0),
    ];
    const lineGeo2 = new THREE.BufferGeometry().setFromPoints(linePoints2);
    const connectingLine2 = new THREE.Line(lineGeo2, lineMat);
    scene.add(connectingLine2);

    // Labels
    const labels = [
      { text: 'SENSORY', sub: 'Raw Input · 500ms TTL', x: 3.5, y: -2.2 },
      { text: 'WORKING', sub: 'Context Window · 128K tokens', x: 3.2, y: -1.4 },
      { text: 'EPISODIC', sub: 'Conversation History · Vector DB', x: 2.8, y: -0.6 },
      { text: 'SEMANTIC', sub: 'Knowledge Graph · Facts', x: 2.2, y: 0.2 },
      { text: 'PROCEDURAL', sub: 'Function Store · Policies', x: 1.6, y: 1.0 },
    ];

    labels.forEach(l => {
      const div = document.createElement('div');
      div.className = 'label';
      div.innerHTML = `${l.text}<span>${l.sub}</span>`;
      div.style.left = '50%';
      div.style.top = '50%';
      document.body.appendChild(div);
    });

    // Lighting
    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);
    const point = new THREE.PointLight(0xff5f1f, 1.5, 20);
    point.position.set(3, 3, 5);
    scene.add(point);
    const point2 = new THREE.PointLight(0xd44000, 1, 20);
    point2.position.set(-3, 0, -5);
    scene.add(point2);

    // Grid helper
    const grid = new THREE.GridHelper(12, 20, 0x222222, 0x111111);
    grid.position.y = -2.8;
    scene.add(grid);

    function updateLabels() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      const positions = [
        { x: 3.5, y: -2.2 },
        { x: 3.2, y: -1.4 },
        { x: 2.8, y: -0.6 },
        { x: 2.2, y: 0.2 },
        { x: 1.6, y: 1.0 },
      ];
      positions.forEach((pos, i) => {
        const vector = new THREE.Vector3(pos.x, pos.y, 1.25);
        vector.project(camera);
        const x = (vector.x * 0.5 + 0.5) * width;
        const y = (-vector.y * 0.5 + 0.5) * height;
        const labelDiv = document.body.querySelectorAll('.label')[i];
        if (labelDiv) {
          labelDiv.style.left = x + 'px';
          labelDiv.style.top = y + 'px';
        }
      });
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      updateLabels();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
