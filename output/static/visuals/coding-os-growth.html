<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Source Coding Growth | Ninad Pathak</title>
  <link rel="stylesheet" href="/static/css/visuals-base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .graph-wrap { flex: 1; border-left: 1px solid var(--border); border-bottom: 1px solid var(--border); position: relative; margin: 40px 20px 20px 40px; }
    .line-svg { width: 100%; height: 100%; position: absolute; inset: 0; }
    
    .data-line { fill: none; stroke: var(--accent); stroke-width: 3; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 2.5s forwards cubic-bezier(0.16, 1, 0.3, 1); }
    .ref-line { fill: none; stroke: var(--border); stroke-width: 1; stroke-dasharray: 4; }
    .baseline { stroke: var(--text-dim); stroke-width: 1.5; stroke-dasharray: 4; }
    
    @keyframes draw { to { stroke-dashoffset: 0; } }
    
    .axis-label { font-family: var(--mono); font-size: 9px; color: var(--text-dim); position: absolute; }
    .point-label { font-family: var(--mono); font-size: 10px; color: var(--text); font-weight: 600; position: absolute; background: var(--bg); padding: 2px 6px; border: 1px solid var(--border); }
  </style>
</head>
<body>
  <div class="viz-container">
    <div class="header-meta">
      <div>
        <div class="label">// Performance_Trends</div>
        <h1 class="title">The Open Source Delta</h1>
      </div>
      <div class="label" style="color: var(--text-dim);">Closing_The_Gap</div>
    </div>

    <div class="graph-wrap">
      <svg class="line-svg" viewBox="0 0 400 200" preserveAspectRatio="none">
        <line class="ref-line" x1="0" y1="150" x2="400" y2="150" />
        <line class="ref-line" x1="0" y1="100" x2="400" y2="100" />
        <line class="ref-line" x1="0" y1="50" x2="400" y2="50" />
        
        <path class="data-line" d="M 0 180 L 100 140 L 200 100 L 300 50 L 400 35" />
        <line class="baseline" x1="0" y1="20" x2="400" y2="20" />
      </svg>
      
      <div class="axis-label" style="bottom: -20px; left: 0;">2024</div>
      <div class="axis-label" style="bottom: -20px; left: 50%; transform: translateX(-50%);">2025</div>
      <div class="axis-label" style="bottom: -20px; right: 0;">2026</div>
      
      <div class="axis-label" style="top: 50%; left: -35px; transform: rotate(-90deg) translateY(-50%);">SWE_SCORE</div>
      
      <div class="axis-label" style="top: 10px; left: 10px;">Proprietary Baseline</div>
      <div class="point-label" style="top: 45px; right: 20px;">Llama 4 / DeepSeek</div>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot pulse"></div> TRACKING: ACTIVE</div>
      <div class="status-item">METRIC: SWE-BENCH</div>
    </div>
  </div>
<script>function sendHeight(){const h=document.documentElement.scrollHeight;window.parent.postMessage({type:"resize-iframe",height:h},"*")}window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);new ResizeObserver(sendHeight).observe(document.body);</script></body>
</html>
