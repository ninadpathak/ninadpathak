<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hertzum Trust Model</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-1: #ffffff;
            --bg-2: #efefed;
            --border: #e0e0dc;
            --text-1: #0e0e0e;
            --text-2: #3a3a3a;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --bg-2: #1a1a1a;
                --border: #1e1e1e;
                --text-1: #f0f0f0;
                --text-2: #c2c2c2;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }

        body { 
            margin: 0; 
            background: var(--bg-1); 
            font-family: var(--sans); 
            color: var(--text-1); 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .chart-container {
            width: 100%;
            max-width: 800px;
            background: var(--bg-2);
            padding: 20px;
            border: 1px solid var(--border);
        }

        #label { 
            margin-top: 10px;
            font-family: var(--mono); 
            font-size: 12px; 
            color: var(--text-3); 
            text-transform: uppercase; 
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <canvas id="trustChart"></canvas>
        <div id="label">Hertzum Trust Model: Trust > Effort for Engineers</div>
    </div>

    <script>
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const ctx = document.getElementById('trustChart').getContext('2d');
        
        const data = {
            datasets: [
                {
                    label: 'Trust vs Effort Curve',
                    data: [
                        { x: 1, y: 0.5 },
                        { x: 3, y: 1.5 },
                        { x: 5, y: 3.5 },
                        { x: 7, y: 6.5 },
                        { x: 9, y: 9.5 }
                    ],
                    borderColor: isDark ? '#ff5f1f' : '#d44000',
                    backgroundColor: 'rgba(212, 64, 0, 0.1)',
                    showLine: true,
                    tension: 0.4,
                    pointRadius: 0
                },
                {
                    label: 'Information Sources',
                    data: [
                        { x: 2, y: 0.5, label: 'Marketing Blog' },
                        { x: 4, y: 2.0, label: 'Tutorial' },
                        { x: 7, y: 7.0, label: 'API Reference' },
                        { x: 9, y: 9.8, label: 'Source Code' }
                    ],
                    backgroundColor: isDark ? '#ff5f1f' : '#d44000',
                    pointRadius: 6,
                    pointHoverRadius: 8
                }
            ]
        };

        new Chart(ctx, {
            type: 'scatter',
            data: data,
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        type: 'linear',
                        position: 'bottom',
                        title: {
                            display: true,
                            text: 'EFFORT (Ease of Access)',
                            font: { family: 'JetBrains Mono', size: 12 },
                            color: isDark ? '#c2c2c2' : '#3a3a3a'
                        },
                        min: 0,
                        max: 10,
                        grid: { color: isDark ? '#222222' : '#eeeeee' },
                        ticks: { color: isDark ? '#6a6a6a' : '#888888' }
                    },
                    y: {
                        title: {
                            display: true,
                            text: 'TRUST (Verify-ability)',
                            font: { family: 'JetBrains Mono', size: 12 },
                            color: isDark ? '#c2c2c2' : '#3a3a3a'
                        },
                        min: 0,
                        max: 10,
                        grid: { color: isDark ? '#222222' : '#eeeeee' },
                        ticks: { color: isDark ? '#6a6a6a' : '#888888' }
                    }
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.raw.label || '';
                            }
                        }
                    },
                    legend: { display: false }
                }
            }
        });
    </script>
</body>
</html>
