<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trust vs Effort</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root {
            --bg-1: #ffffff;
            --bg-2: #efefed;
            --border: #e0e0dc;
            --text-1: #0e0e0e;
            --text-2: #3a3a3a;
            --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111;
                --bg-2: #1a1a1a;
                --border: #1e1e1e;
                --text-1: #f0f0f0;
                --text-2: #c2c2c2;
                --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }

        body { margin: 0; background: var(--bg-1); font-family: var(--sans); color: var(--text-1); overflow: hidden; }
        #label { position: absolute; bottom: 20px; left: 20px; font-family: var(--mono); font-size: 12px; color: var(--text-3); text-transform: uppercase; }
        .axis-label { position: absolute; font-family: var(--mono); font-size: 10px; color: var(--text-2); }
    </style>
</head>
<body>
    <div id="label">Hertzum Trust Model // Trust > Effort</div>
    <div class="axis-label" style="top: 50%; left: 10px; transform: rotate(-90deg);">TRUST (Verify-ability)</div>
    <div class="axis-label" style="bottom: 10px; left: 50%;">EFFORT (Ease of Access)</div>

    <script>
        const scene = new THREE.Scene();
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        scene.background = new THREE.Color(isDark ? 0x111111 : 0xffffff);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Grid helper for the 3D space
        const grid = new THREE.GridHelper(10, 10, isDark ? 0x333333 : 0xdddddd, isDark ? 0x222222 : 0xeeeeee);
        grid.position.y = -0.5;
        scene.add(grid);

        // Curve showing the relationship
        const points = [];
        for (let i = 0; i <= 20; i++) {
            const x = (i / 20) * 10 - 5;
            // Trust increases as Effort becomes secondary
            const y = Math.pow(i / 20, 2) * 5; 
            const z = Math.sin(i / 5) * 2;
            points.push(new THREE.Vector3(x, y, z));
        }
        const curve = new THREE.CatmullRomCurve3(points);
        const geometry = new THREE.TubeGeometry(curve, 64, 0.1, 8, false);
        const material = new THREE.MeshBasicMaterial({ color: isDark ? 0xff5f1f : 0xd44000 });
        const line = new THREE.Mesh(geometry, material);
        scene.add(line);

        // Data points for specific sources
        const sources = [
            { name: 'Marketing Blog', x: 4, y: 0.5, z: 0, color: 0xeeeeee },
            { name: 'Tutorial', x: 2, y: 2, z: 1, color: 0xcccccc },
            { name: 'API Reference', x: -2, y: 4, z: -1, color: 0x888888 },
            { name: 'Source Code', x: -4, y: 5, z: 0, color: isDark ? 0xff5f1f : 0xd44000 }
        ];

        sources.forEach(s => {
            const geo = new THREE.SphereGeometry(0.2, 16, 16);
            const mat = new THREE.MeshBasicMaterial({ color: s.color });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(s.x, s.y, s.z);
            scene.add(mesh);
        });

        camera.position.set(8, 5, 8);
        camera.lookAt(0, 0, 0);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
