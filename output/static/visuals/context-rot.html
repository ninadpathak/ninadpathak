<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Context Rot | Ninad Pathak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f8f6;
      --accent: #d44000;
      --border: #e0e0dc;
      --text: #0e0e0e;
      --mono: 'JetBrains Mono', monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #090909;
        --accent: #ff5f1f;
        --border: #1e1e1e;
        --text: #f0f0f0;
      }
    }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--mono); overflow: hidden; padding: 40px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    
    .rot-stage { position: relative; width: 400px; height: 200px; border: 1px solid var(--border); overflow: hidden; display: flex; flex-wrap: wrap; align-content: flex-start; padding: 10px; gap: 5px; }
    .word { font-size: 8px; color: #888; transition: all 0.5s; }
    .noise { filter: blur(1px); opacity: 0.3; }
    .signal { color: var(--accent); font-weight: 600; font-size: 10px; }
    
    .controls { margin-top: 30px; display: flex; align-items: center; gap: 20px; }
    input { accent-color: var(--accent); width: 200px; }
  </style>
</head>
<body>
  <div style="text-align: center;">
    <div style="font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px;">// Attention Decay</div>
    <div style="font-size: 16px; font-weight: 600;">Context Rot (Signal-to-Noise Ratio)</div>
  </div>

  <div class="rot-stage" id="stage"></div>

  <div class="controls">
    <span style="font-size: 10px;">Low Context</span>
    <input type="range" id="vol" min="10" max="200" value="10">
    <span style="font-size: 10px;">High Context</span>
  </div>

  <script>
    const stage = document.getElementById('stage');
    const vol = document.getElementById('vol');

    function update() {
      stage.innerHTML = '';
      const count = parseInt(vol.value);
      
      for(let i=0; i<count; i++) {
        const w = document.createElement('span');
        w.className = 'word';
        w.innerText = 'DATA';
        
        // As volume increases, old words "rot" (blur/fade)
        const rotChance = (count / 200) * 0.8;
        if (Math.random() < rotChance) {
          w.classList.add('noise');
        }
        
        if (i === 5) {
          w.innerText = 'TARGET_FACT';
          w.className = 'word signal';
        }
        
        stage.appendChild(w);
      }
    }

    vol.oninput = update;
    update();
  </script>
<script>function sendHeight(){const h=document.body.scrollHeight;window.parent.postMessage({type:"resize-iframe",height:h},"*")}window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);new ResizeObserver(sendHeight).observe(document.body);</script></body>
</html>
