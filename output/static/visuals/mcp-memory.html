<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Memory Schema | Ninad Pathak</title>
  <link rel="stylesheet" href="/static/css/visuals-base.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .schema-stage { display: flex; flex-direction: column; gap: 20px; margin-top: 10px; }
    
    .mcp-flow { display: flex; align-items: center; justify-content: center; gap: 20px; font-family: var(--mono); font-size: 10px; padding: 15px; border: 1px solid var(--border); background: rgba(0,0,0,0.02); }
    .flow-box { border: 1px solid var(--border); padding: 8px 12px; background: var(--bg); transition: all 0.3s; }
    .flow-box.active { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px rgba(212, 64, 0, 0.1); }
    .flow-arrow { color: var(--border); font-weight: 700; font-size: 14px; transition: color 0.3s; }
    .flow-arrow.active { color: var(--accent); }

    .code-editor { border: 1px solid var(--border); background: var(--bg); position: relative; display: flex; flex-direction: column; min-height: 180px; }
    .editor-header { padding: 8px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .dots { display: flex; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
    .editor-tab { font-family: var(--mono); font-size: 9px; color: var(--text-dim); text-transform: uppercase; }
    
    .code-content { padding: 20px; font-family: var(--mono); font-size: 11px; line-height: 1.5; color: var(--text-dim); transition: all 0.3s; }
    .k { color: var(--accent); }
    .s { color: #0080FF; }
  </style>
</head>
<body>
  <div class="viz-container">
    <div class="header-meta">
      <div>
        <div class="label">// Standardized_Transport</div>
        <h1 class="title">Model Context Protocol</h1>
      </div>
      <div class="label" style="color: var(--text-dim);">Schema: JSON-RPC_2.0</div>
    </div>
    
    <div class="schema-stage">
      <div class="mcp-flow">
        <div class="flow-box" id="host">AGENT_HOST</div>
        <div class="flow-arrow" id="a1">→</div>
        <div class="flow-box" id="mcp" style="border-style: dashed;">MCP</div>
        <div class="flow-arrow" id="a2">→</div>
        <div class="flow-box" id="server">MEMORY_SERVER</div>
      </div>

      <div class="code-editor">
        <div class="editor-header">
          <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
          <div class="editor-tab" id="tab-name">REQUEST.JSON</div>
        </div>
        <div class="code-content" id="code">
          <!-- Initial state -->
        </div>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot pulse"></div> TRANSPORT: ACTIVE</div>
      <div class="status-item" id="msg-type">METHOD: resources/read</div>
    </div>
  </div>

  <script>
    const code = document.getElementById('code');
    const tabName = document.getElementById('tab-name');
    const msgType = document.getElementById('msg-type');
    const components = {
      host: document.getElementById('host'),
      mcp: document.getElementById('mcp'),
      server: document.getElementById('server'),
      a1: document.getElementById('a1'),
      a2: document.getElementById('a2')
    };

    const req = `{<br>&nbsp;&nbsp;<span class="k">"method"</span>: <span class="s">"resources/read"</span>,<br>&nbsp;&nbsp;<span class="k">"params"</span>: {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="k">"uri"</span>: <span class="s">"memory://user_123/prefs"</span><br>&nbsp;&nbsp;}<br>}`;
    const res = `{<br>&nbsp;&nbsp;<span class="k">"result"</span>: {<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="k">"contents"</span>: [<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;{ <span class="k">"text"</span>: <span class="s">"prefers_rust: true"</span> }<br>&nbsp;&nbsp;&nbsp;&nbsp;]<br>&nbsp;&nbsp;}<br>}`;

    async function cycle() {
      // 1. Request
      Object.values(components).forEach(c => c.classList.remove('active'));
      components.host.classList.add('active');
      components.a1.classList.add('active');
      code.innerHTML = req;
      tabName.innerText = "REQUEST.JSON";
      msgType.innerText = "METHOD: resources/read";
      
      await new Promise(r => setTimeout(r, 1500));
      
      // 2. Through MCP to Server
      components.a1.classList.remove('active');
      components.mcp.classList.add('active');
      components.a2.classList.add('active');
      
      await new Promise(r => setTimeout(r, 800));
      
      // 3. Response
      components.server.classList.add('active');
      components.a2.innerText = "←";
      components.a1.innerText = "←";
      code.innerHTML = res;
      tabName.innerText = "RESPONSE.JSON";
      msgType.innerText = "STATUS: SUCCESS_200";
      
      await new Promise(r => setTimeout(r, 2000));
      
      components.a1.innerText = "→";
      components.a2.innerText = "→";
      cycle();
    }

    cycle();

    function sendHeight(){const h=document.documentElement.scrollHeight;window.parent.postMessage({type:"resize-iframe",height:h},"*")}window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);new ResizeObserver(sendHeight).observe(document.body);
  </script>
</body>
</html>
