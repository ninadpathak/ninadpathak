<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTFT Context Scaling</title>
    <style>
        :root {
            --bg-1: #ffffff; --bg-2: #efefed; --border: #e0e0dc;
            --text-1: #0e0e0e; --text-2: #3a3a3a; --text-3: #888888;
            --accent: #d44000;
            --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-1: #111111; --bg-2: #1a1a1a; --border: #1e1e1e;
                --text-1: #f0f0f0; --text-2: #c2c2c2; --text-3: #6a6a6a;
                --accent: #ff5f1f;
            }
        }
        html, body { height: 100%; margin: 0; padding: 0; }
        body { background: var(--bg-1); font-family: var(--sans); color: var(--text-1); overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .container { width: 100%; height: 100%; padding: 1rem; box-sizing: border-box; display: flex; justify-content: center; align-items: center; }
        svg { width: 100%; height: auto; max-height: 100%; overflow: visible; }
        .label { font-family: var(--mono); font-size: 16px; fill: var(--text-2); font-weight: 600; text-transform: uppercase; }
        .val { font-family: var(--mono); font-size: 20px; fill: var(--accent); font-weight: 700; }
        .tick { font-family: var(--mono); font-size: 16px; fill: var(--text-3); }
        .title { font-family: var(--mono); font-size: 24px; fill: var(--text-1); font-weight: 700; text-transform: uppercase; }
        .axis { stroke: var(--text-1); stroke-width: 2; }
        .grid { stroke: var(--border); stroke-width: 1.5; stroke-dasharray: 4; }
    </style>
</head>
<body>
    <div class="container">
        <svg viewBox="0 0 1000 420" preserveAspectRatio="xMidYMid meet">
            <line x1="120" y1="60" x2="120" y2="340" class="axis" />
            <line x1="120" y1="340" x2="860" y2="340" class="axis" />
            <text x="110" y="70" text-anchor="end" class="tick">800ms</text><line x1="120" y1="68" x2="860" y2="68" class="grid" />
            <text x="110" y="140" text-anchor="end" class="tick">600ms</text><line x1="120" y1="138" x2="860" y2="138" class="grid" />
            <text x="110" y="210" text-anchor="end" class="tick">400ms</text><line x1="120" y1="208" x2="860" y2="208" class="grid" />
            <text x="110" y="280" text-anchor="end" class="tick">200ms</text><line x1="120" y1="278" x2="860" y2="278" class="grid" />
            <text x="110" y="345" text-anchor="end" class="tick">0ms</text>
            <text x="200" y="365" text-anchor="middle" class="tick">0</text>
            <text x="380" y="365" text-anchor="middle" class="tick">5k</text>
            <text x="560" y="365" text-anchor="middle" class="tick">10k</text>
            <text x="740" y="365" text-anchor="middle" class="tick">15k</text>
            <text x="450" y="395" text-anchor="middle" class="label">Context Tokens</text>
            <path d="M 200 228 L 380 221 L 560 193 L 740 158" fill="none" stroke="var(--accent)" stroke-width="3" />
            <circle cx="200" cy="228" r="5" fill="var(--accent)" /><text x="200" y="215" text-anchor="middle" class="val">320ms</text>
            <circle cx="380" cy="221" r="5" fill="var(--accent)" /><text x="380" y="208" text-anchor="middle" class="val">340ms</text>
            <circle cx="560" cy="193" r="5" fill="var(--accent)" /><text x="560" y="180" text-anchor="middle" class="val">420ms</text>
            <circle cx="740" cy="158" r="5" fill="var(--accent)" /><text x="740" y="145" text-anchor="middle" class="val">520ms</text>
            <text x="30" y="200" text-anchor="middle" class="label" transform="rotate(-90 30,200)">TTFT</text>
            <text x="450" y="30" text-anchor="middle" class="title">LLM TTFT Scaling with Context Size</text>
        </svg>
    </div>
</body>
</html>
