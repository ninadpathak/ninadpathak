<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Matryoshka Embeddings | Ninad Pathak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8f8f6;
      --accent: #d44000;
      --border: #e0e0dc;
      --text: #0e0e0e;
      --mono: 'JetBrains Mono', monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #090909;
        --accent: #ff5f1f;
        --border: #1e1e1e;
        --text: #f0f0f0;
      }
    }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--mono); overflow: hidden; padding: 40px; box-sizing: border-box; }
    .header { margin-bottom: 30px; }
    .label { font-size: 10px; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 5px; text-transform: uppercase; }
    .title { font-size: 18px; font-weight: 500; }
    
    .viz-container { display: flex; flex-direction: column; gap: 40px; }
    .vector-track { height: 60px; background: var(--bg); border: 1px solid var(--border); position: relative; display: flex; align-items: center; padding: 0 10px; }
    .vector-cell { flex: 1; height: 30px; margin: 2px; background: var(--accent); opacity: 0.1; transition: opacity 0.2s; }
    .vector-cell.active { opacity: 1; }
    
    .controls { display: flex; align-items: center; gap: 20px; }
    input[type=range] { flex: 1; accent-color: var(--accent); cursor: pointer; }
    
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .stat-box { border: 1px solid var(--border); padding: 20px; }
    .stat-num { font-size: 24px; color: var(--accent); margin-bottom: 5px; font-weight: 600; }
    .stat-label { font-size: 11px; color: #888; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="header">
    <div class="label">// Nested Representations</div>
    <div class="title">Matryoshka Embeddings</div>
  </div>

  <div class="viz-container">
    <div class="vector-track" id="vectorTrack"></div>
    
    <div class="controls">
      <span class="stat-label" style="min-width: 100px;">Dimensions:</span>
      <input type="range" id="dimRange" min="1" max="128" step="1" value="128">
      <span id="dimVal" style="color: var(--accent); width: 40px; font-weight: 600;">128</span>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div id="recall" class="stat-num">99.8%</div>
        <div class="stat-label">Retrieval Recall</div>
      </div>
      <div class="stat-box">
        <div id="storage" class="stat-num">0.51 MB</div>
        <div class="stat-label">Footprint (1k)</div>
      </div>
      <div class="stat-box">
        <div id="latency" class="stat-num">0.2ms</div>
        <div class="stat-label">Latency</div>
      </div>
    </div>
  </div>

  <script>
    const track = document.getElementById('vectorTrack');
    const range = document.getElementById('dimRange');
    const dimVal = document.getElementById('dimVal');
    const recallEl = document.getElementById('recall');
    const storageEl = document.getElementById('storage');
    const latencyEl = document.getElementById('latency');

    const totalCells = 128;
    for (let i = 0; i < totalCells; i++) {
      const cell = document.createElement('div');
      cell.className = 'vector-cell active';
      track.appendChild(cell);
    }

    const cells = track.querySelectorAll('.vector-cell');

    function update() {
      const val = parseInt(range.value);
      dimVal.innerText = val;
      
      cells.forEach((cell, i) => {
        if (i < val) cell.classList.add('active');
        else cell.classList.remove('active');
      });

      const ratio = val / 128;
      const recall = 85 + (Math.pow(ratio, 0.2) * 14.8);
      const storage = (val * 4 * 1000) / (1024 * 1024);
      const latency = 0.05 + (ratio * 0.15);

      recallEl.innerText = recall.toFixed(1) + '%';
      storageEl.innerText = storage.toFixed(2) + ' MB';
      latencyEl.innerText = latency.toFixed(2) + 'ms';
    }

    range.addEventListener('input', update);
    update();
  </script>
</body>
</html>
